  /* =========================================================
     МОДУЛЬ 4: ДВИЖОК СВАЙПОВ И ПРЕДСКАЗАНИЙ (CardEngine.jsx)
     Содержит Пружинную физику, Гироскоп и DOM-инъекции
  ========================================================= */
  const CardEngine = ({ card, nextCard, onSwipe, isBurning }) => {
      const cardRef = useRef(null);
      const state = useRef({ x: 0, y: 0, rx: 0, ry: 0, isDragging: false, isFlying: false, startX: 0, startY: 0, currentPrediction: null });

      const SWIPE_THRESHOLD = 120; const SPRING_TENSION = 0.15; const FRICTION = 0.85;       

      // Функция вычисляет, какую эмоцию показать персонажу при предсказании
      const getReactionEmoji = (effects, defaultAvatar) => {
          if (!effects) return defaultAvatar;
          if (effects.safety < -15 || effects.budget < -20) return "😰"; 
          if (effects.loyalty < -15) return "🤬"; 
          if (effects.budget > 15 && effects.safety < 0) return "😏"; 
          if (effects.safety > 15 || effects.loyalty > 15) return "😇"; 
          return defaultAvatar; 
      };

      // Прямая инъекция DOM для Предсказаний (60 FPS без лагов React State)
      const updatePredictions = (x) => {
          if (!card) return;
          const absX = Math.abs(x);
          const intensity = Math.min(absX / SWIPE_THRESHOLD, 1); 
          
          // Нагнетаем звуковое напряжение пропорционально свайпу
          AudioEngine.setTension(intensity);

          const safetyUI = document.getElementById('gauge-safety');
          const budgetUI = document.getElementById('lcd-budget');
          const loyaltyUI = document.getElementById('bar-loyalty');
          const avatarUI = document.getElementById('card-avatar');
          const cardWrapUI = document.getElementById('card-wrapper');

          // СБРОС (Карточка в центре)
          if (absX < 30) {
              if (state.current.currentPrediction !== null) {
                  safetyUI?.classList.remove('gauge-predict-danger'); budgetUI?.classList.remove('lcd-predict-danger'); loyaltyUI?.classList.remove('gauge-predict-danger');
                  if (avatarUI) avatarUI.innerText = card.avatar;
                  if (cardWrapUI) cardWrapUI.classList.remove('avatar-predict');
                  state.current.currentPrediction = null;
              }
              return;
          }

          // ПРЕДСКАЗАНИЕ ВЛЕВО ИЛИ ВПРАВО
          const dir = x < 0 ? 'left' : 'right';
          if (state.current.currentPrediction !== dir) {
              state.current.currentPrediction = dir;
              const effects = dir === 'left' ? card.onLeft : card.onRight;
              
              // Сбрасываем старые предсказания
              safetyUI?.classList.remove('gauge-predict-danger'); budgetUI?.classList.remove('lcd-predict-danger'); loyaltyUI?.classList.remove('gauge-predict-danger');
              
              // Включаем тревогу на приборах, если решение фатально
              if (effects.safety < -15) safetyUI?.classList.add('gauge-predict-danger');
              if (effects.budget < -15) budgetUI?.classList.add('lcd-predict-danger');
              if (effects.loyalty < -15) loyaltyUI?.classList.add('gauge-predict-danger');

              // Изменяем лицо персонажа
              if (avatarUI) avatarUI.innerText = getReactionEmoji(effects, card.avatar);
              if (cardWrapUI) cardWrapUI.classList.add('avatar-predict');
              
              // Легкая вибрация при понимании угрозы
              if (effects.safety < -15 || effects.budget < -15 || effects.loyalty < -15) vibrate(10);
          }
      };

      // Расчет 3D-матрицы
      const updateTransform = () => {
          if (!cardRef.current) return;
          const { x, y, rx, ry } = state.current;
          
          // CSS Матрица для 3D
          cardRef.current.style.transform = `translate3d(${x}px, ${y + Math.abs(x)*0.05}px, 0) rotateZ(${x * 0.05}deg) rotateY(${(x * 0.08) + ry}deg) rotateX(${(Math.abs(x) * 0.03) + rx}deg)`;
          
          const glare = cardRef.current.querySelector('.glare');
          if (glare) {
              glare.style.opacity = Math.min(Math.abs(x)/150 + Math.abs(ry)/50, 0.5);
              glare.style.background = `linear-gradient(${(x * 0.5 + ry * 2) + 180}deg, rgba(255,255,255,1) 0%, transparent 60%)`;
          }

          const leftInd = cardRef.current.querySelector('.choice-left'); const rightInd = cardRef.current.querySelector('.choice-right');
          if (leftInd) leftInd.style.opacity = x < -30 ? Math.min((Math.abs(x)-30)/50, 1) : 0;
          if (rightInd) rightInd.style.opacity = x > 30 ? Math.min((Math.abs(x)-30)/50, 1) : 0;

          updatePredictions(x);
      };

      // Пружинный цикл возврата в центр
      const springLoop = () => {
          if (state.current.isDragging || state.current.isFlying) return;
          state.current.x += (0 - state.current.x) * SPRING_TENSION;
          state.current.y += (0 - state.current.y) * SPRING_TENSION;
          state.current.rx *= FRICTION; state.current.ry *= FRICTION;
          updateTransform();

          if (Math.abs(state.current.x) > 0.5 || Math.abs(state.current.ry) > 0.5) {
              requestAnimationFrame(springLoop);
          } else {
              state.current.x = 0; state.current.y = 0; state.current.rx = 0; state.current.ry = 0;
              updateTransform();
          }
      };

      const handlePointerDown = (e) => {
          if (isBurning) return;
          state.current.isDragging = true;
          state.current.startX = (e.clientX || (e.touches && e.touches[0].clientX)) - state.current.x;
          state.current.startY = (e.clientY || (e.touches && e.touches[0].clientY)) - state.current.y;
      };

      const handlePointerMove = (e) => {
          // Параллакс от мыши (для ПК)
          if (!state.current.isDragging && e.type === 'mousemove' && !isBurning) {
              const rect = cardRef.current.getBoundingClientRect();
              state.current.rx = -((e.clientY - rect.top - rect.height/2) / rect.height) * 20; 
              state.current.ry = ((e.clientX - rect.left - rect.width/2) / rect.width) * 20;
              updateTransform(); return;
          }
          if (!state.current.isDragging) return;
          
          // Добавляем резиновое сопротивление свайпу
          state.current.x = ((e.clientX || (e.touches && e.touches[0].clientX)) - state.current.startX) * 0.8; 
          state.current.y = ((e.clientY || (e.touches && e.touches[0].clientY)) - state.current.startY) * 0.8;
          updateTransform();
      };

      const handlePointerUp = () => {
          if (!state.current.isDragging) return;
          state.current.isDragging = false;
          if (state.current.x > SWIPE_THRESHOLD) triggerSwipe('right');
          else if (state.current.x < -SWIPE_THRESHOLD) triggerSwipe('left');
          else {
              AudioEngine.setTension(0); // Сбрасываем звук натяжения
              requestAnimationFrame(springLoop); 
          }
      };

      const triggerSwipe = (direction) => {
          state.current.isFlying = true;
          AudioEngine.setTension(0); 
          state.current.x = direction === 'right' ? window.innerWidth : -window.innerWidth; 
          state.current.y += 100; 
          updateTransform(); onSwipe(direction);
      };

      // Гироскоп для мобилок (Параллакс)
      useEffect(() => {
          const handleOrientation = (e) => {
              if (state.current.isDragging || state.current.isFlying || isBurning) return;
              state.current.ry = Math.max(-20, Math.min(20, e.gamma ? e.gamma / 2 : 0)); 
              state.current.rx = Math.max(-20, Math.min(20, e.beta ? (e.beta - 45) / 2 : 0));
              updateTransform();
          };
          window.addEventListener('deviceorientation', handleOrientation);
          return () => window.removeEventListener('deviceorientation', handleOrientation);
      }, [isBurning]);

      useEffect(() => {
          state.current = { x: 0, y: 0, rx: 0, ry: 0, isDragging: false, isFlying: false, startX: 0, startY: 0, currentPrediction: null };
          if(cardRef.current) cardRef.current.style.transform = `translate3d(0,0,0)`;
      }, [card]);

      // Экспортируем функцию свайпа для кликов по кнопкам
      React.useImperativeHandle(card?.ref, () => ({
          forceSwipe: (dir) => {
              if (!state.current.isDragging && !state.current.isFlying && !isBurning) triggerSwipe(dir);
          }
      }));

      if (!card) return null;

      return (
          <div className="card-stack" onMouseMove={handlePointerMove} onTouchMove={handlePointerMove} onMouseUp={handlePointerUp} onTouchEnd={handlePointerUp} onMouseLeave={handlePointerUp}>
              {nextCard && <div className="next-card flex flex-center items-center justify-center"><div className="text-[5rem] opacity-20 grayscale">{nextCard.avatar}</div></div>}
              
              <div ref={cardRef} className={`swipe-card cursor-grab active:cursor-grabbing ${card.isUrgent?'urgent':''} ${isBurning ? 'animate-burn' : ''}`}
                  style={{ transition: state.current.isFlying ? 'transform 0.4s ease-out' : 'none' }}
                  onMouseDown={handlePointerDown} onTouchStart={handlePointerDown}
              >
                  <div className="glare"></div>
                  <div className="choice-indicator choice-left">{card.leftChoice}</div>
                  <div className="choice-indicator choice-right">{card.rightChoice}</div>
                  
                  <div className={`relative z-10 bg-slate-50 rounded-t-[24px] p-4 flex flex-col items-center justify-center border-b h-[42%] ${card.isUrgent?'bg-rose-50':''}`}>
                      <div id="card-wrapper" className="avatar-wrapper text-[4.5rem] mb-1 filter drop-shadow-2xl">
                          <span id="card-avatar">{card.avatar}</span>
                      </div>
                      <h2 className="text-xl font-black text-slate-800 tracking-tight text-center leading-tight">{card.character}</h2>
                      <div className="mt-2 px-3 py-1 rounded-full font-black text-[10px] uppercase shadow-lg tracking-widest bg-blue-600 text-white">{card.role}</div>
                  </div>
                  <div className="p-4 flex-1 flex items-center justify-center bg-white rounded-b-[24px]"><TypewriterText text={card.text} /></div>
              </div>
          </div>
      );
  };

  /* =========================================================
     МОДУЛЬ 2: СУПЕР-АУДИО ДВИЖОК (Генеративный звук)
  ========================================================= */
  const AudioEngine = (() => {
      let ctx = null; let enabled = false; 
      let tensionOsc = null; let tensionGain = null;
      let ambientActive = false; 
      let humOsc, humGain, heartOsc, heartGain;

      const init = () => { 
          if (!ctx) { ctx = new (window.AudioContext || window.webkitAudioContext)(); } 
          if (ctx.state === 'suspended') ctx.resume(); 
          enabled = true; 
          startAmbient(); 
      };

      // Продвинутый синтез звука с фильтром низких частот (сочный свайп и удар)
      const playTone = (freq, type, duration, vol = 0.1, slideFreq = null, useFilter = false) => {
          if (!enabled || !ctx) return;
          const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.type = type; 

          if (useFilter) {
              const filter = ctx.createBiquadFilter();
              filter.type = 'lowpass'; filter.frequency.setValueAtTime(2000, ctx.currentTime);
              filter.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + duration);
              osc.connect(filter); filter.connect(gain);
          } else {
              osc.connect(gain); 
          }
          
          gain.connect(ctx.destination);
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, ctx.currentTime + duration);
          gain.gain.setValueAtTime(vol, ctx.currentTime); 
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
          
          osc.start(); osc.stop(ctx.currentTime + duration);
      };
      
      // Нагнетание напряжения (Pre-cognition)
      const setTension = (intensity) => {
          if (!enabled || !ctx) return;
          if (intensity <= 0.1) {
              if (tensionGain) tensionGain.gain.setTargetAtTime(0.001, ctx.currentTime, 0.1); 
              return;
          }
          if (!tensionOsc) {
              tensionOsc = ctx.createOscillator(); tensionGain = ctx.createGain();
              tensionOsc.type = 'sawtooth'; tensionOsc.frequency.value = 50; 
              
              const lpf = ctx.createBiquadFilter(); lpf.type = 'lowpass'; lpf.frequency.value = 300;
              tensionOsc.connect(lpf); lpf.connect(tensionGain); tensionGain.connect(ctx.destination);
              tensionGain.gain.value = 0.001; tensionOsc.start();
          }
          tensionGain.gain.setTargetAtTime(intensity * 0.15, ctx.currentTime, 0.1); // Мягкая громкость
          tensionOsc.frequency.setTargetAtTime(40 + (intensity * 60), ctx.currentTime, 0.1);
      };

      // Генеративный фоновый эмбиент (Adaptive Ambient)
      const startAmbient = () => {
          if(!enabled || ambientActive) return;
          ambientActive = true;
          
          // Базовый гул предприятия
          humOsc = ctx.createOscillator(); humGain = ctx.createGain();
          humOsc.type = 'sine'; humOsc.frequency.value = 60;
          humGain.gain.value = 0.05;
          humOsc.connect(humGain).connect(ctx.destination);
          humOsc.start();

          // Сердцебиение (Пульс катастрофы)
          heartOsc = ctx.createOscillator(); heartGain = ctx.createGain();
          heartOsc.type = 'sine'; heartOsc.frequency.value = 45;
          heartGain.gain.value = 0; 
          
          const lfo = ctx.createOscillator(); lfo.type = 'square'; lfo.frequency.value = 1.2;
          const lfoGain = ctx.createGain(); lfoGain.gain.value = 1;
          lfo.connect(lfoGain).connect(heartGain.gain);
          lfo.start();
          
          heartOsc.connect(heartGain).connect(ctx.destination);
          heartOsc.start();
      };

      // Реакция эмбиента на изменение показателей
      const updateAmbient = (stats) => {
          if (!enabled || !ambientActive) return;
          // Если Безопасность < 30, включаем тревожное сердцебиение
          if (stats.safety < 30) heartGain.gain.setTargetAtTime(0.5, ctx.currentTime, 1);
          else heartGain.gain.setTargetAtTime(0, ctx.currentTime, 1);
      };

      const stopAmbient = () => {
          if(!ambientActive) return;
          humGain.gain.setTargetAtTime(0, ctx.currentTime, 0.5);
          heartGain.gain.setTargetAtTime(0, ctx.currentTime, 0.5);
          setTimeout(() => { if(humOsc) humOsc.stop(); if(heartOsc) heartOsc.stop(); ambientActive = false; }, 600);
      };

      return {
          init, 
          swipe: () => playTone(200, 'sine', 0.3, 0.15, 50, true), // Ветреный свайп с фильтром
          stamp: () => { playTone(150, 'square', 0.5, 0.4, 20, true); playTone(80, 'sawtooth', 0.4, 0.3, 10); }, // Мощный удар поражения
          winStamp: () => { playTone(400, 'sine', 0.1, 0.2, 800); setTimeout(() => playTone(600, 'sine', 0.4, 0.2, 1200), 100); }, // Звук победы
          alarm: () => { playTone(600, 'square', 0.1, 0.05); setTimeout(() => playTone(800, 'square', 0.1, 0.05), 100); },
          ring: () => { for(let i=0; i<3; i++) { setTimeout(() => playTone(1000, 'sine', 0.1, 0.05), i*200); setTimeout(() => playTone(1300, 'sine', 0.1, 0.05), i*200 + 100); } },
          error: () => playTone(150, 'sawtooth', 0.4, 0.2, 50, true),
          setTension, updateAmbient, stopAmbient
      };
  })();

  /* =========================================================
     УТИЛИТЫ (Вибрация, Частицы, Пишущая машинка)
  ========================================================= */
  const vibrate = (pattern) => { if (typeof window !== 'undefined' && 'navigator' in window && window.navigator.vibrate) window.navigator.vibrate(pattern); };
  
  const burstParticles = (direction) => {
      const color = direction === 'left' ? '#e11d48' : '#10b981';
      for (let i = 0; i < 30; i++) {
         const p = document.createElement('div'); p.className = 'particle'; const size = Math.random() * 10 + 5;
         p.style.width = p.style.height = `${size}px`; p.style.backgroundColor = color; p.style.boxShadow = `0 0 15px ${color}`;
         p.style.left = `${window.innerWidth/2}px`; p.style.top = `${window.innerHeight/2}px`;
         p.style.setProperty('--tx', `${(Math.random()-0.5)*500}px`); p.style.setProperty('--ty', `${(Math.random()-0.5)*500 - 100}px`);
         document.body.appendChild(p); setTimeout(() => p.remove(), 800);
      }
  };

  const TypewriterText = ({ text }) => {
      const [displayed, setDisplayed] = useState("");
      useEffect(() => {
          setDisplayed(""); let i = 0;
          const timer = setInterval(() => { setDisplayed(text.slice(0, i + 1)); i++; if (i >= text.length) clearInterval(timer); }, 15);
          return () => clearInterval(timer);
      }, [text]);
      
      const highlightWords = (str) => {
          const words = ["убью", "штраф", "срочно", "пожар", "вскрыть", "уволю", "быстро", "скорую", "кровь", "эвакуация", "травма", "смерть", "упал", "взрыв", "катастрофа", "ожог", "взрывоопасного", "ампутация"];
          let res = str;
          words.forEach(w => { const regex = new RegExp(`(${w})`, 'gi'); res = res.replace(regex, '<span class="text-rose-600 font-black animate-shake inline-block">$&</span>'); });
          return { __html: res };
      };
      
      return <p dangerouslySetInnerHTML={highlightWords(displayed)} className="text-slate-700 text-[1.15rem] font-semibold text-center leading-relaxed relative z-10" />;
  };

  /* =========================================================
     МОДУЛЬ 5: ГЛАВНОЕ ЯДРО ИГРЫ (App.jsx)
  ========================================================= */
  function Game() {
    const [gameState, setGameState] = useState('start'); 
    const [activeCampaignId, setActiveCampaignId] = useState('main');
    
    const [day, setDay] = useState(1);
    const [stats, setStats] = useState({ safety: 50, budget: 50, loyalty: 50 });
    const [deck, setDeck] = useState([]);
    const [currentCard, setCurrentCard] = useState(null);
    const [nextCard, setNextCard] = useState(null);
    
    const [actionLog, setActionLog] = useState([]); 
    const [deathReason, setDeathReason] = useState("");
    const [isVictory, setIsVictory] = useState(false);
    const [feedback, setFeedback] = useState(null);
    const [timeLeft, setTimeLeft] = useState(8);
    
    const [achievements, setAchievements] = useState([]);
    const [coins, setCoins] = useState(0);
    const [territory, setTerritory] = useState([]); 
    const [playstyle, setPlaystyle] = useState({ s: 0, b: 0, l: 0 }); 
    
    const [phoneState, setPhoneState] = useState({ open: false, tab: 'chats', ringing: false });
    const [contactsUsed, setContactsUsed] = useState({ vv: false, buh: false, prof: false });
    const [hasWarnedLowStats, setHasWarnedLowStats] = useState(false);

    const [isSharing, setIsSharing] = useState(false); 
    const [isBurning, setIsBurning] = useState(false);
    
    const timerRef = useRef(null);
    const engineRef = useRef();

    const [messages, setMessages] = useState([
        { id: 1, from: "Юлия Борисовна", text: "Антон, завтра выездная комиссия ГИТ. Проверь журналы инструктажей!", read: false }
    ]);

    // ЗАГРУЗКА СОХРАНЕНИЙ (Ачивки, Экономика)
    useEffect(() => {
        try { 
            setAchievements(JSON.parse(localStorage.getItem('smena_achievements') || '[]')); 
            setCoins(parseInt(localStorage.getItem('smena_coins')) || 0); 
            setTerritory(JSON.parse(localStorage.getItem('smena_territory') || '[]')); 
        } catch(e) {}
    }, []);

    // ЭФФЕКТЫ ФОНА И ЭМБИЕНТА ПРИ ИЗМЕНЕНИИ ПОКАЗАТЕЛЕЙ
    useEffect(() => {
        if (gameState === 'playing') {
            if (stats.budget < 30) document.body.classList.add('critical-budget'); else document.body.classList.remove('critical-budget');
            if (stats.safety < 30) document.body.classList.add('critical-safety'); else document.body.classList.remove('critical-safety');
            if (stats.loyalty < 30) document.body.classList.add('critical-loyalty'); else document.body.classList.remove('critical-loyalty');
            AudioEngine.updateAmbient(stats);
        } else document.body.className = ''; 
    }, [stats, gameState]);

    const unlockAchievement = (id) => {
        setAchievements(prev => { 
            if (prev.includes(id)) return prev; 
            const newArr = [...prev, id]; 
            try { localStorage.setItem('smena_achievements', JSON.stringify(newArr)); } catch(e) {} 
            return newArr; 
        });
    };

    const addCoins = (amount) => { 
        const newCoins = coins + amount; 
        setCoins(newCoins); 
        localStorage.setItem('smena_coins', newCoins); 
    };

    const getRank = (days) => { 
        if (days <= 5) return "Стажер с блокнотом"; 
        if (days <= 10) return "Младший инспектор"; 
        if (days <= 15) return "Гроза нарушителей"; 
        return "Бог Охраны Труда"; 
    };

    // СТАРТ ИГРЫ
    const startGame = (campaignId) => {
        AudioEngine.init(); vibrate(50); setActiveCampaignId(campaignId);
        setFeedback(null); setIsBurning(false); setIsVictory(false); 
        setPhoneState({ open: false, tab: 'chats', ringing: false }); 
        setActionLog([]); setHasWarnedLowStats(false);
        setDay(1); setContactsUsed({ vv: false, buh: false, prof: false }); 
        setTimeLeft(8); setPlaystyle({ s: 0, b: 0, l: 0 });
        
        // Применяем пассивные баффы от купленных улучшений Территории
        setStats({ 
            safety: 50 + (territory.includes('t_fire') ? 10 : 0), 
            budget: 50 + (territory.includes('t_warehouse') ? 10 : 0), 
            loyalty: 50 + (territory.includes('t_med') ? 10 : 0) 
        });

        // Подготовка колоды для выбранной кампании
        let initialDeck = [...(CAMPAIGNS[campaignId] || CAMPAIGNS.main)]; 
        initialDeck = initialDeck.sort(() => Math.random() - 0.5);
        
        // Привязываем референс к первой карте для программного свайпа (от кнопок)
        initialDeck[0].ref = engineRef; 
        
        setDeck(initialDeck); setCurrentCard(initialDeck[0]); setNextCard(initialDeck[1]); 
        setGameState('playing');
    };

    const handleTimeout = () => {
        unlockAchievement('slow'); setDeathReason("ИТОГ:\nВы растерялись в критической ситуации.\n\nВЕРДИКТ:\nВас отстранили за халатность.");
        setActionLog(prev => [...prev, { text: currentCard.text, choice: "БЕЗДЕЙСТВИЕ", isError: true, rule: currentCard.rule || "Нарушение регламента." }]);
        gameOverSequence(false);
    };

    const gameOverSequence = (victory = false) => {
        setIsVictory(victory); setIsBurning(!victory); AudioEngine.stopAmbient();
        if (Math.floor(day / 2) > 0) addCoins(Math.floor(day / 2));
        
        setTimeout(() => { 
            setGameState('gameover'); vibrate([500, 200, 500]); 
            setTimeout(() => { if (victory) AudioEngine.winStamp(); else AudioEngine.stamp(); }, 100); 
        }, 1200); 
    };

    // ТАЙМЕР ДЛЯ СРОЧНЫХ КАРТОЧЕК
    useEffect(() => {
        if (gameState === 'playing' && currentCard?.isUrgent && !phoneState.open && !feedback) {
            timerRef.current = setInterval(() => { 
                setTimeLeft(prev => { 
                    if (prev <= 3 && prev > 1) AudioEngine.alarm(); 
                    if (prev <= 1) { clearInterval(timerRef.current); handleTimeout(); return 0; } 
                    return prev - 1; 
                }); 
            }, 1000);
            return () => clearInterval(timerRef.current);
        }
    }, [gameState, currentCard, phoneState.open, feedback]);

    // ТРИГГЕР ЗВОНКА ТЕЛЕФОНА В КРИТИЧЕСКОЙ СИТУАЦИИ
    useEffect(() => {
        let hintTimer; const needsHelp = stats.safety < 40 || stats.budget < 40 || stats.loyalty < 40;
        if (needsHelp && (!contactsUsed.vv || !contactsUsed.buh || !contactsUsed.prof) && gameState === 'playing' && !phoneState.open && !hasWarnedLowStats) {
            AudioEngine.msg(); setPhoneState({...phoneState, ringing: true}); setHasWarnedLowStats(true); 
        } else if (!needsHelp) { 
            setHasWarnedLowStats(false); setPhoneState({...phoneState, ringing: false});
        }
        return () => clearTimeout(hintTimer);
    }, [stats, contactsUsed, gameState, phoneState.open, hasWarnedLowStats]);

    // ОБРАБОТКА СВАЙПА
    const handleSwipe = (direction) => {
      clearInterval(timerRef.current);
      const effects = direction === 'left' ? currentCard.onLeft : currentCard.onRight;
      
      setPlaystyle(prev => ({ s: prev.s + (effects.safety > 0 ? effects.safety : 0), b: prev.b + (effects.budget > 0 ? effects.budget : 0), l: prev.l + (effects.loyalty > 0 ? effects.loyalty : 0) }));

      // Логирование ошибок для Аттестации
      if (effects.safety < -15 || effects.budget < -15) {
          AudioEngine.error(); 
          setActionLog(prev => [...prev, { text: currentCard.text, choice: direction === 'left' ? currentCard.leftChoice : currentCard.rightChoice, isError: true, rule: currentCard.rule || "Нарушение регламента." }]);
      }

      const newSafety = Math.min(100, Math.max(0, stats.safety + effects.safety)); 
      const newBudget = Math.min(100, Math.max(0, stats.budget + effects.budget)); 
      const newLoyalty = Math.min(100, Math.max(0, stats.loyalty + effects.loyalty));
      
      setStats({ safety: newSafety, budget: newBudget, loyalty: newLoyalty });
      
      setTimeout(() => {
          setFeedback({ text: effects.msg, safety: effects.safety, budget: effects.budget, loyalty: effects.loyalty });
          setTimeout(() => {
              setFeedback(null); 
              // Проверка на проигрыш
              if (newSafety <= 0 || newBudget <= 0 || newLoyalty <= 0) {
                  let res = newSafety <= 0 ? "Тяжелый НС всплыл в прокуратуре." : newBudget <= 0 ? "Вы разорили отель закупками." : "Рабочие устроили бунт.";
                  setDeathReason(`ПОСЛЕДНЕЕ РЕШЕНИЕ:\n${effects.msg}\n\nВЕРДИКТ:\n${res}`);
                  if (newSafety <= 0 && newBudget >= 70) unlockAchievement('greed'); 
                  if (newLoyalty <= 0 && newSafety >= 70) unlockAchievement('tyrant');
                  gameOverSequence(false); return;
              }
              
              setDay(prev => prev + 1); let newDeck = deck.slice(1);
              
              // Проверка на победу (колода кончилась)
              if (newDeck.length === 0) {
                  unlockAchievement('pro'); setDeathReason("Сценарии закончились, вы успешно прошли смену!"); gameOverSequence(true); return;
              }
              
              newDeck[0].ref = engineRef;
              setDeck(newDeck); setCurrentCard(newDeck[0]); setNextCard(newDeck[1]); 
              if(newDeck[0].isUrgent) setTimeLeft(8);
          }, 2000); 
      }, 400); // 400мс - синхронизировано со временем улета физической карты
    };

    // ФУНКЦИИ СМАРТФОНА
    const useContact = (type) => {
        if (contactsUsed[type]) return;
        AudioEngine.ring(); vibrate([100, 50, 100]); setContactsUsed({ ...contactsUsed, [type]: true });
        let newStats = { ...stats };
        if (type === 'vv') { newStats = { safety: 60, budget: 60, loyalty: 60 }; }
        if (type === 'buh') { newStats.budget = Math.min(100, newStats.budget + 30); newStats.loyalty = Math.max(0, newStats.loyalty - 20); }
        if (type === 'prof') { newStats.loyalty = Math.min(100, newStats.loyalty + 30); newStats.budget = Math.max(0, newStats.budget - 20); }
        setStats(newStats); setPhoneState({ ...phoneState, open: false });
    };

    // ГЕНЕРАЦИЯ УДОСТОВЕРЕНИЯ (ШЕРИНГ)
    const shareResult = async () => {
        setIsSharing(true); await new Promise(r => setTimeout(r, 100)); 
        const badgeElem = document.getElementById('share-badge-wrap'); 
        const oldBodyOverflow = document.body.style.overflow;
        
        document.body.style.overflow = 'visible'; 
        badgeElem.style.top = '0px'; badgeElem.style.left = '0px'; badgeElem.style.opacity = '1';
        
        await new Promise(r => setTimeout(r, 200));
        try {
            const canvas = await html2canvas(badgeElem, { scale: 2, backgroundColor: '#0f172a', windowWidth: 600, windowHeight: 900 });
            const dataUrl = canvas.toDataURL('image/png'); const blob = await (await fetch(dataUrl)).blob(); const file = new File([blob], 'smena-result.png', { type: 'image/png' });
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) await navigator.share({ title: 'Мой результат в СМЕНЕ', text: `Я прошел ${day} смен! Звание: ${getRank(day)}`, files: [file] });
            else { const a = document.createElement('a'); a.href = dataUrl; a.download = `Smena_${day}.png`; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
        } catch (e) { alert("Ошибка сохранения."); } finally {
            document.body.style.overflow = oldBodyOverflow; badgeElem.style.top = '-9999px'; badgeElem.style.left = '-9999px'; badgeElem.style.opacity = '0'; setIsSharing(false);
        }
    };

    const getTimeClass = () => day <= 3 ? 'theme-morning' : day <= 7 ? 'theme-day' : day <= 10 ? 'theme-evening' : 'theme-night';

    /* РЕНДЕР: ЭКРАН ИГРА ОКОНЧЕНА */
    if (gameState === 'gameover') {
      const totalPoints = (playstyle.s + playstyle.b + playstyle.l) || 1;
      const sNorm = (playstyle.s / totalPoints) * 40; const bNorm = (playstyle.b / totalPoints) * 40; const lNorm = (playstyle.l / totalPoints) * 40;
      const points = `50,${50-sNorm} ${50+bNorm*0.866},${50+bNorm*0.5} ${50-lNorm*0.866},${50+lNorm*0.5}`;
      const moneyValue = (stats.budget * 100000).toLocaleString('ru-RU');

      return (
        <div id="gameover-container" className="flex flex-col items-center justify-center h-[100dvh] px-6 text-center relative z-20 bg-[#0f172a] overflow-hidden">
            <div id="share-badge-wrap" className="share-badge">
                <div className="badge-logo">🛡️ СМЕНА</div>
                <div className="badge-title">Удостоверение СОТ</div><div className="badge-sub">Официальный результат</div>
                <div className="badge-days-label">{isVictory ? 'Завершено:' : 'Продержался:'}</div><div className="badge-days">{day}</div>
                <div className="badge-days-label" style={{marginTop:'10px', marginBottom:'40px'}}>смен</div>
                <div className="badge-rank">{getRank(day)}</div>
                <div className="radar-box">
                    <svg viewBox="0 0 100 100" width="300" height="300">
                        <polygon points="50,10 84.6,70 15.4,70" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.5"/>
                        <polygon points="50,23.3 73.1,63.3 26.9,63.3" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.5"/>
                        <polygon points="50,36.6 61.5,56.6 38.5,56.6" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.5"/>
                        <line x1="50" y1="50" x2="50" y2="10" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
                        <line x1="50" y1="50" x2="84.6" y2="70" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
                        <line x1="50" y1="50" x2="15.4" y2="70" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
                        <polygon points={points} fill="rgba(56, 189, 248, 0.6)" stroke="#38bdf8" strokeWidth="2" strokeLinejoin="round"/>
                        <text x="50" y="5" fill="#f8fafc" fontSize="6" textAnchor="middle" fontWeight="bold">Правила</text>
                        <text x="90" y="75" fill="#f8fafc" fontSize="6" textAnchor="middle" fontWeight="bold">Бюджет</text>
                        <text x="10" y="75" fill="#f8fafc" fontSize="6" textAnchor="middle" fontWeight="bold">Люди</text>
                    </svg>
                </div>
            </div>

            <div className="absolute inset-0 overflow-y-auto custom-scroll flex flex-col items-center p-6">
                <div className="text-7xl mb-2 mt-10">{isVictory ? '🎉' : '💀'}</div>
                <h1 className={`text-3xl font-black uppercase tracking-widest drop-shadow-lg mb-4 ${isVictory ? 'text-emerald-500' : 'text-rose-500'}`}>
                    {isVictory ? 'Аттестация Сдана' : 'Смена Провалена'}
                </h1>
                
                <div className={`bg-slate-800 border-2 p-4 rounded-3xl mb-4 max-w-sm w-full shadow-2xl ${isVictory ? 'border-emerald-900' : 'border-rose-900'}`}>
                    <p className="text-slate-200 text-sm whitespace-pre-line text-left font-medium leading-relaxed mb-4">{deathReason}</p>
                    <div className="border-t border-slate-700 pt-4 flex justify-between text-xs font-bold text-slate-400">
                        <div>💰 Остаток: {moneyValue} ₽</div>
                        <div>🛡️ ТБ: {stats.safety}%</div>
                    </div>
                </div>
                
                <div className="text-5xl font-black text-blue-400 mb-2 drop-shadow-lg">{day} <span className="text-xl">карточек</span></div>
                <div className={`stamp ${isVictory ? 'stamp-victory' : ''}`}>{isVictory ? 'АТТЕСТОВАН' : 'УВОЛЕН'}</div>
                
                <div className="flex flex-col w-full max-w-xs gap-3 mt-8 mb-10 pb-10">
                   <button onClick={shareResult} disabled={isSharing} className={`bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black py-4 w-full rounded-full shadow-[0_0_20px_rgba(37,99,235,0.4)] tracking-widest uppercase flex justify-center gap-2 ${isSharing ? 'opacity-70' : 'active:scale-95 transition-transform'}`}>
                       {isSharing ? '⌛ Генерируем...' : '📸 Поделиться'}
                   </button>
                   <button onClick={() => setGameState('start')} className="bg-slate-700 text-white font-black py-4 w-full rounded-full border border-slate-500 shadow-lg tracking-widest uppercase active:scale-95 transition-transform">В Главное меню</button>
                </div>
            </div>
        </div>
      );
    }

    /* РЕНДЕР: ГЛАВНОЕ МЕНЮ */
    if (gameState === 'start') {
      return (
        <div className="flex flex-col items-center justify-center h-[100dvh] px-6 text-center animate-fade-in relative theme-morning">
          <div className="mesh-container"><div className="blob blob-1 w-[400px] h-[400px] top-[-10%] left-[-10%] animate-blob"></div><div className="blob blob-2 w-[350px] h-[350px] bottom-[-10%] right-[-10%] animate-blob" style={{animationDelay: '2s'}}></div></div>
          <div className="grid-overlay"></div><div className="noise"></div>
          <div className="text-8xl mb-4 drop-shadow-[0_0_30px_rgba(14,165,233,0.6)] relative z-10 mt-10">👷</div>
          <h1 className="text-6xl font-black text-white mb-2 tracking-tighter">СМЕНА 3.0</h1>
          <p className="text-lg font-bold text-blue-400 mb-8 uppercase tracking-widest">Аттестация СОТ</p>
          <div className="w-full max-w-xs flex flex-col gap-3 relative z-50">
              <button onClick={() => startGame('main')} className="bg-blue-600 text-white font-black py-4 rounded-full text-lg shadow-[0_0_20px_rgba(37,99,235,0.6)] uppercase border-2 border-blue-400 active:scale-95 transition-transform">Начать Смену</button>
          </div>
        </div>
      );
    }

    /* РЕНДЕР: ИГРОВОЙ ПРОЦЕСС */
    return (
      <div className={`flex flex-col h-[100dvh] overflow-hidden relative z-10 transition-all duration-1000 ${getTimeClass()}`}>
        <div className="hazard-border"></div><div className="vignette-anger"></div>
        <div className="mesh-container"><div className="blob blob-1 w-[500px] h-[500px] top-[-20%] left-[-10%] animate-blob"></div><div className="blob blob-2 w-[450px] h-[450px] bottom-[-10%] right-[-10%] animate-blob" style={{animationDelay: '3s'}}></div></div>
        <div className="grid-overlay"></div><div className="noise"></div>

        {/* СМАРТФОН */}
        <button onClick={() => { setMessages(messages.map(m=>({...m, read: true}))); setPhoneState({open: true, tab: 'chats', ringing: false})}} className={`physical-phone ${phoneState.ringing ? 'ringing' : ''}`}>
            <div className="phone-screen-mini">
                <span className="text-[10px] text-slate-500 absolute bottom-1">09:41</span>
                {messages.filter(m=>!m.read).length > 0 && <div className="phone-badge-diegetic"></div>}
            </div>
        </button>

        {phoneState.open && (
            <div className="absolute inset-0 z-[55] bg-slate-900/90 backdrop-blur-md flex flex-col p-4 animate-slideUp">
                <div className="bg-slate-800 flex-1 rounded-3xl border-4 border-slate-700 shadow-2xl flex flex-col overflow-hidden relative">
                    <div className="bg-slate-900 p-4 flex justify-between items-center border-b border-slate-700">
                        <div className="font-black text-xl text-white">Контакты СОТ</div>
                        <button onClick={() => setPhoneState({...phoneState, open: false})} className="text-slate-400 text-3xl font-bold hover:text-white">×</button>
                    </div>
                    <div className="flex bg-slate-800 p-2 gap-2 border-b border-slate-700">
                        <button onClick={()=>setPhoneState({...phoneState, tab: 'chats'})} className={`flex-1 py-2 rounded-xl font-bold text-sm transition-colors ${phoneState.tab === 'chats' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>💬 Чаты</button>
                        <button onClick={()=>setPhoneState({...phoneState, tab: 'contacts'})} className={`flex-1 py-2 rounded-xl font-bold text-sm transition-colors ${phoneState.tab === 'contacts' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>📇 Контакты</button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-4 custom-scroll">
                        {phoneState.tab === 'chats' && messages.map(msg => (
                            <div key={msg.id} className="bg-slate-700 p-4 rounded-2xl rounded-tl-none self-start max-w-[85%] border border-slate-600 shadow-md">
                                <div className="text-blue-400 font-bold text-[10px] uppercase mb-1">{msg.from}</div><div className="text-white text-sm">{msg.text}</div>
                            </div>
                        ))}
                        {phoneState.tab === 'contacts' && (
                            <div className="p-3 bg-slate-700 rounded-xl border border-slate-600 flex justify-between items-center shadow-md">
                                <div><div className="text-white font-bold">В.В. (Директор)</div><div className="text-emerald-400 text-[10px] uppercase">Восстановит всё до 60%</div></div>
                                <button onClick={()=>useContact('vv')} disabled={contactsUsed.vv} className={`px-4 py-2 rounded-lg font-black text-sm ${!contactsUsed.vv ? 'bg-emerald-500 text-slate-900 shadow-md active:scale-95' : 'bg-slate-600 text-slate-400'}`}>☎️</button>
                            </div>
                        )}
                    </div>
                </div>
            </div>
        )}

        {feedback && (
            <div className="absolute inset-0 z-[60] flex items-center justify-center p-4 animate-fade-in bg-slate-900/80 backdrop-blur-md">
                <div className="bg-white p-8 rounded-[32px] shadow-[0_20px_50px_rgba(0,0,0,0.5)] text-center border-4 border-slate-200 flex flex-col items-center justify-center max-w-sm w-full">
                    <p className="text-slate-900 font-black text-xl mb-8 leading-relaxed whitespace-pre-line">{feedback.text}</p>
                </div>
            </div>
        )}

        {/* ПАНЕЛЬ ПРИБОРОВ */}
        <div className={`dashboard-panel`}>
            <div className="flex justify-between items-center mb-2 px-2">
                <div className="font-black text-lg text-slate-400 tracking-widest uppercase">КАРТА {day}</div>
                {currentCard?.isUrgent && !feedback && <div className="text-lg font-black text-rose-500 bg-rose-950 px-4 py-1 rounded-full border-2 border-rose-500 animate-pulse shadow-[0_0_15px_rgba(225,29,72,0.5)]">⏱️ 0:0{timeLeft}</div>}
            </div>
            <div className="flex justify-between items-end gap-4 px-1 mt-4">
                <LoyaltyBar value={stats.loyalty} id="bar-loyalty" />
                <LCDDisplay id="lcd-budget" value={stats.budget} icon="" label="Бюджет" />
                <AnalogGauge id="gauge-safety" value={stats.safety} icon="🛡️" label="Безопасность" />
            </div>
        </div>

        {/* ДВИЖОК СВАЙПОВ */}
        <div className="flex-1 relative flex items-center justify-center p-2">
            <CardEngine card={currentCard} nextCard={nextCard} onSwipe={handleSwipe} isBurning={isBurning} />
        </div>

        {/* КНОПКИ УПРАВЛЕНИЯ (ДЛЯ ПК) */}
        {!feedback && !isBurning && !phoneState.open && (
            <div className="p-4 pb-6 w-full max-w-[400px] mx-auto flex justify-between gap-3 z-20">
                <button onClick={() => engineRef.current?.forceSwipe('left')} className="flex-1 bg-rose-100/90 text-rose-700 border-b-4 border-rose-300 font-black py-3 px-2 rounded-2xl uppercase text-[10px] sm:text-[11px] tracking-wider active:scale-95 transition-transform flex items-center justify-center leading-tight shadow-lg backdrop-blur-md cursor-pointer min-h-[56px] text-center">{currentCard?.leftChoice || 'ОТКАЗАТЬ'}</button>
                <button onClick={() => engineRef.current?.forceSwipe('right')} className="flex-1 bg-emerald-100/90 text-emerald-700 border-b-4 border-emerald-300 font-black py-3 px-2 rounded-2xl uppercase text-[10px] sm:text-[11px] tracking-wider active:scale-95 transition-transform flex items-center justify-center leading-tight shadow-lg backdrop-blur-md cursor-pointer min-h-[56px] text-center">{currentCard?.rightChoice || 'РАЗРЕШИТЬ'}</button>
            </div>
        )}
      </div>
    );
  }
  
  // ИНИЦИАЛИЗАЦИЯ REACT
  createRoot(document.getElementById('game-root')).render(<Game />);
</script>

</body>
</html>
