<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>СМЕНА 3.0: Симулятор СОТ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err)));
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
        corePlugins: { preflight: false },
        theme: {
            extend: {
                keyframes: {
                    shake: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-2px)' }, '75%': { transform: 'translateX(2px)' } },
                    blob: { '0%': { transform: 'translate(0, 0) scale(1)' }, '33%': { transform: 'translate(30px, -50px) scale(1.1)' }, '66%': { transform: 'translate(-20px, 20px) scale(0.9)' }, '100%': { transform: 'translate(0, 0) scale(1)' } },
                    flicker: { '0%, 100%': { opacity: 1 }, '50%': { opacity: 0.3 }, '70%': { opacity: 0.8 }, '80%': { opacity: 0.1 } },
                    hazardFlash: { '0%, 100%': { opacity: 0.8, boxShadow: 'inset 0 0 50px rgba(225, 29, 72, 0.4)' }, '50%': { opacity: 1, boxShadow: 'inset 0 0 100px rgba(225, 29, 72, 0.8)' } },
                    slideUp: { '0%': { transform: 'translateY(100%)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } },
                    predictPulse: { '0%, 100%': { transform: 'scale(1)', filter: 'drop-shadow(0 0 5px rgba(225,29,72,0.8))' }, '50%': { transform: 'scale(1.05)', filter: 'drop-shadow(0 0 15px rgba(225,29,72,1))' } },
                    phoneRing: { '0%, 100%': { transform: 'rotate(0deg) translateX(0)' }, '25%': { transform: 'rotate(-3deg) translateX(-3px)' }, '75%': { transform: 'rotate(3deg) translateX(3px)' } }
                },
                animation: {
                    shake: 'shake 0.3s infinite', blob: 'blob 7s infinite alternate', flicker: 'flicker 3s infinite',
                    hazard: 'hazardFlash 1.5s infinite', slideUp: 'slideUp 0.3s ease-out forwards', predictPulse: 'predictPulse 0.5s infinite', phoneRing: 'phoneRing 0.2s infinite'
                }
            }
        }
    }
  </script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; font-family: system-ui, -apple-system, sans-serif; }
    body { margin: 0; padding: 0; background-color: #020617; color: #f8fafc; overflow: hidden; height: 100dvh; width: 100vw; perspective: 1000px; transition: filter 0.5s; }

    /* ГЛОБАЛЬНЫЕ ЭФФЕКТЫ ЧС */
    body.critical-budget { filter: grayscale(0.7) contrast(1.2); }
    body.critical-budget .dashboard-panel { animation: flicker 4s infinite; }
    .hazard-border { position: fixed; inset: 0; z-index: 99; pointer-events: none; opacity: 0; transition: opacity 0.5s; border: 12px solid transparent; border-image: repeating-linear-gradient(45deg, #fbbf24, #fbbf24 20px, #1e293b 20px, #1e293b 40px) 12; }
    body.critical-safety .hazard-border { opacity: 1; animation: hazard 2s infinite; }
    .vignette-anger { position: fixed; inset: 0; z-index: 30; pointer-events: none; box-shadow: inset 0 0 150px rgba(225, 29, 72, 0); transition: box-shadow 1s; }
    body.critical-loyalty .vignette-anger { box-shadow: inset 0 0 200px rgba(153, 27, 27, 0.6); animation: heartbeat 2s infinite; }

    /* ФОНЫ */
    .mesh-container { position: fixed; inset: 0; z-index: -2; overflow: hidden; background: #020617; }
    .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.4; transition: background-color 2s ease; }
    .grid-overlay { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
    .noise { position: fixed; inset: 0; z-index: -1; opacity: 0.04; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }

    .theme-morning .blob-1 { background: #0ea5e9; } .theme-morning .blob-2 { background: #38bdf8; }
    .theme-day .blob-1 { background: #2563eb; } .theme-day .blob-2 { background: #10b981; }
    .theme-evening .blob-1 { background: #f59e0b; } .theme-evening .blob-2 { background: #7c3aed; }
    .theme-night .blob-1 { background: #1e293b; } .theme-night .blob-2 { background: #4c1d95; }

    /* ПРЕМИАЛЬНАЯ ПАНЕЛЬ ПРИБОРОВ */
    .dashboard-panel { 
        background: linear-gradient(180deg, rgba(30,41,59,0.95) 0%, rgba(15,23,42,0.95) 100%); 
        border-bottom: 2px solid rgba(255,255,255,0.1); 
        box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1); 
        border-radius: 0 0 32px 32px; position: relative; z-index: 20; padding: 15px; 
        backdrop-filter: blur(10px);
    }
    .dashboard-panel::before, .dashboard-panel::after { content: '+'; position: absolute; top: 10px; color: #475569; font-size: 14px; font-weight: 900; } 
    .dashboard-panel::before { left: 25px; } .dashboard-panel::after { right: 25px; }

    /* АНАЛОГОВЫЙ ДАТЧИК (Безопасность) */
    .analog-gauge { width: 70px; height: 35px; background: #020617; border-radius: 70px 70px 0 0; border: 3px solid #334155; border-bottom: none; position: relative; overflow: hidden; box-shadow: inset 0 5px 15px rgba(0,0,0,0.9); display: flex; justify-content: center; }
    .gauge-scale { position: absolute; width: 200%; height: 200%; bottom: 0; left: -50%; background: conic-gradient(from 270deg at 50% 50%, #ef4444 0deg, #f59e0b 90deg, #10b981 180deg); opacity: 0.8; border-radius: 50%; filter: blur(2px); }
    .gauge-needle { position: absolute; bottom: 0; width: 2px; height: 32px; background: #fff; transform-origin: bottom center; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 5px rgba(0,0,0,1); border-radius: 2px; }
    .gauge-needle::after { content:''; position:absolute; bottom:-4px; left:-3px; width:8px; height:8px; background:#94a3b8; border-radius:50%; border: 2px solid #0f172a; }

    /* LCD ДИСПЛЕЙ (Бюджет) */
    .lcd-screen { background: #022c15; border: 3px solid #064e3b; border-radius: 8px; box-shadow: inset 0 0 20px rgba(0,0,0,1), 0 0 10px rgba(16,185,129,0.2); font-family: 'Courier New', monospace; color: #34d399; text-shadow: 0 0 10px #10b981; padding: 6px 10px; font-weight: 900; font-size: 1.1rem; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; min-width: 140px; transition: all 0.3s; }
    .lcd-screen.danger { color: #ef4444; text-shadow: 0 0 15px #ef4444; background: #2c0202; border-color: #7f1d1d; box-shadow: inset 0 0 20px rgba(0,0,0,1), 0 0 15px rgba(239,68,68,0.4); animation: flicker 1.5s infinite; }

    /* ШКАЛА ЛОЯЛЬНОСТИ */
    .loyalty-bar-container { width: 80px; height: 16px; background: #020617; border-radius: 10px; border: 2px solid #334155; position: relative; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); }
    .loyalty-bar-fill { height: 100%; border-radius: 8px; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.5s; box-shadow: 0 0 10px inset rgba(255,255,255,0.3); }

    /* ПРЕДСКАЗАНИЯ (Анимации при натяжении карты) */
    .gauge-predict-danger { animation: predictPulse 0.5s infinite, shake 0.2s infinite; border-color: #ef4444 !important; box-shadow: 0 0 25px rgba(239, 68, 68, 0.8) !important; }
    .lcd-predict-danger { animation: predictPulse 0.5s infinite, shake 0.2s infinite; border-color: #ef4444 !important; color: #ef4444 !important; text-shadow: 0 0 20px #ef4444 !important; background: #2c0202 !important; }
    .avatar-wrapper { display: inline-block; transition: transform 0.2s; }
    .avatar-predict { transform: scale(1.3) rotate(5deg); filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6)); transition: all 0.2s; }

    /* ФИЗИЧЕСКИЙ СМАРТФОН */
    .physical-phone { position: absolute; right: -10px; top: 30vh; width: 65px; height: 130px; background: #0f172a; border: 4px solid #475569; border-radius: 16px 0 0 16px; box-shadow: -15px 15px 30px rgba(0,0,0,0.9), inset -2px 0 10px rgba(255,255,255,0.15); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 50; display: flex; align-items: center; justify-content: flex-start; padding-left: 6px; cursor: pointer; }
    .physical-phone::after { content: '📱'; font-size: 1.5rem; position: absolute; right: 15px; opacity: 0.2; }
    .physical-phone:hover { transform: translateX(-15px); }
    .physical-phone.ringing { border-color: #e11d48; box-shadow: -15px 15px 30px rgba(225,29,72,0.4), inset -2px 0 10px rgba(225,29,72,0.3); animation: phoneRing 0.3s infinite; }
    .phone-screen-mini { width: 45px; height: 110px; background: #020617; border-radius: 8px; border: 1px solid #1e293b; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; z-index: 2; }
    .phone-screen-mini::before { content:''; position:absolute; top:4px; width:15px; height:3px; background:#334155; border-radius:2px; }
    .phone-badge-diegetic { position: absolute; top: 10px; right: 5px; background: #e11d48; width: 14px; height: 14px; border-radius: 50%; box-shadow: 0 0 15px #e11d48; border: 2px solid #0f172a; animation: predictPulse 1s infinite;}

    /* КАРТОЧКА (Без CSS transform transition для плавного 3D-параллакса) */
    .card-stack { position: relative; width: 100%; max-width: 340px; aspect-ratio: 3/4.2; margin: 0 auto; z-index: 10; transform-style: preserve-3d; }
    .swipe-card { position: absolute; inset: 0; background: #ffffff; border-radius: 32px; border: 2px solid rgba(255,255,255,0.5); display: flex; flex-direction: column; box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.7); transform-style: preserve-3d; will-change: transform; }
    .glare { position: absolute; inset: 0; border-radius: 30px; pointer-events: none; z-index: 5; mix-blend-mode: overlay; transition: opacity 0.2s; }
    .next-card { position: absolute; inset: 0; background: #f1f5f9; border-radius: 32px; border: 2px solid #cbd5e1; transform: scale(0.92) translateY(20px); opacity: 0.8; z-index: -1; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

    .choice-indicator { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 16px; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0; border: 4px solid; z-index: 10; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); box-shadow: 0 15px 35px rgba(0,0,0,0.3); transition: opacity 0.2s; white-space: nowrap; }
    .choice-left { color: #e11d48; border-color: #e11d48; } 
    .choice-right { color: #10b981; border-color: #10b981; }

    /* НОВЫЕ КНОПКИ УПРАВЛЕНИЯ ВНИЗУ */
    .action-buttons { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; padding: 0 20px; z-index: 40; }
    .btn-action { flex: 1; max-width: 170px; padding: 16px 10px; border-radius: 24px; font-weight: 900; font-size: 13px; text-transform: uppercase; box-shadow: 0 15px 25px rgba(0,0,0,0.4); backdrop-filter: blur(10px); transition: transform 0.1s, box-shadow 0.1s; border-bottom: 5px solid; display: flex; align-items: center; justify-content: center; letter-spacing: 1px; cursor: pointer;}
    .btn-action:active { transform: translateY(5px); border-bottom-width: 0px; box-shadow: 0 5px 10px rgba(0,0,0,0.4); }
    .btn-reject { background: rgba(255,228,230,0.95); color: #e11d48; border-color: #f43f5e; }
    .btn-accept { background: rgba(209,250,229,0.95); color: #059669; border-color: #10b981; }

    /* ПЕЧАТИ */
    .stamp { position: absolute; top: 15%; left: 50%; margin-left: -180px; font-size: 5.5rem; font-weight: 900; color: #e11d48; border: 10px solid #e11d48; padding: 15px 40px; border-radius: 20px; transform: rotate(-15deg); pointer-events: none; z-index: 100; text-shadow: 0 0 15px rgba(225,29,72,0.8); box-shadow: 0 0 30px rgba(225,29,72,0.8), inset 0 0 30px rgba(225,29,72,0.8); animation: stamp-smash 0.5s cubic-bezier(0.1, 2, 0.5, 1) forwards; opacity: 0; }
    .stamp.stamp-victory { color: #10b981; border-color: #10b981; text-shadow: 0 0 15px rgba(16,185,129,0.8); box-shadow: 0 0 30px rgba(16,185,129,0.8), inset 0 0 30px rgba(16,185,129,0.8); }
    @keyframes stamp-smash { 0% { transform: scale(5) rotate(-20deg); opacity: 0; } 50% { transform: scale(1) rotate(-15deg); opacity: 1; } 100% { transform: scale(1) rotate(-15deg); opacity: 1; } }

    /* ЧАСТИЦЫ */
    .particle { position: absolute; pointer-events: none; border-radius: 50%; z-index: 100; animation: fade-out 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
    @keyframes fade-out { 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

    /* ШЕРИНГ */
    .share-badge { position: absolute; top: -9999px; left: -9999px; width: 600px; height: 900px; background: linear-gradient(135deg, #0f172a, #1e3a8a); padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; color: white; border: 20px solid #e2e8f0; border-radius: 40px; box-sizing: border-box; z-index: -10; opacity: 0; pointer-events: none;}
    .badge-logo { font-size: 6rem; margin-bottom: 20px; text-shadow: 0 10px 10px rgba(0,0,0,0.5);} 
    .badge-title { font-size: 3.5rem; font-weight: 900; margin: 0; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px;} 
    .badge-sub { font-size: 1.8rem; color: #94a3b8; margin-bottom: 30px; font-weight: bold;} 
    .badge-days { font-size: 8rem; font-weight: 900; margin: 0; line-height: 1; color: #f8fafc; text-shadow: 0 10px 30px rgba(0,0,0,0.5); } 
    .badge-days-label { font-size: 2.2rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 30px; font-weight: 900;} 
    .badge-rank { font-size: 2.8rem; font-weight: 700; color: #fbbf24; background: rgba(255,255,255,0.1); padding: 20px 50px; border-radius: 30px; border: 2px solid rgba(251, 191, 36, 0.5); text-align: center; line-height: 1.2; margin-bottom: 30px;}
    .radar-box { width: 100%; display: flex; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; margin-bottom: 10px;}
    
    .custom-scroll::-webkit-scrollbar { width: 6px; } 
    .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; } 
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
  </style>
</head>
<body>

<div id="game-root"></div>

<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script type="text/babel" src="js/CardEngine.jsx"></script>
<script type="text/babel" src="js/App.jsx"></script>

</body>
</html>
