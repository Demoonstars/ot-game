<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>СМЕНА 3.0: Симулятор СОТ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1c">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
        corePlugins: { preflight: false },
        theme: {
            extend: {
                keyframes: {
                    shake: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-2px)' }, '75%': { transform: 'translateX(2px)' } },
                    shakeHard: {
                        '0%, 100%': { transform: 'translate(0, 0) rotate(0)' },
                        '20%': { transform: 'translate(-8px, 6px) rotate(-1deg)' },
                        '40%': { transform: 'translate(6px, -8px) rotate(1deg)' },
                        '60%': { transform: 'translate(-6px, -6px) rotate(0)' },
                        '80%': { transform: 'translate(8px, 6px) rotate(0)' }
                    },
                    blob: { '0%': { transform: 'translate(0, 0) scale(1)' }, '33%': { transform: 'translate(30px, -50px) scale(1.1)' }, '66%': { transform: 'translate(-20px, 20px) scale(0.9)' }, '100%': { transform: 'translate(0, 0) scale(1)' } },
                    flicker: { '0%, 100%': { opacity: 1 }, '50%': { opacity: 0.3 }, '70%': { opacity: 0.8 }, '80%': { opacity: 0.1 } },
                    hazardFlash: { '0%, 100%': { opacity: 0.8, boxShadow: 'inset 0 0 50px rgba(225, 29, 72, 0.4)' }, '50%': { opacity: 1, boxShadow: 'inset 0 0 100px rgba(225, 29, 72, 0.8)' } },
                    slideUp: { '0%': { transform: 'translateY(100%)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } },
                    predictPulse: { '0%, 100%': { transform: 'scale(1)', filter: 'drop-shadow(0 0 10px rgba(225,29,72,0.8))' }, '50%': { transform: 'scale(1.05)', filter: 'drop-shadow(0 0 25px rgba(225,29,72,1))' } },
                    phoneRing: { '0%, 100%': { transform: 'rotate(0deg) translateX(0)' }, '25%': { transform: 'rotate(-4deg) translateX(-4px)' }, '75%': { transform: 'rotate(4deg) translateX(4px)' } }
                },
                animation: {
                    shake: 'shake 0.3s infinite', 
                    'shake-hard': 'shakeHard 0.4s cubic-bezier(.36,.07,.19,.97) both',
                    blob: 'blob 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1)', flicker: 'flicker 3s infinite',
                    hazard: 'hazardFlash 1.5s infinite', slideUp: 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards', 
                    predictPulse: 'predictPulse 0.5s infinite', phoneRing: 'phoneRing 0.2s infinite'
                }
            }
        }
    }
  </script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { margin: 0; padding: 0; background-color: #0a0f1c; color: #f8fafc; overflow: hidden; height: 100dvh; width: 100vw; perspective: 1200px; transition: filter 0.5s; }

    body.critical-budget { filter: grayscale(0.4) contrast(1.2) sepia(0.2); }
    body.critical-budget .dashboard-panel { animation: flicker 4s infinite; }
    .hazard-border { position: fixed; inset: 0; z-index: 99; pointer-events: none; opacity: 0; transition: opacity 0.5s; border: 12px solid transparent; border-image: repeating-linear-gradient(45deg, #fbbf24, #fbbf24 20px, #1e293b 20px, #1e293b 40px) 12; }
    body.critical-safety .hazard-border { opacity: 1; animation: hazard 2s infinite; }
    .vignette-anger { position: fixed; inset: 0; z-index: 30; pointer-events: none; box-shadow: inset 0 0 150px rgba(225, 29, 72, 0); transition: box-shadow 1s; }
    body.critical-loyalty .vignette-anger { box-shadow: inset 0 0 250px rgba(153, 27, 27, 0.7); animation: heartbeat 2s infinite; }

    /* ПРЕМИУМ ФОНЫ */
    .mesh-container { position: fixed; inset: 0; z-index: -2; overflow: hidden; background: radial-gradient(circle at 50% 50%, #111827 0%, #030712 100%); }
    .blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.5; transition: background-color 3s ease; }
    .grid-overlay { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.8; }
    
    .theme-morning .blob-1 { background: #0284c7; } .theme-morning .blob-2 { background: #38bdf8; }
    .theme-day .blob-1 { background: #2563eb; } .theme-day .blob-2 { background: #059669; }
    .theme-evening .blob-1 { background: #d97706; } .theme-evening .blob-2 { background: #7c3aed; }
    .theme-night .blob-1 { background: #1e1b4b; } .theme-night .blob-2 { background: #4c1d95; }

    /* ДИНАМИЧЕСКИЕ ЧАСТИЦЫ НА ФОНЕ */
    .particle-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .dust { position: absolute; border-radius: 50%; background: #e2e8f0; filter: blur(3px); opacity: 0.4; animation: float var(--d) infinite linear; }
    .ember { position: absolute; border-radius: 50%; background: #ff2a00; filter: blur(1px); box-shadow: 0 0 15px #ff2a00, 0 0 30px #ff2a00; animation: rise var(--d) infinite ease-in; }
    @keyframes float { 0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; } 10% { opacity: 0.4; } 90% { opacity: 0.4; } 100% { transform: translateY(-10vh) translateX(150px) rotate(360deg); opacity: 0; } }
    @keyframes rise { 0% { transform: translateY(110vh) translateX(0) scale(1.2); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) translateX(-50px) scale(0.3); opacity: 0; } }

    /* ТЕКСТУРА КАРТОНА ДЛЯ КАРТОЧЕК */
    .card-texture { position: absolute; inset: 0; border-radius: 36px; pointer-events: none; z-index: 15; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E"); mix-blend-mode: multiply; opacity: 0.15; }

    .btn-back { position: absolute; top: 24px; left: 24px; width: 50px; height: 50px; background: rgba(30, 41, 59, 0.85); border: 2px solid rgba(148, 163, 184, 0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #f8fafc; font-size: 24px; font-weight: bold; cursor: pointer; backdrop-filter: blur(12px); z-index: 100; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .btn-back:hover { background: rgba(59, 130, 246, 0.9); border-color: #60a5fa; transform: scale(1.1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
    .btn-back:active { transform: scale(0.95); }

    .dashboard-panel { background: linear-gradient(180deg, rgba(15,23,42,0.95) 0%, rgba(2,6,23,0.98) 100%); border-bottom: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.15); border-radius: 0 0 36px 36px; position: relative; z-index: 20; padding: 20px 15px; backdrop-filter: blur(20px); }
    .dashboard-panel::before, .dashboard-panel::after { content: '⊕'; position: absolute; top: 12px; color: #334155; font-size: 16px; font-weight: 900; } 
    .dashboard-panel::before { left: 25px; } .dashboard-panel::after { right: 25px; }

    .analog-gauge { width: 75px; height: 38px; background: #020617; border-radius: 75px 75px 0 0; border: 3px solid #1e293b; border-bottom: none; position: relative; overflow: hidden; box-shadow: inset 0 8px 15px rgba(0,0,0,1); display: flex; justify-content: center; }
    .gauge-scale { position: absolute; width: 200%; height: 200%; bottom: 0; left: -50%; background: conic-gradient(from 270deg at 50% 50%, #ef4444 0deg, #f59e0b 90deg, #10b981 180deg); opacity: 0.9; border-radius: 50%; filter: blur(3px); }
    .gauge-needle { position: absolute; bottom: 0; width: 3px; height: 34px; background: #f8fafc; transform-origin: bottom center; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 8px rgba(0,0,0,1); border-radius: 3px; }
    .gauge-needle::after { content:''; position:absolute; bottom:-5px; left:-3.5px; width:10px; height:10px; background:#94a3b8; border-radius:50%; border: 2px solid #0f172a; }

    .lcd-screen { background: #022c15; border: 3px solid #064e3b; border-radius: 10px; box-shadow: inset 0 0 25px rgba(0,0,0,1), 0 0 15px rgba(16,185,129,0.15); font-family: 'Courier New', Courier, monospace; color: #34d399; text-shadow: 0 0 12px #10b981; padding: 8px 12px; font-weight: 900; font-size: 1.15rem; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; min-width: 145px; transition: all 0.3s; }
    .lcd-screen.danger { color: #f87171; text-shadow: 0 0 15px #ef4444; background: #2c0202; border-color: #7f1d1d; box-shadow: inset 0 0 25px rgba(0,0,0,1), 0 0 20px rgba(239,68,68,0.4); animation: flicker 1.5s infinite; }

    .loyalty-bar-container { width: 85px; height: 18px; background: #020617; border-radius: 12px; border: 2px solid #1e293b; position: relative; overflow: hidden; box-shadow: inset 0 3px 8px rgba(0,0,0,0.9); }
    .loyalty-bar-fill { height: 100%; border-radius: 10px; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.5s; box-shadow: inset 0 2px 5px rgba(255,255,255,0.4); }

    .gauge-predict-danger { animation: predictPulse 0.5s infinite, shake 0.2s infinite; border-color: #ef4444 !important; box-shadow: 0 0 25px rgba(239, 68, 68, 0.8) !important; }
    .lcd-predict-danger { animation: predictPulse 0.5s infinite, shake 0.2s infinite; border-color: #ef4444 !important; color: #ef4444 !important; text-shadow: 0 0 20px #ef4444 !important; background: #2c0202 !important; }
    .avatar-wrapper { display: inline-block; transition: transform 0.2s; }
    .avatar-predict { transform: scale(1.3) rotate(5deg); filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6)); transition: all 0.2s; }

    .physical-phone { position: absolute; right: -12px; top: 28vh; width: 68px; height: 135px; background: #0f172a; border: 4px solid #334155; border-radius: 18px 0 0 18px; box-shadow: -15px 15px 30px rgba(0,0,0,0.9), inset -2px 0 12px rgba(255,255,255,0.1); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 50; display: flex; align-items: center; justify-content: flex-start; padding-left: 6px; cursor: pointer; }
    .physical-phone::after { content: '📱'; font-size: 1.6rem; position: absolute; right: 12px; opacity: 0.15; filter: drop-shadow(0 0 2px black);}
    .physical-phone:hover { transform: translateX(-15px); }
    .physical-phone.ringing { border-color: #e11d48; box-shadow: -15px 15px 30px rgba(225,29,72,0.5), inset -2px 0 10px rgba(225,29,72,0.4); animation: phoneRing 0.3s infinite; }
    
    .ios-screen { background: #0f172a; flex: 1; border-radius: 36px; border: 8px solid #020617; box-shadow: 0 25px 50px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .ios-header { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #1e293b; padding: 15px; text-align: center; font-weight: 900; z-index: 10; color: white;}
    .chat-bubble-received { background: #1e293b; color: #f8fafc; padding: 12px 16px; border-radius: 20px; border-bottom-left-radius: 4px; max-width: 85%; align-self: flex-start; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .phone-screen-mini { width: 46px; height: 115px; background: #020617; border-radius: 10px; border: 1px solid #0f172a; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; z-index: 2; box-shadow: inset 0 0 10px black;}
    .phone-screen-mini::before { content:''; position:absolute; top:5px; width:16px; height:4px; background:#1e293b; border-radius:2px; }
    .phone-badge-diegetic { position: absolute; top: 12px; right: 6px; background: #e11d48; width: 14px; height: 14px; border-radius: 50%; box-shadow: 0 0 15px #e11d48; border: 2px solid #020617; animation: predictPulse 1s infinite;}

    .card-stack { position: relative; width: 100%; max-width: 350px; aspect-ratio: 3/4.2; margin: 0 auto; perspective: 1200px; z-index: 10; transform-style: preserve-3d; }
    .swipe-card { position: absolute; inset: 0; background: #ffffff; border-radius: 36px; display: flex; flex-direction: column; box-shadow: 0 40px 80px -10px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255,255,255,0.1) inset; transform-style: preserve-3d; will-change: transform; overflow: hidden; }
    .next-card { position: absolute; inset: 0; background: #e2e8f0; border-radius: 36px; transform: scale(0.92) translateY(25px); opacity: 0.9; z-index: -1; box-shadow: 0 15px 30px rgba(0,0,0,0.5); border: 1px solid #cbd5e1; }

    .choice-indicator { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 20px; font-weight: 900; font-size: 1.3rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0; border: 4px solid; z-index: 30; background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: opacity 0.2s; white-space: nowrap; }
    .choice-left { color: #e11d48; border-color: #e11d48; } .choice-right { color: #10b981; border-color: #10b981; }

    .action-buttons { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; padding: 0 20px; z-index: 40; }
    .btn-action { flex: 1; max-width: 170px; padding: 18px 10px; border-radius: 24px; font-weight: 900; font-size: 13px; text-transform: uppercase; box-shadow: 0 15px 30px rgba(0,0,0,0.5); backdrop-filter: blur(15px); transition: transform 0.1s, box-shadow 0.1s; border-bottom: 6px solid; display: flex; align-items: center; justify-content: center; letter-spacing: 1px; cursor: pointer;}
    .btn-action:active { transform: translateY(6px); border-bottom-width: 0px; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
    .btn-reject { background: rgba(255,228,230,0.95); color: #be123c; border-color: #f43f5e; }
    .btn-accept { background: rgba(209,250,229,0.95); color: #047857; border-color: #10b981; }

    .stamp { position: absolute; top: 15%; left: 50%; margin-left: -180px; font-size: 5.5rem; font-weight: 900; color: #e11d48; border: 12px solid #e11d48; padding: 15px 40px; border-radius: 24px; transform: rotate(-15deg); pointer-events: none; z-index: 100; text-shadow: 0 0 20px rgba(225,29,72,0.8); box-shadow: 0 0 40px rgba(225,29,72,0.8), inset 0 0 40px rgba(225,29,72,0.8); animation: stamp-smash 0.5s cubic-bezier(0.1, 2, 0.5, 1) forwards; opacity: 0; }
    .stamp.stamp-victory { color: #10b981; border-color: #10b981; text-shadow: 0 0 20px rgba(16,185,129,0.8); box-shadow: 0 0 40px rgba(16,185,129,0.8), inset 0 0 40px rgba(16,185,129,0.8); }
    @keyframes stamp-smash { 0% { transform: scale(5) rotate(-20deg); opacity: 0; } 50% { transform: scale(1) rotate(-15deg); opacity: 1; } 100% { transform: scale(1) rotate(-15deg); opacity: 1; } }

    .custom-scroll::-webkit-scrollbar { width: 6px; } 
    .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; } 
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
  </style>
</head>
<body>

<div id="game-root"></div>

<script src="js/data.js"></script>
<script src="js/audio.js"></script>

</body>
