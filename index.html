  const { useState, useEffect, useRef } = React;

  const AudioEngine = (() => {
      let ctx = null; let enabled = false;
      const init = () => { if (!ctx) { ctx = new (window.AudioContext || window.webkitAudioContext)(); } if (ctx.state === 'suspended') ctx.resume(); enabled = true; };
      const playTone = (freq, type, duration, vol = 0.1, slideFreq = null) => {
          if (!enabled || !ctx) return;
          const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.type = type; osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, ctx.currentTime + duration);
          gain.gain.setValueAtTime(vol, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
          osc.start(); osc.stop(ctx.currentTime + duration);
      };
      return {
          init,
          swipe: () => playTone(300, 'sine', 0.2, 0.1, 100),
          stamp: () => playTone(100, 'square', 0.4, 0.3, 20),
          alarm: () => { playTone(600, 'square', 0.1, 0.05); setTimeout(() => playTone(800, 'square', 0.1, 0.05), 100); },
          ring: () => { for(let i=0; i<3; i++) { setTimeout(() => playTone(1000, 'sine', 0.1, 0.05), i*200); setTimeout(() => playTone(1300, 'sine', 0.1, 0.05), i*200 + 100); } },
          buy: () => { playTone(800, 'sine', 0.1, 0.1, 1200); setTimeout(() => playTone(1200, 'sine', 0.2, 0.1, 1600), 100); },
          msg: () => playTone(1500, 'sine', 0.1, 0.05, 2000),
          error: () => playTone(200, 'sawtooth', 0.3, 0.2, 100)
      };
  })();

  const vibrate = (pattern) => { if (typeof window !== 'undefined' && 'navigator' in window && window.navigator.vibrate) window.navigator.vibrate(pattern); };
  const burstParticles = (direction) => {

         p.style.left = `${window.innerWidth/2}px`; p.style.top = `${window.innerHeight/2}px`;
         p.style.setProperty('--tx', `${(Math.random()-0.5)*500}px`); p.style.setProperty('--ty', `${(Math.random()-0.5)*500 - 100}px`);
         document.body.appendChild(p); setTimeout(() => p.remove(), 800);
      }

  const TypewriterText = ({ text }) => {
      const [displayed, setDisplayed] = useState("");
      useEffect(() => {
          setDisplayed(""); let i = 0;
          const timer = setInterval(() => { setDisplayed(text.slice(0, i + 1)); i++; if (i >= text.length) clearInterval(timer); }, 15);
          return () => clearInterval(timer);
      }, [text]);
      const highlightWords = (str) => {
          const words = ["убью", "штраф", "срочно", "пожар", "вскрыть", "уволю", "быстро", "скорую", "кровь", "эвакуация", "травма", "смерть", "упал", "взрыв"];
          let res = str;
          words.forEach(w => { const regex = new RegExp(`(${w})`, 'gi'); res = res.replace(regex, '<span class="text-rose-600 font-black animate-shake inline-block">$&</span>'); });
          return { __html: res };
      };
      return <p dangerouslySetInnerHTML={highlightWords(displayed)} className="text-slate-700 text-[1.15rem] font-semibold text-center leading-relaxed relative z-10" />;
  };

    useEffect(() => {
        if (gameState === 'playing') {
            if (stats.budget < 30) document.body.classList.add('critical-budget'); else document.body.classList.remove('critical-budget');
            if (stats.safety < 30) document.body.classList.add('critical-safety'); else document.body.classList.remove('critical-safety');
            if (stats.loyalty < 30) document.body.classList.add('critical-loyalty'); else document.body.classList.remove('critical-loyalty');
        } else document.body.className = ''; 
    }, [stats, gameState]);

    const unlockAchievement = (id) => {
        setAchievements(prev => {
            if (prev.includes(id)) return prev;
            const newArr = [...prev, id];
            try { localStorage.setItem('smena_achievements', JSON.stringify(newArr)); } catch(e) {}
            return newArr;
        });
    };

    const addCoins = (amount) => {
        const newCoins = coins + amount; setCoins(newCoins); localStorage.setItem('smena_coins', newCoins);
    };

    const buyTerritory = (item) => {
        if (coins >= item.cost && !territory.includes(item.id)) {
            AudioEngine.buy(); addCoins(-item.cost);
            const newTerritory = [...territory, item.id];
            setTerritory(newTerritory); localStorage.setItem('smena_territory', JSON.stringify(newTerritory));
        }
    };

    const getRank = (days) => {
        if (days <= 5) return "Стажер с блокнотом";
        if (days <= 10) return "Младший инспектор";
        if (days <= 15) return "Гроза нарушителей";
        return "Бог Охраны Труда";
    };

    const startGame = (campaignId) => {
        AudioEngine.init(); vibrate(50);
        setActiveCampaignId(campaignId);
        
        setFeedback(null); setSwipingOut(false); setDragPos(0); setIsDragging(false); setBgState(""); setIsBurning(false);
        setPhoneState({ open: false, tab: 'chats' }); setActionLog([]);
        
        setDay(1); setContactsUsed({ vv: false, buh: false, prof: false }); setTimeLeft(8); setPlaystyle({ s: 0, b: 0, l: 0 });
        
        // ПРИМЕНЯЕМ БАФФЫ ТЕРРИТОРИИ
        const startS = 50 + (territory.includes('t_fire') ? 10 : 0);
        const startB = 50 + (territory.includes('t_warehouse') ? 10 : 0);
        const startL = 50 + (territory.includes('t_med') ? 10 : 0);
        setStats({ safety: startS, budget: startB, loyalty: startL });

        // Формируем колоду конкретной кампании
        let initialDeck = [...(CAMPAIGNS[campaignId] || CAMPAIGNS.main)];
        // Если карт мало, докидываем базовых
        if (campaignId !== 'main' && initialDeck.length < 5) {
            initialDeck = [...initialDeck, ...CAMPAIGNS.main].sort(() => Math.random() - 0.5);
        } else {
            initialDeck = initialDeck.sort(() => Math.random() - 0.5);
        }

        setDeck(initialDeck); setCurrentCard(initialDeck[0]); setNextCard(initialDeck[1]);
        setGameState('playing');
    };

    const handleTimeout = () => {
        unlockAchievement('slow'); setDeathReason("ИТОГ:\nВы растерялись в критической ситуации.\n\nВЕРДИКТ:\nВас отстранили за халатность.");
        
        // Логируем ошибку таймаута
        setActionLog(prev => [...prev, { 
            text: currentCard.text, choice: "БЕЗДЕЙСТВИЕ", isError: true, 
            rule: currentCard.rule || "Нарушение регламента реагирования на ЧС." 
        }]);

        gameOverSequence();
    };

    const gameOverSequence = () => {
        setIsBurning(true);
        const earnedCoins = Math.floor(day / 2); // Больше монет за кампании
        if (earnedCoins > 0) addCoins(earnedCoins);
        setTimeout(() => { setGameState('gameover'); vibrate([500, 200, 500]); setTimeout(() => AudioEngine.stamp(), 1500); }, 1200); 
    };

    useEffect(() => {
        if (gameState === 'playing' && currentCard?.isUrgent && !phoneState.open && !feedback && !swipingOut) {
            timerRef.current = setInterval(() => {
                setTimeLeft(prev => {
                    if (prev <= 3 && prev > 1) AudioEngine.alarm(); 
                    if (prev <= 1) { clearInterval(timerRef.current); handleTimeout(); return 0; }
                    return prev - 1;
                });
            }, 1000);
            return () => clearInterval(timerRef.current);
        }
    }, [gameState, currentCard, phoneState.open, feedback, swipingOut]);

    const makeChoice = (direction) => {
      if (phoneState.open || feedback || swipingOut || isBurning) return;
      clearInterval(timerRef.current);
      
      AudioEngine.swipe(); vibrate(40); burstParticles(direction); 
      setIsDragging(false); setSwipingOut(true); setDragPos(direction === 'left' ? -400 : 400);

      const effects = direction === 'left' ? currentCard.onLeft : currentCard.onRight;
      
      setPlaystyle(prev => ({ s: prev.s + (effects.safety > 0 ? effects.safety : 0), b: prev.b + (effects.budget > 0 ? effects.budget : 0), l: prev.l + (effects.loyalty > 0 ? effects.loyalty : 0) }));

      // АНАЛИТИКА: Если решение привело к серьезному минусу безопасности или бюджета - это ошибка.
      const isError = effects.safety < -15 || effects.budget < -15;
      if (isError) {
          AudioEngine.error(); // Звук ошибки
          setActionLog(prev => [...prev, { 
              text: currentCard.text, 
              choice: direction === 'left' ? currentCard.leftChoice : currentCard.rightChoice, 
              isError: true, 
              rule: currentCard.rule || "Нарушение локального акта отеля/парка." 
          }]);
      }

      const newSafety = Math.min(100, Math.max(0, stats.safety + effects.safety));
      const newBudget = Math.min(100, Math.max(0, stats.budget + effects.budget));
      const newLoyalty = Math.min(100, Math.max(0, stats.loyalty + effects.loyalty));

      setFlash({ safety: newSafety < stats.safety, budget: newBudget < stats.budget, loyalty: newLoyalty < stats.loyalty });
      setStats({ safety: newSafety, budget: newBudget, loyalty: newLoyalty });
      
      setTimeout(() => {
          setFeedback({ text: effects.msg, safety: effects.safety, budget: effects.budget, loyalty: effects.loyalty });
          setBgState("");
          
          setTimeout(() => {
              setFeedback(null); setSwipingOut(false);

              if (newSafety <= 0 || newBudget <= 0 || newLoyalty <= 0) {
                  let res = newSafety <= 0 ? "Тяжелый НС всплыл в прокуратуре." : newBudget <= 0 ? "Вы разорили отель закупками." : "Рабочие устроили бунт.";
                  setDeathReason(`ПОСЛЕДНЕЕ РЕШЕНИЕ:\n${effects.msg}\n\nВЕРДИКТ:\n${res}`);
                  if (newSafety <= 0 && newBudget >= 70) unlockAchievement('greed');
                  if (newLoyalty <= 0 && newSafety >= 70) unlockAchievement('tyrant');
                  gameOverSequence();
                  return;
              }
              
              setDay(prev => prev + 1);
              let newDeck = deck.slice(1);
              
              // Победа в кампании, если колода закончилась
              if (newDeck.length === 0) {
                  unlockAchievement('pro');
                  setDeathReason("Вы успешно завершили все сценарии кампании!\nРуководство довольно вашими компетенциями.");
                  gameOverSequence();
                  return;
              }

              setDeck(newDeck); setCurrentCard(newDeck[0]); setNextCard(newDeck[1]); setDragPos(0); 
              if(newDeck[0].isUrgent) setTimeLeft(8);
          }, 2000); 
      }, 600);
    };

    const useContact = (type) => {
        if (contactsUsed[type]) return;
        AudioEngine.ring(); vibrate([100, 50, 100]);
        const newUsed = { ...contactsUsed }; newUsed[type] = true; setContactsUsed(newUsed);
        
        let newStats = { ...stats };
        if (type === 'vv') { newStats = { safety: 60, budget: 60, loyalty: 60 }; }
        if (type === 'buh') { newStats.budget = Math.min(100, newStats.budget + 30); newStats.loyalty = Math.max(0, newStats.loyalty - 20); }
        if (type === 'prof') { newStats.loyalty = Math.min(100, newStats.loyalty + 30); newStats.budget = Math.max(0, newStats.budget - 20); }
        
        setStats(newStats); setPhoneState({ ...phoneState, open: false });
    };

    const handlePointerDown = (e) => {
      if(phoneState.open || feedback || swipingOut || isBurning) return;
      setIsDragging(true); setStartX(e.clientX || (e.touches && e.touches[0].clientX));
      if(cardRef.current) cardRef.current.classList.remove('resetting');
    };

    const handlePointerMove = (e) => {
      if (!isDragging || !cardRef.current || feedback || phoneState.open || swipingOut || isBurning) return;
      const clientX = e.clientX || (e.touches && e.touches[0].clientX); if (!clientX) return;
      const deltaX = clientX - startX; setDragPos(Math.min(200, Math.max(-200, deltaX)));
      if (deltaX > 30) setBgState("swipe-right"); else if (deltaX < -30) setBgState("swipe-left"); else setBgState("");
    };

    const handlePointerUp = () => {
      if (!isDragging) return;
      setIsDragging(false); setBgState(""); if(cardRef.current) cardRef.current.classList.add('resetting');
      if (dragPos > 100) makeChoice('right'); else if (dragPos < -100) makeChoice('left'); else setDragPos(0);
    };

    const shareResult = async () => {
        setIsSharing(true); await new Promise(r => setTimeout(r, 100)); 
        const badgeElem = document.getElementById('share-badge-wrap');
        const oldBodyOverflow = document.body.style.overflow;
        document.body.style.overflow = 'visible';
        badgeElem.style.top = '0px'; badgeElem.style.left = '0px'; badgeElem.style.opacity = '1';
        await new Promise(r => setTimeout(r, 200));

        try {
            const canvas = await html2canvas(badgeElem, { scale: 2, backgroundColor: '#0f172a', windowWidth: 600, windowHeight: 900 });
            const dataUrl = canvas.toDataURL('image/png'); const blob = await (await fetch(dataUrl)).blob();
            const file = new File([blob], 'smena-result.png', { type: 'image/png' });
            
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ title: 'Мой результат в СМЕНЕ', text: `Я прошел ${day} смен! Звание: ${getRank(day)}`, files: [file] });
            } else {
                const a = document.createElement('a'); a.href = dataUrl; a.download = `Smena_${day}.png`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
            }
        } catch (e) { alert("Ошибка сохранения."); } finally {
            document.body.style.overflow = oldBodyOverflow;
            badgeElem.style.top = '-9999px'; badgeElem.style.left = '-9999px'; badgeElem.style.opacity = '0'; setIsSharing(false);
        }
    };

    const getFlaskGlow = (val) => val > 60 ? '#10b981' : val > 30 ? '#f59e0b' : '#ef4444';
    const getTimeClass = () => day <= 3 ? 'theme-morning' : day <= 7 ? 'theme-day' : day <= 10 ? 'theme-evening' : 'theme-night';
    const currentAvatar = currentCard ? ((stats.loyalty < 30 && !currentCard.isUrgent) ? "🤬" : currentCard.avatar) : "";

    // МЕНЮ 1: ВЫБОР КАМПАНИИ
    if (gameState === 'campaign_select') {
        return (
            <div className="absolute inset-0 z-50 bg-[#0f172a] p-6 overflow-y-auto flex flex-col animate-fade-in">
                <button onClick={() => setGameState('start')} className="flex items-center gap-2 bg-slate-800 text-white px-5 py-2 rounded-full font-bold border border-slate-600 shadow-lg mb-6 active:scale-95 transition-transform w-max">← Назад</button>
                <h2 className="text-2xl font-black text-white mb-2">Выбор Объекта</h2>
                <p className="text-sm text-slate-400 mb-6">Где сегодня пройдет смена?</p>
                
                <div className="flex flex-col gap-4">
                    <button onClick={() => startGame('main')} className="p-4 bg-slate-800 border-2 border-blue-500 rounded-2xl flex items-center gap-4 text-left active:scale-95 transition-transform shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                        <div className="text-5xl">🏢</div>
                        <div><div className="text-white font-black text-lg">Главный Корпус</div><div className="text-slate-400 text-xs">Базовый инструктаж и общие правила. Идеально для новичков.</div></div>
                    </button>
                    <button onClick={() => startGame('park')} className="p-4 bg-slate-800 border-2 border-emerald-500 rounded-2xl flex items-center gap-4 text-left active:scale-95 transition-transform shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                        <div className="text-5xl">🌲</div>
                        <div><div className="text-white font-black text-lg">Парк-Отель</div><div className="text-slate-400 text-xs">Гости, подрядчики на улице и форс-мажоры.</div></div>
                    </button>
                    <button onClick={() => startGame('med')} className="p-4 bg-slate-800 border-2 border-rose-500 rounded-2xl flex items-center gap-4 text-left active:scale-95 transition-transform shadow-[0_0_15px_rgba(225,29,72,0.3)]">
                        <div className="text-5xl">🏥</div>
                        <div><div className="text-white font-black text-lg">Медицинский Блок</div><div className="text-slate-400 text-xs">Жесткие СанПиНы, опасные отходы. Только для профи.</div></div>
                    </button>
                </div>
            </div>
        );
    }

    // МЕНЮ 2: РАЗВИТИЕ ТЕРРИТОРИИ
    if (gameState === 'territory') {
        return (
            <div className="absolute inset-0 z-50 bg-[#0f172a] p-6 overflow-y-auto flex flex-col animate-fade-in">
                <div className="flex justify-between items-center mb-6">
                    <button onClick={() => setGameState('start')} className="flex items-center gap-2 bg-slate-800 text-white px-5 py-2 rounded-full font-bold border border-slate-600 shadow-lg active:scale-95 transition-transform w-max">← Назад</button>
                    <div className="bg-amber-500/20 text-amber-400 px-4 py-2 rounded-full font-black border border-amber-500/50 whitespace-nowrap shadow-lg">💰 {coins}</div>
                </div>
                <h2 className="text-2xl font-black text-white mb-2">Инфраструктура</h2>
                <p className="text-sm text-slate-400 mb-6">Покупайте оборудование для объектов. Баффы работают всегда.</p>
                
                <div className="w-full h-40 bg-slate-800 rounded-2xl border-4 border-slate-700 mb-8 relative flex items-center justify-center overflow-hidden shadow-inner bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPjxwYXRoIGQ9Ik0wIDBoNDB2NDBIMHoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMikiLz48cGF0aCBkPSJNMCAwdjQwbTQwIDBWMG0tNDAgMjBoNDAiIHN0cm9rZT0icmdiYSgyNTUsMjU1LDI1NSwwLjA1KSIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9zdmc+')]">
                    {territory.includes('t_fire') && <div className="absolute top-4 left-4 text-4xl animate-pulse">🚨</div>}
                    {territory.includes('t_med') && <div className="absolute bottom-4 left-1/2 -translate-x-1/2 text-4xl">🚑</div>}
                    {territory.includes('t_warehouse') && <div className="absolute top-4 right-4 text-4xl">🏗️</div>}
                    <div className="text-6xl z-10 filter grayscale opacity-50">🏢</div>
                </div>

                <div className="flex flex-col gap-4 pb-10">
                    {TERRITORY_UPGRADES.map(item => {
                        const isOwned = territory.includes(item.id);
                        const canBuy = coins >= item.cost && !isOwned;
                        return (
                            <div key={item.id} className={`p-4 rounded-xl border flex items-center justify-between transition-all ${isOwned ? 'bg-blue-900/50 border-blue-500/50' : 'bg-slate-800 border-slate-600 shadow-lg'}`}>
                                <div className="flex items-center gap-4">
                                    <div className="text-4xl">{item.icon}</div>
                                    <div>
                                        <div className="font-bold text-white text-lg">{item.name}</div>
                                        <div className="text-[11px] text-emerald-400 font-bold">{item.desc}</div>
                                    </div>
                                </div>
                                <button onClick={() => buyTerritory(item)} disabled={!canBuy && !isOwned} className={`px-4 py-2 rounded-full font-black text-sm min-w-[80px] ${isOwned ? 'bg-transparent text-blue-400 border border-blue-400' : canBuy ? 'bg-amber-500 text-slate-900 hover:scale-105 shadow-md active:scale-95' : 'bg-slate-700 text-slate-500'}`}>
                                    {isOwned ? 'КУПЛЕНО' : `${item.cost} 🪙`}
                                </button>
                            </div>
                        )
                    })}
                </div>
            </div>
        );
    }

    // МЕНЮ 3: АНАЛИТИКА / АТТЕСТАЦИЯ
    if (gameState === 'analytics') {
        return (
            <div className="absolute inset-0 z-50 bg-[#0f172a] p-6 overflow-hidden flex flex-col animate-fade-in">
                <button onClick={() => setGameState('gameover')} className="flex items-center gap-2 bg-slate-800 text-white px-5 py-2 rounded-full font-bold border border-slate-600 shadow-lg mb-6 active:scale-95 transition-transform w-max">← Назад</button>
                <h2 className="text-2xl font-black text-rose-500 mb-2 uppercase tracking-wide">Журнал Нарушений</h2>
                <p className="text-sm text-slate-400 mb-6">Разбор ваших фатальных и рискованных решений за эту смену.</p>
                
                <div className="flex-1 overflow-y-auto custom-scroll pb-10 flex flex-col gap-4">
                    {actionLog.length === 0 ? (
                        <div className="text-center text-emerald-500 font-bold mt-10">Идеальная работа! Нарушений ТБ не зафиксировано.</div>
                    ) : (
                        actionLog.map((log, i) => (
                            <div key={i} className="bg-slate-800 border-l-4 border-rose-500 p-4 rounded-r-xl shadow-lg">
                                <div className="text-slate-300 text-sm mb-2 italic">"{log.text}"</div>
                                <div className="text-white font-bold text-sm mb-2">Ваш выбор: <span className="text-rose-400">{log.choice}</span></div>
                                <div className="bg-rose-950/50 p-2 rounded border border-rose-900">
                                    <div className="text-[10px] text-rose-300 uppercase font-black mb-1">Справка СОТ:</div>
                                    <div className="text-rose-200 text-xs">{log.rule}</div>
                                </div>
                            </div>
                        ))
                    )}
                </div>
            </div>
        );
    }

    if (gameState === 'gameover') {
      return (
        <div id="gameover-container" className="flex flex-col items-center justify-center h-[100dvh] px-6 text-center relative z-20 bg-[#0f172a] overflow-hidden">
            
            <div id="share-badge-wrap" className="share-badge">
                <div className="badge-logo">🛡️ СМЕНА</div>
                <div className="badge-title">Удостоверение СОТ</div>
                <div className="badge-sub">Официальный результат</div>
                <div className="badge-days-label">Прошел смен:</div><div className="badge-days">{day}</div>
                <div className="badge-rank">{getRank(day)}</div>
                <div className="badge-watermark">Интерактивная Аттестация</div>
            </div>

            <div className="absolute inset-0 overflow-y-auto custom-scroll flex flex-col items-center p-6">
                <div className="text-7xl mb-2 mt-10">💀</div>
                <h1 className="text-3xl font-black text-rose-500 uppercase tracking-widest drop-shadow-lg mb-4">Смена Провалена</h1>
                <div className="bg-slate-800 border-2 border-rose-900 p-4 rounded-3xl mb-4 max-w-sm w-full shadow-2xl">
                    <p className="text-slate-200 text-sm whitespace-pre-line text-left font-medium leading-relaxed">{deathReason}</p>
                </div>
                <div className="text-5xl font-black text-blue-400 mb-2 drop-shadow-lg">{day} <span className="text-xl">карточек</span></div>
                
                {/* КНОПКА АТТЕСТАЦИИ */}
                {actionLog.length > 0 && (
                    <button onClick={() => setGameState('analytics')} className="mt-4 bg-rose-900/50 border border-rose-500 text-rose-200 px-6 py-3 rounded-full font-bold shadow-lg animate-pulse">
                        📋 Посмотреть ошибки ТБ
                    </button>
                )}

                <div className="stamp">УВОЛЕН</div>
                
                <div className="flex flex-col w-full max-w-xs gap-3 mt-8 mb-10 pb-10">
                   <button onClick={shareResult} disabled={isSharing} className={`bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black py-4 w-full rounded-full border border-blue-400 shadow-[0_0_20px_rgba(37,99,235,0.4)] tracking-widest uppercase flex items-center justify-center gap-2 ${isSharing ? 'opacity-70' : 'active:scale-95 transition-transform'}`}>
                       {isSharing ? '⌛ Генерируем...' : '📸 Поделиться'}
                   </button>
                   <button onClick={() => setGameState('start')} className="bg-slate-700 text-white font-black py-4 w-full rounded-full border border-slate-500 shadow-lg tracking-widest uppercase active:scale-95 transition-transform">В Главное меню</button>
                </div>
            </div>
        </div>
      );
    }

    if (gameState === 'start') {
      return (
        <div className="flex flex-col items-center justify-center h-[100dvh] px-6 text-center animate-fade-in relative theme-morning">
          <div className="mesh-container"><div className="blob blob-1 w-[400px] h-[400px] top-[-10%] left-[-10%] animate-blob"></div><div className="blob blob-2 w-[350px] h-[350px] bottom-[-10%] right-[-10%] animate-blob" style={{animationDelay: '2s'}}></div></div>
          <div className="grid-overlay"></div><div className="noise"></div>
          
          <div className="text-8xl mb-4 drop-shadow-[0_0_30px_rgba(14,165,233,0.6)] relative z-10 mt-10">👷</div>
          <h1 className="text-6xl font-black text-white mb-2 tracking-tighter">СМЕНА</h1>
          <p className="text-lg font-bold text-blue-400 mb-8 uppercase tracking-widest">Аттестация СОТ</p>
          
          <div className="w-full max-w-xs flex flex-col gap-3 relative z-50">
              <button onClick={() => setGameState('campaign_select')} className="bg-blue-600 text-white font-black py-4 rounded-full text-lg shadow-[0_0_20px_rgba(37,99,235,0.6)] uppercase border-2 border-blue-400 active:scale-95 transition-transform">Начать Смену</button>
              <div className="flex gap-2">
                  <button onClick={() => setGameState('territory')} className="flex-1 bg-slate-800 text-amber-400 font-bold py-3 rounded-full border border-slate-600 text-sm flex justify-center gap-2 items-center active:scale-95 transition-transform shadow-lg">🗺️ База</button>
              </div>
          </div>
        </div>
      );
    }

    const isCritical = stats.safety < 20 || stats.budget < 20 || stats.loyalty < 20;

    return (
      <div className={`flex flex-col h-[100dvh] overflow-hidden relative z-10 transition-all duration-1000 ${getTimeClass()} ${bgState === 'swipe-left' ? 'swipe-left' : bgState === 'swipe-right' ? 'swipe-right' : currentCard?.isUrgent ? 'bg-siren' : ''}`}
           onMouseMove={handlePointerMove} onTouchMove={handlePointerMove} onMouseUp={handlePointerUp} onTouchEnd={handlePointerUp} onMouseLeave={handlePointerUp}>
        
        <div className="screen-crack"></div><div className="hazard-border"></div><div className="vignette-anger"></div>
        <div className="mesh-container"><div className="blob blob-1 w-[500px] h-[500px] top-[-20%] left-[-10%] animate-blob"></div><div className="blob blob-2 w-[450px] h-[450px] bottom-[-10%] right-[-10%] animate-blob" style={{animationDelay: '3s'}}></div></div>
        <div className="grid-overlay"></div><div className="noise"></div>

        <button onClick={markMessagesRead} className="phone-btn">
            📱 {messages.filter(m=>!m.read).length > 0 && <div className="phone-badge">{messages.filter(m=>!m.read).length}</div>}
        </button>

        {phoneState.open && (
            <div className="absolute inset-0 z-[55] bg-slate-900/90 backdrop-blur-md flex flex-col p-4 animate-slideUp">
                <div className="bg-slate-800 flex-1 rounded-3xl border-4 border-slate-700 shadow-2xl flex flex-col overflow-hidden relative">
                    <div className="bg-slate-900 p-4 flex justify-between items-center border-b border-slate-700">
                        <div className="font-black text-xl text-white">Смартфон СОТ</div>
                        <button onClick={() => setPhoneState({...phoneState, open: false})} className="text-slate-400 text-3xl font-bold hover:text-white active:scale-90 transition-transform">×</button>
                    </div>
                    <div className="flex bg-slate-800 p-2 gap-2 border-b border-slate-700">
                        <button onClick={()=>setPhoneState({...phoneState, tab: 'chats'})} className={`flex-1 py-2 rounded-xl font-bold text-sm transition-colors ${phoneState.tab === 'chats' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>💬 Чат ({activeCampaignId})</button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-4 custom-scroll">
                        <div className="bg-slate-700 p-4 rounded-2xl rounded-tl-none self-start max-w-[85%] border border-slate-600 relative shadow-md">
                            <div className="text-blue-400 font-bold text-[10px] uppercase mb-1">ДИРЕКТОР</div>
                            <div className="text-white text-sm">Следи за показателями. Если упадет хоть один — уволю! И не забывай про регламенты, комиссия ГИТ не дремлет.</div>
                        </div>
                    </div>
                </div>
            </div>
        )}

        {feedback && (
            <div className="absolute inset-0 z-[60] flex items-center justify-center p-4 animate-fade-in bg-slate-900/80 backdrop-blur-md">
                <div className="bg-white p-8 rounded-[32px] shadow-[0_20px_50px_rgba(0,0,0,0.5)] text-center border-4 border-slate-200 flex flex-col items-center justify-center max-w-sm w-full">
                    <p className="text-slate-900 font-black text-xl mb-8 leading-relaxed whitespace-pre-line">{feedback.text}</p>
                    <div className="flex gap-8 font-black text-2xl">
                        {feedback.safety !== 0 && <span className={feedback.safety > 0 ? 'text-emerald-500' : 'text-rose-500'}>🛡️ {feedback.safety > 0 ? '+' : ''}{feedback.safety}</span>}
                        {feedback.budget !== 0 && <span className={feedback.budget > 0 ? 'text-emerald-500' : 'text-rose-500'}>💰 {feedback.budget > 0 ? '+' : ''}{feedback.budget}</span>}
                        {feedback.loyalty !== 0 && <span className={feedback.loyalty > 0 ? 'text-emerald-500' : 'text-rose-500'}>🤝 {feedback.loyalty > 0 ? '+' : ''}{feedback.loyalty}</span>}
                    </div>
                </div>
            </div>
        )}

        <div className={`glass-panel p-3 pb-4 rounded-b-[30px] shadow-2xl z-20`}>
            <div className="flex justify-between items-center mb-3 px-2">
                <div className="flex items-center gap-2">
                    <div className="font-black text-2xl text-white tracking-tighter drop-shadow-md">КАРТА {day}/{deck.length + day}</div>
                </div>
                {currentCard?.isUrgent && !feedback && <div className="text-lg font-black text-rose-500 bg-rose-950 px-4 py-1 rounded-full border-2 border-rose-500 animate-pulse shadow-[0_0_15px_rgba(225,29,72,0.5)]">⏱️ 0:0{timeLeft}</div>}
            </div>
            <div className="flex justify-between gap-6 px-2">
                {['safety', 'budget', 'loyalty'].map(s => (
                    <div key={s} className="flex-1 text-center">
                        <div className="text-2xl mb-1 filter drop-shadow-md">{s==='safety'?'🛡️':s==='budget'?'💰':'🤝'}</div>
                        <div className="flask-container"><div className={`flask-fill ${flash[s]?'flask-flash':''}`} style={{width: `${stats[s]}%`, backgroundColor: getFlaskGlow(stats[s]), boxShadow: `0 0 20px ${getFlaskGlow(stats[s])}`}}></div></div>
                    </div>
                ))}
            </div>
        </div>

        <div className="flex-1 relative flex items-center justify-center p-2">
            <div className="card-stack">
                {nextCard && <div className="next-card flex flex-center items-center justify-center"><div className="text-[5rem] opacity-20 grayscale">{nextCard.avatar}</div></div>}
                
                {currentCard && !feedback && (
                    <div ref={cardRef} className={`swipe-card cursor-grab active:cursor-grabbing ${currentCard.isUrgent?'urgent':''} ${swipingOut ? 'swiping-out' : ''} ${!isDragging && !swipingOut ? 'resetting' : ''} ${isBurning ? 'animate-burn' : ''}`}
                        style={{ transform: `translate(${dragPos}px, ${Math.abs(dragPos)*0.05}px) rotate(${dragPos*0.05}deg) rotateY(${dragPos*0.08}deg) rotateX(${Math.abs(dragPos)*0.03}deg)` }}
                        onMouseDown={handlePointerDown} onTouchStart={handlePointerDown}
                    >
                        <div className="glare" style={{ opacity: Math.min(Math.abs(dragPos)/150, 0.4), background: `linear-gradient(${dragPos*0.5+180}deg, rgba(255,255,255,1) 0%, transparent 60%)` }}></div>
                        <div className="choice-indicator choice-left" style={{opacity: dragPos < -30 ? 1 : 0}}>{currentCard.leftChoice}</div>
                        <div className="choice-indicator choice-right" style={{opacity: dragPos > 30 ? 1 : 0}}>{currentCard.rightChoice}</div>
                        
                        <div className={`relative z-10 bg-slate-50 rounded-t-[24px] p-4 flex flex-col items-center justify-center border-b h-[42%] ${currentCard.isUrgent?'bg-rose-50':''}`}>
                            <div className="text-[4.5rem] mb-1 filter drop-shadow-2xl">{currentCard.avatar}</div>
                            <h2 className="text-xl font-black text-slate-800 tracking-tight text-center leading-tight">{currentCard.character}</h2>
                            <div className="mt-2 px-3 py-1 rounded-full font-black text-[10px] uppercase shadow-lg tracking-widest bg-blue-600 text-white">{currentCard.role}</div>
                        </div>
                        <div className="p-4 flex-1 flex items-center justify-center bg-white rounded-b-[24px]"><TypewriterText text={currentCard.text} /></div>
                    </div>
                )}
            </div>
        </div>

        <div className="p-4 pb-6 w-full max-w-[400px] mx-auto flex justify-between gap-3 z-20">
            <button onClick={()=>makeChoice('left')} className="flex-1 bg-rose-100/90 text-rose-700 border-b-4 border-rose-300 font-black py-3 px-2 rounded-2xl uppercase text-[10px] sm:text-[11px] tracking-wider active:scale-95 transition-transform flex items-center justify-center leading-tight shadow-lg backdrop-blur-md cursor-pointer min-h-[56px] text-center">{currentCard?.leftChoice || 'ОТКАЗАТЬ'}</button>
            <button onClick={()=>makeChoice('right')} className="flex-1 bg-emerald-100/90 text-emerald-700 border-b-4 border-emerald-300 font-black py-3 px-2 rounded-2xl uppercase text-[10px] sm:text-[11px] tracking-wider active:scale-95 transition-transform flex items-center justify-center leading-tight shadow-lg backdrop-blur-md cursor-pointer min-h-[56px] text-center">{currentCard?.rightChoice || 'РАЗРЕШИТЬ'}</button>
        </div>
      </div>
    );
  }
  createRoot(document.getElementById('game-root')).render(<Game />);
</script>

</body>
</html>
