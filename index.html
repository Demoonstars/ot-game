<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>СМЕНА 3.0: Симулятор СОТ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1c">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    tailwind.config = { 
        corePlugins: { preflight: false },
        theme: {
            extend: {
                keyframes: {
                    shake: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-2px)' }, '75%': { transform: 'translateX(2px)' } },
                    shakeHard: { '0%, 100%': { transform: 'translate3d(0, 0, 0) rotate(0)' }, '20%': { transform: 'translate3d(-6px, 4px, 0) rotate(-1deg)' }, '40%': { transform: 'translate3d(4px, -6px, 0) rotate(1deg)' }, '60%': { transform: 'translate3d(-4px, -4px, 0) rotate(0)' }, '80%': { transform: 'translate3d(6px, 4px, 0) rotate(0)' } },
                    blob: { '0%': { transform: 'translate3d(0, 0, 0) scale(1)' }, '33%': { transform: 'translate3d(30px, -50px, 0) scale(1.1)' }, '66%': { transform: 'translate3d(-20px, 20px, 0) scale(0.9)' }, '100%': { transform: 'translate3d(0, 0, 0) scale(1)' } },
                    flicker: { '0%, 100%': { opacity: 1 }, '50%': { opacity: 0.5 }, '70%': { opacity: 0.8 }, '80%': { opacity: 0.2 } },
                    slideUp: { '0%': { transform: 'translate3d(0, 100%, 0)', opacity: 0 }, '100%': { transform: 'translate3d(0, 0, 0)', opacity: 1 } },
                    phoneRing: { '0%, 100%': { transform: 'rotate(0deg) translate3d(0,0,0)' }, '25%': { transform: 'rotate(-4deg) translate3d(-2px,0,0)' }, '75%': { transform: 'rotate(4deg) translate3d(2px,0,0)' } },
                    predictPulse: { '0%, 100%': { transform: 'scale(1)', filter: 'drop-shadow(0 0 10px rgba(225,29,72,0.8))' }, '50%': { transform: 'scale(1.05)', filter: 'drop-shadow(0 0 25px rgba(225,29,72,1))' } }
                },
                animation: {
                    shake: 'shake 0.3s infinite', 
                    'shake-hard': 'shakeHard 0.4s cubic-bezier(.36,.07,.19,.97) both',
                    blob: 'blob 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1)', 
                    flicker: 'flicker 3s infinite',
                    slideUp: 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards', 
                    phoneRing: 'phoneRing 0.2s infinite',
                    predictPulse: 'predictPulse 1s infinite'
                }
            }
        }
    }
  </script>

  <style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { margin: 0; padding: 0; background-color: #0a0f1c; color: #f8fafc; overflow: hidden; height: 100dvh; width: 100vw; perspective: 1000px; }

    /* Эффекты критических состояний */
    body.critical-budget .dashboard-panel { animation: flicker 4s infinite; }
    .hazard-border { position: fixed; inset: 0; z-index: 99; pointer-events: none; opacity: 0; transition: opacity 0.3s; border: 8px solid transparent; border-image: repeating-linear-gradient(45deg, #fbbf24, #fbbf24 20px, #1e293b 20px, #1e293b 40px) 8; }
    body.critical-safety .hazard-border { opacity: 0.8; }
    .vignette-anger { position: fixed; inset: 0; z-index: 30; pointer-events: none; box-shadow: inset 0 0 100px rgba(225, 29, 72, 0); transition: box-shadow 0.5s; }
    body.critical-loyalty .vignette-anger { box-shadow: inset 0 0 150px rgba(153, 27, 27, 0.5); }

    /* Фоны и окружение */
    .mesh-container { position: fixed; inset: 0; z-index: -2; overflow: hidden; background: #0f172a; }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; will-change: transform; }
    .grid-overlay { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 40px 40px; }
    
    .theme-morning .blob-1 { background: #0284c7; } .theme-morning .blob-2 { background: #38bdf8; }
    .theme-day .blob-1 { background: #2563eb; } .theme-day .blob-2 { background: #059669; }
    .theme-evening .blob-1 { background: #d97706; } .theme-evening .blob-2 { background: #7c3aed; }
    .theme-night .blob-1 { background: #1e1b4b; } .theme-night .blob-2 { background: #4c1d95; }

    /* Система частиц */
    .particle-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .dust { position: absolute; border-radius: 50%; background: rgba(226, 232, 240, 0.5); animation: float var(--d) infinite linear; will-change: transform, opacity; }
    .ember { position: absolute; border-radius: 50%; background: #ff2a00; box-shadow: 0 0 8px #ff2a00; animation: rise var(--d) infinite ease-in; will-change: transform, opacity; }
    @keyframes float { 0% { transform: translate3d(0, 110vh, 0); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translate3d(100px, -10vh, 0); opacity: 0; } }
    @keyframes rise { 0% { transform: translate3d(0, 110vh, 0) scale(1.2); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translate3d(-30px, -10vh, 0) scale(0.5); opacity: 0; } }

    /* Текстуры и карточки */
    .card-texture { position: absolute; inset: 0; border-radius: 36px; pointer-events: none; z-index: 15; background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.01) 0px, rgba(0,0,0,0.01) 1px, transparent 1px, transparent 3px); background-size: 4px 4px; opacity: 0.8; }
    .card-stack { position: relative; width: 100%; max-width: 340px; aspect-ratio: 3/4.2; margin: 0 auto; perspective: 1000px; z-index: 10; }
    .swipe-card { position: absolute; inset: 0; background: #ffffff; border-radius: 32px; display: flex; flex-direction: column; box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5); will-change: transform; overflow: hidden; }
    .next-card { position: absolute; inset: 0; background: #e2e8f0; border-radius: 32px; will-change: transform, opacity; z-index: -1; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 1px solid #cbd5e1; }

    /* Панель приборов */
    .dashboard-panel { background: linear-gradient(180deg, rgba(15,23,42,0.95) 0%, rgba(2,6,23,0.98) 100%); border-bottom: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 30px rgba(0,0,0,0.5); border-radius: 0 0 32px 32px; position: relative; z-index: 20; padding: 15px; }
    .analog-gauge { width: 75px; height: 38px; background: #020617; border-radius: 75px 75px 0 0; border: 3px solid #1e293b; border-bottom: none; position: relative; overflow: hidden; display: flex; justify-content: center; }
    .gauge-scale { position: absolute; width: 200%; height: 200%; bottom: 0; left: -50%; background: conic-gradient(from 270deg at 50% 50%, #ef4444 0deg, #f59e0b 90deg, #10b981 180deg); opacity: 0.9; border-radius: 50%; }
    .gauge-needle { position: absolute; bottom: 0; width: 3px; height: 34px; background: #f8fafc; transform-origin: bottom center; transition: transform 0.5s ease-out; border-radius: 3px; box-shadow: 0 0 4px #000; }
    .lcd-screen { background: #022c15; border: 2px solid #064e3b; border-radius: 8px; font-family: monospace; color: #34d399; padding: 8px 12px; font-weight: bold; font-size: 1.1rem; min-width: 140px; text-align: center; }
    .lcd-screen.danger { color: #f87171; background: #2c0202; border-color: #7f1d1d; }
    .loyalty-bar-container { width: 85px; height: 16px; background: #020617; border-radius: 8px; border: 2px solid #1e293b; overflow: hidden; }
    .loyalty-bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s, background-color 0.5s; }

    /* OS Dock и Приложения */
    .os-dock { position: absolute; right: 12px; top: 25vh; display: flex; flex-direction: column; gap: 16px; z-index: 50; }
    .dock-btn { width: 54px; height: 54px; border-radius: 18px; background: rgba(15, 23, 42, 0.85); border: 2px solid rgba(255,255,255,0.05); backdrop-filter: blur(12px); box-shadow: 0 10px 25px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; transition: transform 0.2s, background 0.2s; position: relative; }
    .dock-btn:active { transform: scale(0.9); background: rgba(30, 41, 59, 0.95); }
    .dock-btn.ringing { animation: phoneRing 0.3s infinite; border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5), inset 0 0 10px rgba(59, 130, 246, 0.3); }
    .dock-badge { position: absolute; top: -6px; right: -6px; background: #e11d48; color: white; font-size: 11px; font-weight: 900; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #0f172a; box-shadow: 0 0 10px rgba(225,29,72,0.8); animation: predictPulse 1s infinite; }
    .os-window-overlay { position: absolute; inset: 0; z-index: 150; background: rgba(2, 6, 23, 0.75); backdrop-filter: blur(10px); display: flex; flex-direction: column; padding: 24px 16px; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .os-window { background: #0f172a; flex: 1; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; }
    .chat-bubble-received { background: #1e293b; color: #f8fafc; padding: 12px 16px; border-radius: 20px; border-bottom-left-radius: 4px; max-width: 85%; align-self: flex-start; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }

    /* UI Элементы */
    .btn-back { position: absolute; top: 24px; left: 24px; width: 50px; height: 50px; background: rgba(30, 41, 59, 0.85); border: 2px solid rgba(148, 163, 184, 0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #f8fafc; font-size: 24px; font-weight: bold; cursor: pointer; backdrop-filter: blur(8px); z-index: 100; transition: transform 0.2s; }
    .btn-back:active { transform: scale(0.9); }
    .choice-indicator { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 16px; font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0; border: 3px solid; z-index: 30; background: rgba(255,255,255,0.95); box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: opacity 0.1s; white-space: nowrap; pointer-events: none; }
    .choice-left { color: #e11d48; border-color: #e11d48; } .choice-right { color: #10b981; border-color: #10b981; }
    .action-buttons { position: absolute; bottom: 25px; left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; padding: 0 20px; z-index: 40; }
    .btn-action { flex: 1; max-width: 160px; padding: 16px 10px; border-radius: 20px; font-weight: 900; font-size: 12px; text-transform: uppercase; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border-bottom: 5px solid; transition: transform 0.1s; cursor: pointer;}
    .btn-action:active { transform: translateY(5px); border-bottom-width: 0px; }
    .btn-reject { background: #ffe4e6; color: #be123c; border-color: #f43f5e; }
    .btn-accept { background: #d1fae5; color: #047857; border-color: #10b981; }
    .stamp { position: absolute; top: 15%; left: 50%; margin-left: -160px; font-size: 4.5rem; font-weight: 900; color: #e11d48; border: 10px solid #e11d48; padding: 10px 30px; border-radius: 20px; transform: rotate(-15deg); pointer-events: none; z-index: 100; opacity: 0; animation: stamp-smash 0.4s forwards; }
    .stamp.stamp-victory { color: #10b981; border-color: #10b981; }
    @keyframes stamp-smash { 0% { transform: scale(3) rotate(-20deg); opacity: 0; } 100% { transform: scale(1) rotate(-15deg); opacity: 1; } }

    .custom-scroll::-webkit-scrollbar { width: 4px; } .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); } .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
  </style>
</head>
<body>

<div id="game-root"></div>

<script src="./js/data.js"></script>
<script src="./js/audio.js"></script>
<script src="./js/chatEngine.js"></script>
<script type="text/babel" src="./js/CardEngine.jsx"></script>
<script type="text/babel" src="./js/index.jsx"></script>

</body>
</html>
