         p.className = 'particle';

      }

              const regex = new RegExp(`(${w})`, 'gi');
              res = res.replace(regex, '<span class="text-rose-600 font-black animate-shake inline-block">$&</span>');
          });
          return { __html: res };
      };
      return <p dangerouslySetInnerHTML={highlightWords(displayed)} className="text-slate-700 text-[1.15rem] font-semibold text-center leading-relaxed relative z-10" />;

  const ACHIEVEMENTS_LIST = [

        { id: 'tyrant', icon: '⚔️', title: 'Кровавый диктатор', desc: 'Уволен за бунт коллектива при высокой безопасности.' },
        { id: 'soft', icon: '🧸', title: 'Мамин добряк', desc: 'Разорил отель, пытаясь угодить всем.' },
        { id: 'slow', icon: '🐢', title: 'Тормоз', desc: 'Не успел принять решение в форс-мажоре.' },
        { id: 'blat', icon: '☎️', title: 'Блат не спас', desc: 'Звонил В.В., но всё равно провалил смену.' },
        { id: 'pro', icon: '🏆', title: 'Бог Охраны Труда', desc: 'Продержался более 20 смен.' }
  ];

  function Game() {
    const [gameState, setGameState] = useState('start'); 
    const [day, setDay] = useState(1);
    const [stats, setStats] = useState({ safety: 50, budget: 50, loyalty: 50 });
    const [flash, setFlash] = useState({ safety: false, budget: false, loyalty: false }); 
    const [deck, setDeck] = useState([]);
    const [currentCard, setCurrentCard] = useState(null);
    const [nextCard, setNextCard] = useState(null);
    const [deathReason, setDeathReason] = useState("");
    const [feedback, setFeedback] = useState(null);
    const [timeLeft, setTimeLeft] = useState(8);
    const [callUsed, setCallUsed] = useState(false);
    const [showCallOverlay, setShowCallOverlay] = useState(false);
    const [showCallHint, setShowCallHint] = useState(false);
    const [achievements, setAchievements] = useState([]);
    const [showGallery, setShowGallery] = useState(false);
    const [dragPos, setDragPos] = useState(0);
    const [bgState, setBgState] = useState(""); 
    
    const [swipingOut, setSwipingOut] = useState(false);
    
    const timerRef = useRef(null);
    const cardRef = useRef(null);
    const [isDragging, setIsDragging] = useState(false);
    const [startX, setStartX] = useState(0);

    useEffect(() => {
        try {
            setAchievements(JSON.parse(localStorage.getItem('smena_achievements') || '[]'));
        } catch(e) {}
    }, []);

    // ИСПРАВЛЕНИЕ: Таймер звонка В.В. увеличен с 3.5 сек до 7 секунд
    useEffect(() => {
        let hintTimer;
        if (!callUsed && gameState === 'playing' && (stats.safety < 40 || stats.budget < 40 || stats.loyalty < 40)) {
            setShowCallHint(true);
            hintTimer = setTimeout(() => setShowCallHint(false), 7000);
        } else {
            setShowCallHint(false);
        }
        return () => clearTimeout(hintTimer);
    }, [stats.safety, stats.budget, stats.loyalty, callUsed, gameState]);

    const unlockAchievement = (id) => {
        setAchievements(prev => {
            if (prev.includes(id)) return prev;
            const newArr = [...prev, id];
            try { localStorage.setItem('smena_achievements', JSON.stringify(newArr)); } catch(e) {}
            return newArr;
        });
    };

    const getRank = (days) => {
        if (days <= 5) return "Стажер с блокнотом 📝";
        if (days <= 10) return "Младший инспектор 🧐";
        if (days <= 15) return "Гроза нарушителей ⚡";
        if (days <= 20) return "Эксперт по ТБ 🛡️";
        return "Бог Охраны Труда 👑";
    };

    const initGame = () => {
      vibrate(50);
      setStats({ safety: 50, budget: 50, loyalty: 50 });
      setDay(1); 
      setCallUsed(false); 
      setFeedback(null); 
      setSwipingOut(false);
      
      // ИСПРАВЛЕНИЕ: Сброс координат перетаскивания и статуса при рестарте
      setDragPos(0);
      setIsDragging(false);
      setBgState("");

      const shuffled = [...ALL_SCENARIOS].sort(() => Math.random() - 0.5);
      setDeck(shuffled);
      setCurrentCard(shuffled[0]);
      setNextCard(shuffled[1]);
      setGameState('playing');
      if(shuffled[0].isUrgent) setTimeLeft(8);
    };

    const handleTimeout = () => {
        unlockAchievement('slow');
        setDeathReason("ИТОГ:\nВы растерялись в критической ситуации.\n\nВЕРДИКТ:\nВас отстранили за халатность.");
        setGameState('gameover');
        vibrate([500, 200, 500]);
    };

    useEffect(() => {
        if (gameState === 'playing' && currentCard?.isUrgent && !showCallOverlay && !feedback && !swipingOut) {
            timerRef.current = setInterval(() => {
                setTimeLeft(prev => {
                    if (prev <= 1) { clearInterval(timerRef.current); handleTimeout(); return 0; }
                    return prev - 1;
                });
            }, 1000);
            return () => clearInterval(timerRef.current);
        }
    }, [gameState, currentCard, showCallOverlay, feedback, swipingOut]);

    const makeChoice = (direction) => {
      if (showCallOverlay || feedback || swipingOut) return;
      clearInterval(timerRef.current);
      vibrate(40); burstParticles(direction); 
      setIsDragging(false); 
      
      setSwipingOut(true);
      setDragPos(direction === 'left' ? -400 : 400);

      const effects = direction === 'left' ? currentCard.onLeft : currentCard.onRight;
      const newSafety = Math.min(100, Math.max(0, stats.safety + effects.safety));
      const newBudget = Math.min(100, Math.max(0, stats.budget + effects.budget));
      const newLoyalty = Math.min(100, Math.max(0, stats.loyalty + effects.loyalty));

      setFlash({ safety: newSafety < stats.safety, budget: newBudget < stats.budget, loyalty: newLoyalty < stats.loyalty });
      setStats({ safety: newSafety, budget: newBudget, loyalty: newLoyalty });
      
      setTimeout(() => {
          setFeedback({ text: effects.msg, safety: effects.safety, budget: effects.budget, loyalty: effects.loyalty });
          setBgState("");
          
          setTimeout(() => {
              setFeedback(null);
              setSwipingOut(false);

              if (newSafety <= 0 || newBudget <= 0 || newLoyalty <= 0) {
                  let res = newSafety <= 0 ? "Тяжелый НС всплыл в прокуратуре." : newBudget <= 0 ? "Вы разорили отель закупками." : "Рабочие устроили бунт.";
                  setDeathReason(`ПОСЛЕДНЕЕ РЕШЕНИЕ:\n${effects.msg}\n\nВЕРДИКТ:\n${res}`);
                  if (newSafety <= 0 && newBudget >= 70) unlockAchievement('greed');
                  if (newBudget <= 0 && newLoyalty >= 70) unlockAchievement('soft');
                  if (newLoyalty <= 0 && newSafety >= 70) unlockAchievement('tyrant');
                  if (day > 20) unlockAchievement('pro');
                  setGameState('gameover'); vibrate([500, 100, 500]);
                  return;
              }
              setDay(prev => prev + 1);
              let newDeck = deck.slice(1);
              if (newDeck.length < 2) newDeck = [...ALL_SCENARIOS].sort(() => Math.random() - 0.5);
              setDeck(newDeck); setCurrentCard(newDeck[0]); setNextCard(newDeck[1]); setDragPos(0); 
              if(newDeck[0].isUrgent) setTimeLeft(8);
          }, 2000); 
      }, 600);
    };

    const callVV = () => {
        if (callUsed || showCallOverlay || feedback || swipingOut) return;
        vibrate([100, 50, 100]); clearInterval(timerRef.current); setCallUsed(true); setShowCallOverlay(true); setStats({ safety: 60, budget: 60, loyalty: 60 });
    };

    const handlePointerDown = (e) => {
      if(showCallOverlay || feedback || swipingOut) return;
      setIsDragging(true);
      setStartX(e.clientX || (e.touches && e.touches[0].clientX));
      if(cardRef.current) cardRef.current.classList.remove('resetting');
    };

    const handlePointerMove = (e) => {
      if (!isDragging || !cardRef.current || feedback || showCallOverlay || swipingOut) return;
      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      if (!clientX) return;
      
      const deltaX = clientX - startX;
      setDragPos(Math.min(200, Math.max(-200, deltaX)));
      
      if (deltaX > 30) setBgState("swipe-right"); 
      else if (deltaX < -30) setBgState("swipe-left"); 
      else setBgState("");
    };

    const handlePointerUp = () => {
      if (!isDragging) return;
      setIsDragging(false);
      setBgState("");
      if(cardRef.current) cardRef.current.classList.add('resetting');

      if (dragPos > 100) makeChoice('right'); 
      else if (dragPos < -100) makeChoice('left'); 
      else setDragPos(0);
    };

    const getFlaskGlow = (val) => val > 60 ? '#10b981' : val > 30 ? '#f59e0b' : '#ef4444';
    const getTimeClass = () => day <= 5 ? 'theme-morning' : day <= 10 ? 'theme-day' : day <= 15 ? 'theme-evening' : 'theme-night';

    if (showGallery) {
        return (
            <div className="absolute inset-0 z-50 bg-[#0f172a] p-6 overflow-y-auto flex flex-col animate-fade-in">
                <button onClick={() => setShowGallery(false)} className="bg-transparent border-none text-slate-400 text-left mb-6 text-xl font-bold cursor-pointer p-0 w-max hover:text-white transition-colors">← Назад</button>
                <h2 className="text-2xl font-black text-white mb-6 tracking-wide">🎖️ Ачивки ({achievements.length}/6)</h2>
                <div className="grid grid-cols-2 gap-4 pb-10">
                    {ACHIEVEMENTS_LIST.map(ach => {
                        const isUnlocked = achievements.includes(ach.id);
                        return (
                            <div key={ach.id} className={`p-4 rounded-xl border ${isUnlocked ? 'bg-slate-800 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.3)]' : 'bg-slate-900 border-slate-700 opacity-50'} flex flex-col items-center text-center transition-all`}>
                                <div className="text-4xl mb-3">{isUnlocked ? ach.icon : '❓'}</div>
                                <div className="font-bold text-[12px] text-white mb-1 uppercase tracking-wider leading-tight">{isUnlocked ? ach.title : 'Скрыто'}</div>
                                {isUnlocked && <div className="text-[10px] text-slate-400 leading-tight mt-1">{ach.desc}</div>}
                            </div>
                        )
                    })}
                </div>
            </div>
        );
    }

    if (gameState === 'start') {
      return (
        <div className="flex flex-col items-center justify-center h-[100dvh] px-6 text-center animate-fade-in relative theme-morning">
          <div className="mesh-container"><div className="blob blob-1 w-[400px] h-[400px] top-[-10%] left-[-10%] animate-blob"></div><div className="blob blob-2 w-[350px] h-[350px] bottom-[-10%] right-[-10%] animate-blob" style={{animationDelay: '2s'}}></div></div>
          <div className="grid-overlay"></div><div className="noise"></div>
          <div className="text-8xl mb-4 drop-shadow-[0_0_30px_rgba(14,165,233,0.6)]">👷</div>
          <h1 className="text-6xl font-black text-white mb-2 tracking-tighter">СМЕНА</h1>
          <p className="text-xl font-bold text-blue-400 mb-8 uppercase tracking-widest">Симулятор СОТ</p>
          <button onClick={initGame} className="bg-blue-600 text-white font-black py-5 w-full max-w-xs rounded-full text-xl shadow-[0_0_40px_rgba(37,99,235,0.6)] active:scale-95 uppercase mb-4 border-2 border-blue-400">Начать</button>
          <button onClick={() => setShowGallery(true)} className="bg-slate-800 text-slate-300 font-bold py-3 w-full max-w-xs rounded-full border border-slate-600 text-sm">🏆 Ачивки ({achievements.length}/6)</button>
        </div>
      );
    }

    if (gameState === 'gameover') {
      return (
        <div className="flex flex-col items-center justify-center h-[100dvh] px-6 text-center relative z-20 bg-slate-900/95 overflow-hidden">
          <div className="text-7xl mb-4">💀</div>
          <h1 className="text-4xl font-black text-rose-500 uppercase tracking-widest drop-shadow-lg mb-6">Игра окончена</h1>
          <div className="bg-slate-800 border-2 border-rose-900 p-6 rounded-3xl mb-6 max-w-sm w-full shadow-2xl">
              <p className="text-slate-200 text-sm whitespace-pre-line text-left font-medium leading-relaxed">{deathReason}</p>
          </div>
          
          <div className="text-5xl font-black text-blue-400 mb-4 drop-shadow-lg">{day} <span className="text-xl">смен</span></div>
          <div className="text-sm text-slate-400 mb-8 uppercase tracking-widest bg-slate-800/80 px-6 py-2 rounded-full border border-slate-700 relative z-10 shadow-lg">
            Ваше звание:<br/>
            <span className="text-xl font-black text-amber-400 drop-shadow-md">{getRank(day)}</span>
          </div>

          <div className="stamp">УВОЛЕН</div>
          <button onClick={initGame} className="bg-slate-700 text-white font-black py-4 w-full max-w-xs rounded-full mb-4 border border-slate-500 shadow-lg tracking-widest uppercase relative z-50">Заново</button>
          <button onClick={() => setShowGallery(true)} className="bg-slate-800 text-slate-300 font-bold py-3 w-full max-w-xs rounded-full border border-slate-600 text-sm relative z-50">🏆 Ачивки ({achievements.length}/6)</button>
        </div>
      );
    }

    const isCritical = stats.safety < 20 || stats.budget < 20 || stats.loyalty < 20;

    return (
      <div className={`flex flex-col h-[100dvh] overflow-hidden relative z-10 transition-all duration-1000 ${getTimeClass()} ${bgState === 'swipe-left' ? 'swipe-left' : bgState === 'swipe-right' ? 'swipe-right' : currentCard?.isUrgent ? 'bg-siren' : ''}`}
           onMouseMove={handlePointerMove} onTouchMove={handlePointerMove} onMouseUp={handlePointerUp} onTouchEnd={handlePointerUp} onMouseLeave={handlePointerUp}>
        
        <div className="mesh-container"><div className="blob blob-1 w-[500px] h-[500px] top-[-20%] left-[-10%] animate-blob"></div><div className="blob blob-2 w-[450px] h-[450px] bottom-[-10%] right-[-10%] animate-blob" style={{animationDelay: '3s'}}></div></div>
        <div className="grid-overlay"></div><div className="noise"></div>
        <div className={`tunnel-vision ${isCritical ? 'critical' : ''}`}></div>

        <div className="call-btn-container">
            {showCallHint && <div className="call-hint animate-fade-in">Ситуация критическая!<br/>Звонок В.В. спасет?</div>}
            <button onClick={callVV} className={`call-btn ${callUsed ? 'disabled' : ''}`}>☎️</button>
        </div>

        {showCallOverlay && (
            <div className="absolute inset-0 z-50 bg-slate-900/95 flex flex-col items-center justify-center p-8 text-center animate-fade-in backdrop-blur-md">
                <div className="text-8xl mb-6 filter drop-shadow-lg">👔</div><h2 className="text-3xl font-black text-white mb-4">В.В. на связи</h2>
                <p className="text-slate-300 text-lg mb-8 leading-relaxed">В.В. уладил дела. Все показатели восстановлены до 60%.<br/><br/><strong className="text-rose-400">"Это в последний раз."</strong></p>
                <button onClick={() => setShowCallOverlay(false)} className="bg-blue-600 text-white font-black py-4 px-10 rounded-full shadow-[0_0_30px_rgba(37,99,235,0.6)] border-2 border-blue-400 tracking-wider">В РАБОТУ</button>
            </div>
        )}

        {feedback && (
            <div className="absolute inset-0 z-[60] flex items-center justify-center p-4 animate-fade-in bg-slate-900/80 backdrop-blur-md">
                <div className="bg-white p-8 rounded-[32px] shadow-[0_20px_50px_rgba(0,0,0,0.5)] text-center border-4 border-slate-200 flex flex-col items-center justify-center max-w-sm w-full">
                    <p className="text-slate-900 font-black text-xl mb-8 leading-relaxed">{feedback.text}</p>
                    <div className="flex gap-8 font-black text-2xl">
                        {feedback.safety !== 0 && <span className={feedback.safety > 0 ? 'text-emerald-500' : 'text-rose-500'}>🛡️ {feedback.safety > 0 ? '+' : ''}{feedback.safety}</span>}
                        {feedback.budget !== 0 && <span className={feedback.budget > 0 ? 'text-emerald-500' : 'text-rose-500'}>💰 {feedback.budget > 0 ? '+' : ''}{feedback.budget}</span>}
                        {feedback.loyalty !== 0 && <span className={feedback.loyalty > 0 ? 'text-emerald-500' : 'text-rose-500'}>🤝 {feedback.loyalty > 0 ? '+' : ''}{feedback.loyalty}</span>}
                    </div>
                </div>
            </div>
        )}

        <div className={`glass-panel p-3 pb-4 rounded-b-[30px] shadow-2xl z-20`}>
            <div className="flex justify-between items-center mb-3 px-2">
                <div className="font-black text-2xl text-white tracking-tighter drop-shadow-md">СМЕНА {day}</div>
                {currentCard?.isUrgent && !feedback && <div className="text-lg font-black text-rose-500 bg-rose-950 px-4 py-1 rounded-full border-2 border-rose-500 animate-pulse shadow-[0_0_15px_rgba(225,29,72,0.5)]">⏱️ 0:0{timeLeft}</div>}
            </div>
            <div className="flex justify-between gap-6 px-2">
                {['safety', 'budget', 'loyalty'].map(s => (
                    <div key={s} className="flex-1 text-center">
                        <div className="text-2xl mb-1 filter drop-shadow-md">{s==='safety'?'🛡️':s==='budget'?'💰':'🤝'}</div>
                        <div className="flask-container"><div className={`flask-fill ${flash[s]?'flask-flash':''}`} style={{width: `${stats[s]}%`, backgroundColor: getFlaskGlow(stats[s]), boxShadow: `0 0 20px ${getFlaskGlow(stats[s])}`}}></div></div>
                    </div>
                ))}
            </div>
        </div>

        <div className="flex-1 relative flex items-center justify-center p-2">
            <div className="card-stack">
                {nextCard && <div className="next-card flex flex-center items-center justify-center"><div className="text-[5rem] opacity-20 grayscale">{nextCard.avatar}</div></div>}
                
                {currentCard && !feedback && (
                    <div ref={cardRef} className={`swipe-card cursor-grab active:cursor-grabbing ${currentCard.isUrgent?'urgent':''} ${swipingOut ? 'swiping-out' : ''} ${!isDragging && !swipingOut ? 'resetting' : ''}`}
                        style={{ transform: `translate(${dragPos}px, ${Math.abs(dragPos)*0.05}px) rotate(${dragPos*0.05}deg) rotateY(${dragPos*0.08}deg) rotateX(${Math.abs(dragPos)*0.03}deg)` }}
                        onMouseDown={handlePointerDown}
                        onTouchStart={handlePointerDown}
                    >
                        <div className="glare" style={{ opacity: Math.min(Math.abs(dragPos)/150, 0.4), background: `linear-gradient(${dragPos*0.5+180}deg, rgba(255,255,255,1) 0%, transparent 60%)` }}></div>
                        
                        <div className="choice-indicator choice-left" style={{opacity: dragPos < -30 ? 1 : 0}}>{currentCard.leftChoice}</div>
                        <div className="choice-indicator choice-right" style={{opacity: dragPos > 30 ? 1 : 0}}>{currentCard.rightChoice}</div>
                        
                        <div className={`relative z-10 bg-slate-50 rounded-t-[24px] p-4 flex flex-col items-center justify-center border-b h-[42%] ${currentCard.isUrgent?'bg-rose-50':''}`}>
                            <div className="text-[4.5rem] mb-1 filter drop-shadow-2xl">{currentCard.avatar}</div>
                            <h2 className="text-xl font-black text-slate-800 tracking-tight text-center leading-tight">{currentCard.character}</h2>
                            <div className="mt-2 px-3 py-1 rounded-full font-black text-[10px] uppercase shadow-lg tracking-widest bg-blue-600 text-white">{currentCard.role}</div>
                        </div>
                        <div className="p-4 flex-1 flex items-center justify-center bg-white rounded-b-[24px]"><TypewriterText text={currentCard.text} /></div>
                    </div>
                )}
            </div>
        </div>

        <div className="p-4 pb-6 w-full max-w-[400px] mx-auto flex justify-between gap-3 z-20">
            <button onClick={()=>makeChoice('left')} className="flex-1 bg-rose-100/90 text-rose-700 border-b-4 border-rose-300 font-black py-3 px-2 rounded-2xl uppercase text-[10px] sm:text-[11px] tracking-wider active:scale-95 transition-all flex items-center justify-center leading-tight shadow-lg backdrop-blur-md cursor-pointer min-h-[56px] text-center">{currentCard?.leftChoice || 'ОТКАЗАТЬ'}</button>
            <button onClick={()=>makeChoice('right')} className="flex-1 bg-emerald-100/90 text-emerald-700 border-b-4 border-emerald-300 font-black py-3 px-2 rounded-2xl uppercase text-[10px] sm:text-[11px] tracking-wider active:scale-95 transition-all flex items-center justify-center leading-tight shadow-lg backdrop-blur-md cursor-pointer min-h-[56px] text-center">{currentCard?.rightChoice || 'РАЗРЕШИТЬ'}</button>
        </div>
      </div>
    );
  }
  createRoot(document.getElementById('game-root')).render(<Game />);
</script>

</body>
</html>
