    { character: "Сварщик", role: "Подрядчик", avatar: "🥽", text: "Мне нужно приварить перила у входа. Огнетушителя рядом нет, наряд-допуск писать долго. Я за 5 минут всё сделаю!", leftChoice: "ОФОРМЛЯЙ НАРЯД", rightChoice: "ВАРИ БЫСТРО", onLeft: { safety: 15, budget: 0, loyalty: -15, msg: "Бюрократия заняла час. Подрядчик требует доплату за простой." }, onRight: { safety: -35, budget: 5, loyalty: 10, msg: "Искра попала на утеплитель фасада. Сильный пожар." } },
    { character: "Официантка", role: "Ресторан", avatar: "👠", text: "По корпоративному стандарту мы обязаны носить туфли на каблуке. Под конец смены я не чувствую ног. Можно я надену балетки?", leftChoice: "ДРЕСС-КОД ДЛЯ ВСЕХ", rightChoice: "РАЗРЕШИТЬ БАЛЕТКИ", onLeft: { safety: -10, budget: 0, loyalty: -20, msg: "Девушка упала в обморок от усталости. Текучка в зале." }, onRight: { safety: 10, budget: 0, loyalty: 20, msg: "Управляющий оштрафовал вас за нарушение стандартов сервиса." } },
    { character: "Грузчик", role: "Склад", avatar: "📦", text: "Рохля сломалась. Привезли 2 тонны картошки. Будем на руках таскать в подвал, вариантов нет.", leftChoice: "ЖДАТЬ РЕМОНТА", rightChoice: "ТАСКАЙТЕ", onLeft: { safety: 15, budget: -15, loyalty: -10, msg: "Картошка испортилась на жаре, шеф-повар негодует." }, onRight: { safety: -30, budget: 10, loyalty: -15, msg: "Сорванные спины и две производственные травмы." } },
    { character: "Стажер", role: "Горничная", avatar: "🧹", text: "Я случайно смешала хлорку с кислотным средством для унитазов. Из ведра пошел зеленый дым и воняет... Что делать?", leftChoice: "ЭВАКУАЦИЯ ЭТАЖА", rightChoice: "ВЫЛЕЙ В УНИТАЗ", onLeft: { safety: 20, budget: -20, loyalty: -20, msg: "Скандал, паника гостей, компенсации за сорванный отдых." }, onRight: { safety: -40, budget: 5, loyalty: -5, msg: "Выделение ядовитого хлора. Тяжелое отравление стажера." } },
    { character: "Электрик", role: "АХО", avatar: "⚡", text: "Автомат в щитовой постоянно выбивает. Давайте я напрямую провода скручу, мимо автомата? Больше вырубать не будет!", leftChoice: "ЗАПРЕТИТЬ", rightChoice: "СКРУЧИВАЙ", onLeft: { safety: 15, budget: -15, loyalty: -15, msg: "Половина отеля сидит без света в ожидании нового автомата." }, onRight: { safety: -50, budget: 10, loyalty: 5, msg: "Короткое замыкание вызвало масштабный пожар." } }
  ];

  function Game() {
    const [gameState, setGameState] = useState('start'); // start, playing, gameover
    const [day, setDay] = useState(1);
    const [stats, setStats] = useState({ safety: 50, budget: 50, loyalty: 50 });
    const [deck, setDeck] = useState([]);
    const [currentCard, setCurrentCard] = useState(null);
    const [nextCard, setNextCard] = useState(null);
    const [deathReason, setDeathReason] = useState("");
    const [bgState, setBgState] = useState(""); // '', 'swipe-left', 'swipe-right'

    const cardRef = useRef(null);
    const [dragPos, setDragPos] = useState(0);
    const [isDragging, setIsDragging] = useState(false);
    const [startX, setStartX] = useState(0);

    const getRank = (days) => {
        if (days <= 5) return "Стажер с блокнотом 📝";
        if (days <= 15) return "Младший инспектор 🧐";
        if (days <= 25) return "Гроза нарушителей ⚡";
        return "Бог Охраны Труда 👑";
    };

    const initGame = () => {
      vibrate(50);
      setStats({ safety: 50, budget: 50, loyalty: 50 });
      setDay(1);
      const shuffled = [...ALL_SCENARIOS].sort(() => Math.random() - 0.5);
      setDeck(shuffled);
      setCurrentCard(shuffled[0]);
      setNextCard(shuffled[1]);
      setGameState('playing');
      setBgState("");
    };

    useEffect(() => {
      if (gameState !== 'playing') return;

      if (stats.safety <= 0) {
        setDeathReason("Вы закрывали глаза на нарушения ТБ. Произошел тяжелый несчастный случай. На территорию зашла прокуратура. Вас ждет суд.");
        setGameState('gameover');
        vibrate([300, 100, 300]);
      } else if (stats.budget <= 0) {
        setDeathReason("Вы остановили все процессы и разорили отель штрафами и простоями. Инвесторы в бешенстве. Вас уволили с волчьим билетом.");
        setGameState('gameover');
        vibrate([300, 100, 300]);
      } else if (stats.loyalty <= 0) {
        setDeathReason("Команда вас ненавидит, а гости пишут ужасные отзывы. Персонал устроил массовую забастовку. Вы не справились с давлением.");
        setGameState('gameover');
        vibrate([300, 100, 300]);
      }
    }, [stats, gameState]);

    const makeChoice = (direction) => {
      vibrate(40);
      const effects = direction === 'left' ? currentCard.onLeft : currentCard.onRight;
      
      setStats(prev => ({
        safety: Math.min(100, Math.max(0, prev.safety + effects.safety)),
        budget: Math.min(100, Math.max(0, prev.budget + effects.budget)),
        loyalty: Math.min(100, Math.max(0, prev.loyalty + effects.loyalty)),
      }));

      setDay(prev => prev + 1);

      let newDeck = deck.slice(1);
      if (newDeck.length < 2) {
         newDeck = [...ALL_SCENARIOS].sort(() => Math.random() - 0.5);
      }
      setDeck(newDeck);
      setCurrentCard(newDeck[0]);
      setNextCard(newDeck[1]);
      setDragPos(0);
      setBgState("");
    };

    const handlePointerDown = (e) => {
      setIsDragging(true);
      setStartX(e.clientX || (e.touches && e.touches[0].clientX));
      if(cardRef.current) cardRef.current.classList.remove('resetting');
    };

    const handlePointerMove = (e) => {
      if (!isDragging) return;
      const currentX = e.clientX || (e.touches && e.touches[0].clientX);
      const deltaX = currentX - startX;
      
      if (deltaX > 200) setDragPos(200);
      else if (deltaX < -200) setDragPos(-200);
      else setDragPos(deltaX);

      if (deltaX > 30) setBgState("swipe-right");
      else if (deltaX < -30) setBgState("swipe-left");
      else setBgState("");
    };

    const handlePointerUp = () => {
      if (!isDragging) return;
      setIsDragging(false);
      setBgState("");
      if(cardRef.current) cardRef.current.classList.add('resetting');

      if (dragPos > 100) {
        makeChoice('right');
      } else if (dragPos < -100) {
        makeChoice('left');
      } else {
        setDragPos(0);
      }
    };

    const getBarColor = (val) => {
        if (val > 60) return '#10b981'; // Green
        if (val > 30) return '#f59e0b'; // Yellow
        return '#ef4444'; // Red
    };

    const shareResult = () => {
        const text = `Я продержался ${day} смен в игре "СМЕНА: Симулятор СОТ" и получил звание "${getRank(day)}". Попробуй побить мой рекорд!`;
        if (navigator.share) {
            navigator.share({ title: 'Симулятор СОТ', text: text, url: window.location.href }).catch(console.error);
        } else {
            navigator.clipboard.writeText(text + " " + window.location.href);
            alert("Результат скопирован в буфер обмена!");
        }
    };

    // === ЭКРАН СТАРТА ===
    if (gameState === 'start') {
      return (
        <div className="flex flex-col items-center justify-center h-screen px-6 text-center animate-fade-in relative z-10">
          <div className="text-8xl mb-4 drop-shadow-[0_0_20px_rgba(14,165,233,0.5)]">🛡️</div>
          <h1 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2 tracking-tight">СМЕНА</h1>
          <p className="text-xl font-bold text-slate-300 mb-2 uppercase tracking-widest">Симулятор Парк-Отеля</p>
          <p className="text-slate-400 mb-10 max-w-sm leading-relaxed text-sm bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
            Принимайте решения, смахивая карточки <span className="text-rose-400 font-bold">ВЛЕВО</span> (Запретить) или <span className="text-emerald-400 font-bold">ВПРАВО</span> (Разрешить). Балансируйте между Безопасностью, Бюджетом и Сервисом.
          </p>
          <button onClick={initGame} className="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-12 rounded-full text-lg shadow-[0_0_30px_rgba(37,99,235,0.6)] transition-all active:scale-95 uppercase tracking-wider">
            Выйти на смену
          </button>
        </div>
      );
    }

    // === ЭКРАН ПОРАЖЕНИЯ ===
    if (gameState === 'gameover') {
      return (
        <div className="flex flex-col items-center justify-center h-screen px-6 text-center animate-fade-in relative z-20 bg-slate-900/90 backdrop-blur-sm">
          <div className="text-7xl mb-4 drop-shadow-[0_0_30px_rgba(225,29,72,0.8)]">💀</div>
          <h1 className="text-4xl font-black text-white mb-2 uppercase tracking-wider text-rose-500">Игра окончена</h1>
          <div className="bg-slate-800 border border-rose-900/50 p-6 rounded-2xl mb-6 max-w-sm shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
             <p className="text-rose-400 font-bold text-xs mb-2 uppercase tracking-widest border-b border-rose-900/50 pb-2">Причина:</p>
             <p className="text-slate-200 text-sm leading-relaxed">{deathReason}</p>
          </div>
          <div className="text-xl font-bold text-slate-300 mb-2">Вы продержались:</div>
          <div className="text-5xl font-black text-blue-400 mb-6 drop-shadow-[0_0_15px_rgba(56,189,248,0.5)]">{day} <span className="text-xl">смен</span></div>
          
          <div className="text-sm text-slate-400 mb-8 uppercase tracking-widest">
            Ваше звание:<br/>
            <span className="text-lg font-bold text-amber-400">{getRank(day)}</span>
          </div>

          <div className="flex gap-4 w-full max-w-sm">
              <button onClick={initGame} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-xl transition-transform active:scale-95 border border-slate-500 shadow-lg text-sm">
                ЗАНОВО
              </button>
              <button onClick={shareResult} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-transform active:scale-95 shadow-[0_0_20px_rgba(37,99,235,0.4)] text-sm">
                ПОДЕЛИТЬСЯ
              </button>
          </div>
        </div>
      );
    }

    // === ИГРОВОЙ ЭКРАН ===
    const rotation = dragPos * 0.05; 
    const opacityLeft = dragPos < -20 ? Math.min(1, Math.abs(dragPos) / 100) : 0;
    const opacityRight = dragPos > 20 ? Math.min(1, dragPos / 100) : 0;

    return (
      <div className={`flex flex-col h-screen overflow-hidden relative z-10 transition-colors duration-300 ${bgState === 'swipe-left' ? 'bg-rose-950/40' : bgState === 'swipe-right' ? 'bg-emerald-950/40' : ''}`}
           onMouseMove={handlePointerMove} onMouseUp={handlePointerUp} onMouseLeave={handlePointerUp}
           onTouchMove={handlePointerMove} onTouchEnd={handlePointerUp}>
        
        {/* --- ВЕРХНЯЯ ПАНЕЛЬ (Статистика) --- */}
        <div className="glass-panel p-4 pb-5 rounded-b-[32px] shadow-[0_10px_30px_rgba(0,0,0,0.3)] z-20">
            <div className="flex justify-between items-center mb-5 px-2">
                <div className="font-black text-2xl text-white tracking-widest drop-shadow-md">СМЕНА {day}</div>
                <div className="text-[10px] font-bold text-slate-300 bg-slate-800/80 px-3 py-1.5 rounded-full uppercase tracking-widest border border-slate-600 shadow-inner">
                    Парк-Отель
                </div>
            </div>
            
            <div className="flex justify-between gap-5 px-2">
                {/* Шкала Безопасности */}
                <div className="flex-1 text-center">
                    <div className="text-2xl mb-1.5 filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">🛡️</div>
                    <div className="stat-bar-container border border-slate-700/50">
                        <div className="stat-bar-fill shadow-[inset_0_2px_4px_rgba(255,255,255,0.2)]" style={{width: `${stats.safety}%`, backgroundColor: getBarColor(stats.safety)}}></div>
                    </div>
                </div>
                {/* Шкала Бюджета */}
                <div className="flex-1 text-center">
                    <div className="text-2xl mb-1.5 filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">💰</div>
                    <div className="stat-bar-container border border-slate-700/50">
                        <div className="stat-bar-fill shadow-[inset_0_2px_4px_rgba(255,255,255,0.2)]" style={{width: `${stats.budget}%`, backgroundColor: getBarColor(stats.budget)}}></div>
                    </div>
                </div>
                {/* Шкала Гости/Команда */}
                <div className="flex-1 text-center">
                    <div className="text-2xl mb-1.5 filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">🤝</div>
                    <div className="stat-bar-container border border-slate-700/50">
                        <div className="stat-bar-fill shadow-[inset_0_2px_4px_rgba(255,255,255,0.2)]" style={{width: `${stats.loyalty}%`, backgroundColor: getBarColor(stats.loyalty)}}></div>
                    </div>
                </div>
            </div>
        </div>

        {/* --- ИГРОВОЕ ПОЛЕ С КАРТОЧКАМИ --- */}
        <div className="flex-1 relative flex items-center justify-center p-4 overflow-hidden">
            
            {/* Подсказки под карточкой */}
            <div className="absolute inset-0 flex items-center justify-between px-6 pointer-events-none opacity-30 z-0">
                <div className={`text-6xl font-black transition-colors ${bgState === 'swipe-left' ? 'text-rose-500' : 'text-slate-500'}`}>←</div>
                <div className={`text-6xl font-black transition-colors ${bgState === 'swipe-right' ? 'text-emerald-500' : 'text-slate-500'}`}>→</div>
            </div>

            <div className="card-stack">
                {/* Следующая карточка (Глубина) */}
                {nextCard && (
                    <div className="next-card flex flex-col items-center justify-center">
                        <div className="text-7xl filter opacity-50 grayscale">{nextCard.avatar}</div>
                    </div>
                )}

                {/* Текущая активная карточка */}
                {currentCard && (
                    <div 
                        ref={cardRef}
                        className="swipe-card cursor-grab active:cursor-grabbing"
                        style={{ transform: `translate(${dragPos}px, ${Math.abs(dragPos)*0.05}px) rotate(${rotation}deg)` }}
                        onMouseDown={handlePointerDown}
                        onTouchStart={handlePointerDown}
                    >
                        {/* Индикаторы свайпа */}
                        <div className="choice-indicator choice-left" style={{opacity: opacityLeft}}>{currentCard.leftChoice}</div>
                        <div className="choice-indicator choice-right" style={{opacity: opacityRight}}>{currentCard.rightChoice}</div>

                        {/* Шапка карточки */}
                        <div className="bg-slate-50 rounded-t-[28px] p-6 flex flex-col items-center justify-center border-b border-slate-200 h-[45%] shadow-[inset_0_-10px_20px_rgba(0,0,0,0.02)]">
                            <div className="text-[5rem] mb-2 filter drop-shadow-xl">{currentCard.avatar}</div>
                            <h2 className="text-2xl font-black text-slate-800 text-center leading-tight tracking-tight">{currentCard.character}</h2>
                            <div className="mt-2 bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold text-[10px] uppercase tracking-widest">{currentCard.role}</div>
                        </div>

                        {/* Текст ситуации */}
                        <div className="p-6 flex-1 flex items-center justify-center bg-white rounded-b-[28px]">
                            <p className="text-slate-700 text-lg font-medium text-center leading-relaxed">
                                "{currentCard.text}"
                            </p>
                        </div>
                    </div>
                )}
            </div>
        </div>

        {/* --- НИЖНЯЯ ПАНЕЛЬ (Кнопки) --- */}
        <div className="p-6 pb-8 flex justify-between gap-4 z-20">
            <button 
                onClick={() => makeChoice('left')}
                className="flex-1 bg-rose-100 hover:bg-rose-200 text-rose-700 border-2 border-rose-300 font-black py-4 rounded-2xl transition-all active:scale-95 shadow-[0_5px_15px_rgba(225,29,72,0.15)] uppercase tracking-wider text-sm">
                Отказать
            </button>
            <button 
                onClick={() => makeChoice('right')}
                className="flex-1 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 border-2 border-emerald-300 font-black py-4 rounded-2xl transition-all active:scale-95 shadow-[0_5px_15px_rgba(16,185,129,0.15)] uppercase tracking-wider text-sm">
                Согласиться
            </button>
        </div>
        
      </div>
    );
  }

  const rootElement = document.getElementById('game-root');
  if (rootElement) {
    const root = createRoot(rootElement);
    root.render(<Game />);
  }
</script>

</body>
</html>
