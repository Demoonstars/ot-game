<div id="game-root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const { createRoot } = ReactDOM;

  // --- БЕЗОПАСНЫЙ ЗВУКОВОЙ ДВИЖОК (Не ломает iOS/Android) ---
  const audioCtx = useRef(null);
  const masterGain = useRef(null);

  const initAudio = () => {
      try {
          if (!audioCtx.current) {
              const AudioContext = window.AudioContext || window.webkitAudioContext;
              if (AudioContext) {
                  audioCtx.current = new AudioContext();
                  masterGain.current = audioCtx.current.createGain();
                  masterGain.current.gain.value = 0.15;
                  masterGain.current.connect(audioCtx.current.destination);
              }
          }
          if (audioCtx.current && audioCtx.current.state === 'suspended') {
              audioCtx.current.resume();
          }
      } catch(e) { console.warn("Аудио недоступно", e); }
  };

  const playTone = (freq, type, duration, vol=1, slideFreq=null) => {
      if (!audioCtx.current || audioCtx.current.state !== 'running') return;
      try {
          const osc = audioCtx.current.createOscillator();
          const gain = audioCtx.current.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, audioCtx.current.currentTime);
          if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.current.currentTime + duration);
          gain.gain.setValueAtTime(vol, audioCtx.current.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.current.currentTime + duration);
          osc.connect(gain);
          gain.connect(masterGain.current);
          osc.start();
          osc.stop(audioCtx.current.currentTime + duration);
      } catch(e) {}
  };

  const playSwipeSound = () => playTone(300, 'sine', 0.15, 0.5, 150);
  const playDamageSound = () => playTone(100, 'sawtooth', 0.4, 0.8, 50);
  const playHeartbeatTone = () => { playTone(55, 'sine', 0.15, 1); setTimeout(() => playTone(55, 'sine', 0.15, 0.8), 250); };
  const playBossSound = () => playTone(400, 'square', 0.5, 0.3, 200);
  const playGameOver = () => playTone(200, 'sawtooth', 1.5, 0.8, 50);

  const vibratePhone = (pattern) => {
    if (typeof window !== 'undefined' && 'navigator' in window && window.navigator.vibrate) {
      window.navigator.vibrate(pattern);
    }
  };

  const burstParticles = (direction) => {
      const color = direction === 'left' ? '#e11d48' : '#10b981';
      for (let i = 0; i < 30; i++) {
         const p = document.createElement('div');
         p.className = 'particle';
         const size = Math.random() * 10 + 5;
         p.style.width = p.style.height = `${size}px`;
         p.style.backgroundColor = color;
         p.style.boxShadow = `0 0 15px ${color}`;
         p.style.left = `${window.innerWidth/2}px`;
         p.style.top = `${window.innerHeight/2}px`;
         p.style.setProperty('--tx', `${(Math.random()-0.5)*500}px`);
         p.style.setProperty('--ty', `${(Math.random()-0.5)*500 - 100}px`);
         document.body.appendChild(p);
         setTimeout(() => p.remove(), 800);
      }
  };

  // КИНЕТИЧЕСКИЙ ТЕКСТ С ВЫДЕЛЕНИЕМ (ИСПРАВЛЕНО ДЛЯ BABEL)
  const TypewriterText = ({ text }) => {
      const [displayed, setDisplayed] = useState("");
      useEffect(() => {
          setDisplayed(""); let i = 0;
          const timer = setInterval(() => {
              setDisplayed(text.slice(0, i + 1)); i++;
              if (i >= text.length) clearInterval(timer);
          }, 15);
          return () => clearInterval(timer);
      }, [text]);

      const highlightWords = (str) => {
          const words = ["убью", "штраф", "срочно", "пожар", "вскрыть", "уволю", "быстро", "скорую", "кровь", "эвакуация", "травма", "смерть", "упал"];
          let res = str;
          words.forEach(w => {
              const regex = new RegExp(`(${w})`, 'gi');
              // Безопасная конкатенация строк для Babel
              res = res.replace(regex, '<span class="text-rose-600 font-black animate-shake inline-block">$1</span>');
          });
          return { __html: res };
      };
      return <p dangerouslySetInnerHTML={highlightWords(displayed)} className="text-slate-700 text-[1.15rem] font-semibold text-center leading-relaxed relative z-10" />;
  };

    { isUrgent: false, character: "Бухгалтерия", role: "Финансы", avatar: "💸", text: "Пришло время закупать зимнюю спецодежду для дворников. Есть сертифицированная за 10 тыс. руб, и китайская на рынке без документов за 3 тыс. Какую берем?", leftChoice: "СЕРТИФИКАТ", rightChoice: "С РЫНКА", onLeft: { safety: 15, budget: -25, loyalty: 10, msg: "Рабочие в тепле, но бюджет исчерпан." }, onRight: { safety: -30, budget: 25, loyalty: -20, msg: "Дворники обморозили руки. ГИТ нашла несертифицированные СИЗ." } },

  function Game() {
    const [gameState, setGameState] = useState('start'); 
    const [day, setDay] = useState(1);
    const [stats, setStats] = useState({ safety: 50, budget: 50, loyalty: 50 });
    const [flash, setFlash] = useState({ safety: false, budget: false, loyalty: false }); 
    const [deck, setDeck] = useState([]);
    const [currentCard, setCurrentCard] = useState(null);
    const [nextCard, setNextCard] = useState(null);
    const [deathReason, setDeathReason] = useState("");

    const [timeLeft, setTimeLeft] = useState(8);
    const timerRef = useRef(null);
    const heartbeatRef = useRef(null);

    const [callUsed, setCallUsed] = useState(false);
    const [showCallOverlay, setShowCallOverlay] = useState(false);
    const [showCallHint, setShowCallHint] = useState(false);
    
    const [achievements, setAchievements] = useState([]);
    const [leaderboard, setLeaderboard] = useState([]);
    const [showGallery, setShowGallery] = useState(false);
    
    const [dragPos, setDragPos] = useState(0);
    const [bgState, setBgState] = useState(""); 
    const cardRef = useRef(null);
    const [isDragging, setIsDragging] = useState(false);
    const [startX, setStartX] = useState(0);

    const isCritical = stats.safety < 20 || stats.budget < 20 || stats.loyalty < 20;

    useEffect(() => {
        try {
            setAchievements(JSON.parse(localStorage.getItem('smena_achievements') || '[]'));
            setLeaderboard(JSON.parse(localStorage.getItem('smena_leaderboard') || '[]'));
        } catch(e) { console.warn('LS error'); }
    }, []);

    useEffect(() => {
        if (isCritical && gameState === 'playing' && !showCallOverlay && !feedback) {
            heartbeatRef.current = setInterval(() => playHeartbeatTone(), 1200);
        } else {
            clearInterval(heartbeatRef.current);
        }
        return () => clearInterval(heartbeatRef.current);
    }, [isCritical, gameState, showCallOverlay, feedback]);

    useEffect(() => {
        if (!callUsed && gameState === 'playing' && (stats.safety < 40 || stats.budget < 40 || stats.loyalty < 40)) {
            setShowCallHint(true);
        } else {
            setShowCallHint(false);
        }
    }, [stats, callUsed, gameState]);

    const unlockAchievement = (id) => {
        setAchievements(prev => {
            if (prev.includes(id)) return prev;
            const newArr = [...prev, id];
            try { localStorage.setItem('smena_achievements', JSON.stringify(newArr)); } catch(e) {}
            return newArr;
        });
    };

    const saveScore = (finalDay) => {
        const newScore = { days: finalDay, date: new Date().toLocaleDateString('ru-RU') };
        setLeaderboard(prev => {
            const newLb = [...prev, newScore].sort((a,b) => b.days - a.days).slice(0, 5);
            try { localStorage.setItem('smena_leaderboard', JSON.stringify(newLb)); } catch(e) {}
            return newLb;
        });
    };

    const getRank = (days) => {
        if (days <= 5) return "Стажер с блокнотом 📝";
        if (days <= 10) return "Младший инспектор 🧐";
        if (days <= 15) return "Гроза нарушителей ⚡";
        if (days <= 20) return "Эксперт по ТБ 🛡️";
        return "Бог Охраны Труда 👑";
    };

    const initGame = () => {
      initAudio();
      vibratePhone(50);
      setStats({ safety: 50, budget: 50, loyalty: 50 });
      setDay(1); setCallUsed(false); setFeedback(null);
      const shuffled = [...ALL_SCENARIOS].sort(() => Math.random() - 0.5);
      setDeck(shuffled);
      setCurrentCard(shuffled[0]);
      setNextCard(shuffled[1]);
      setGameState('playing');
      setBgState("");
      if(shuffled[0].isUrgent) setTimeLeft(8);
    };

    const handleTimeout = () => {
        unlockAchievement('slow');
        setDeathReason("ИТОГ:\nВы растерялись в критической ситуации.\n\nВЕРДИКТ:\nВас отстранили за халатность.");
        saveScore(day);
        setGameState('gameover');
        vibratePhone([500, 200, 500]);
        playGameOver();
    };

    useEffect(() => {
        if (gameState === 'playing' && (currentCard?.isUrgent || currentCard?.isBoss) && !showCallOverlay && !feedback) {
            timerRef.current = setInterval(() => {
                setTimeLeft(prev => {
                    if (prev <= 1) { clearInterval(timerRef.current); handleTimeout(); return 0; }
                    return prev - 1;
                });
            }, 1000);
            return () => clearInterval(timerRef.current);
        }
    }, [gameState, currentCard, showCallOverlay, feedback]);

    const makeChoice = (direction) => {
      if (showCallOverlay || feedback) return;
      clearInterval(timerRef.current);
      playSwipeSound();
      burstParticles(direction); 
      setIsDragging(false); 
      
      const effects = direction === 'left' ? currentCard.onLeft : currentCard.onRight;
      const newSafety = Math.min(100, Math.max(0, stats.safety + effects.safety));
      const newBudget = Math.min(100, Math.max(0, stats.budget + effects.budget));
      const newLoyalty = Math.min(100, Math.max(0, stats.loyalty + effects.loyalty));

      if (newSafety < stats.safety || newBudget < stats.budget || newLoyalty < stats.loyalty) playDamageSound();

      setFlash({ safety: newSafety < stats.safety, budget: newBudget < stats.budget, loyalty: newLoyalty < stats.loyalty });
      setStats({ safety: newSafety, budget: newBudget, loyalty: newLoyalty });
      setFeedback({ text: effects.msg, safety: effects.safety, budget: effects.budget, loyalty: effects.loyalty });
      setBgState("");
      
      // Задержка фидбека 3.5 секунды
      setTimeout(() => {
          setFeedback(null);
          if (newSafety <= 0 || newBudget <= 0 || newLoyalty <= 0) {
              let res = newSafety <= 0 ? "Тяжелый НС всплыл в прокуратуре." : newBudget <= 0 ? "Вы разорили отель закупками." : "Рабочие устроили бунт.";
              setDeathReason(`ПОСЛЕДНЕЕ РЕШЕНИЕ:\n${effects.msg}\n\nВЕРДИКТ:\n${res}`);
              if (newSafety <= 0 && newBudget >= 70) unlockAchievement('greed');
              if (newBudget <= 0 && newLoyalty >= 70) unlockAchievement('soft');
              if (newLoyalty <= 0 && newSafety >= 70) unlockAchievement('tyrant');
              if (day > 20) unlockAchievement('pro');
              saveScore(day);
              setGameState('gameover'); vibratePhone([500, 100, 500]); playGameOver();
              return;
          }
          
          const nextDay = day + 1;
          setDay(nextDay);
          
          let newDeck = [...deck];
          
          // Эффект Бабочки (добавляем карту-последствие в колоду)
          if (effects.spawnCard) {
              const insertIndex = Math.min(newDeck.length, Math.floor(Math.random() * 3) + 1);
              newDeck.splice(insertIndex, 0, effects.spawnCard);
          }

          newDeck = newDeck.slice(1);
          if (newDeck.length < 2) newDeck = [...newDeck, ...ALL_SCENARIOS.sort(() => Math.random() - 0.5)];
          
          // Босс-файт каждые 10 дней
          if (nextDay % 10 === 0) {
              const bossCard = BOSS_CARDS[Math.floor(Math.random() * BOSS_CARDS.length)];
              newDeck.unshift(bossCard);
              playBossSound();
          }

          setDeck(newDeck); setCurrentCard(newDeck[0]); setNextCard(newDeck[1]); setDragPos(0); 
          if(newDeck[0].isBoss) setTimeLeft(3); // Босс: 3 секунды
          else if(newDeck[0].isUrgent) setTimeLeft(8); // Обычный форс-мажор: 8 сек
      }, 3500); 
    };

    const callVV = () => {
        if (callUsed || showCallOverlay || feedback) return;
        vibratePhone([100, 50, 100]); clearInterval(timerRef.current); setCallUsed(true); setShowCallOverlay(true); setStats({ safety: 60, budget: 60, loyalty: 60 });
    };

    const handlePointerDown = (e) => {
      if(showCallOverlay || feedback) return;
      initAudio(); // Безопасное возобновление аудио при тапе
      setIsDragging(true); setStartX(e.clientX || (e.touches && e.touches[0].clientX));
      if(cardRef.current) cardRef.current.classList.remove('resetting');
    };

    const handlePointerMove = (e) => {
      // КРИТИЧНОЕ ИСПРАВЛЕНИЕ: Двигается только при зажатом клике
      if (!isDragging || !cardRef.current || feedback || showCallOverlay) return;
      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      if (!clientX) return;
      
      const deltaX = clientX - startX;
      setDragPos(Math.min(200, Math.max(-200, deltaX)));
      
      if (deltaX > 30) setBgState("swipe-right"); 
      else if (deltaX < -30) setBgState("swipe-left"); 
      else setBgState("");
    };

    const handlePointerUp = () => {
      if (!isDragging) return;
      setIsDragging(false);
      setBgState("");
      if(cardRef.current) cardRef.current.classList.add('resetting');

      if (dragPos > 100) makeChoice('right'); 
      else if (dragPos < -100) makeChoice('left'); 
      else setDragPos(0);
    };

    const getFlaskGlow = (val) => val > 60 ? '#10b981' : val > 30 ? '#f59e0b' : '#ef4444';
    const getTimeClass = () => currentCard?.isBoss ? 'theme-boss' : day <= 5 ? 'theme-morning' : day <= 10 ? 'theme-day' : day <= 15 ? 'theme-evening' : 'theme-night';

    // UI Отрисовка
    if (gameState === 'start') {
      return (
        <div className="flex flex-col items-center justify-center h-screen px-6 text-center animate-fade-in relative theme-morning">

                <div className="bg-slate-800 rounded-2xl p-5 mb-8 shadow-inner border border-slate-700">
                    {leaderboard.length === 0 ? <p className="text-slate-400 text-sm">Сыграйте, чтобы попасть в рейтинг!</p> : leaderboard.map((lb, i) => (
                        <div key={i} className="flex justify-between border-b border-slate-700 py-3 text-sm last:border-0"><span className="text-amber-400 font-black text-lg">#{i+1}</span><span className="text-white font-bold text-lg">{lb.days} смен</span><span className="text-slate-500 font-medium">{lb.date}</span></div>
                    ))}
                </div>
                <h2 className="text-2xl font-black text-white mb-6 tracking-wide">🎖️ Ачивки</h2>

                            <div key={ach.id} className={`p-4 rounded-xl border ${isUnlocked ? 'bg-slate-800 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.3)]' : 'bg-slate-900 border-slate-700 opacity-50'} flex flex-col items-center text-center transition-all`}>
                                <div className="text-4xl mb-3">{isUnlocked ? ach.icon : '❓'}</div>
                                <div className="font-bold text-[12px] text-white mb-1 uppercase tracking-wider">{isUnlocked ? ach.title : 'Скрыто'}</div>
                                {isUnlocked && <div className="text-[10px] text-slate-400 leading-tight mt-1">{ach.desc}</div>}
                            </div>
                        )
                    })}
                </div>
            </div>
          ) : (
            <>
              <div className="mesh-container"><div className="blob blob-1 w-[400px] h-[400px] top-[-10%] left-[-10%] animate-blob"></div><div className="blob blob-2 w-[350px] h-[350px] bottom-[-10%] right-[-10%] animate-blob" style={{animationDelay: '2s'}}></div></div>
              <div className="grid-overlay"></div><div className="noise"></div>

              <p className="text-xl font-bold text-blue-400 mb-8 uppercase tracking-widest drop-shadow-md">Симулятор СОТ</p>
              <button onClick={initGame} className="bg-blue-600 text-white font-black py-5 w-full max-w-xs rounded-full text-xl shadow-[0_0_40px_rgba(37,99,235,0.6)] active:scale-95 uppercase mb-5 border-2 border-blue-400 tracking-wider">Начать</button>
              <button onClick={() => {initAudio(); setShowGallery(true)}} className="bg-slate-800/80 text-slate-200 font-bold py-4 w-full max-w-xs rounded-full border border-slate-600 text-sm backdrop-blur-md">🏆 Рейтинг и Ачивки</button>
            </>
          )}
        </div>
      );
    }

    if (gameState === 'gameover') {
      return (
        <div className="flex flex-col items-center justify-center h-screen px-6 text-center relative z-20 bg-slate-900/95 overflow-hidden">
          <div className="text-[6rem] mb-4 drop-shadow-[0_0_30px_rgba(225,29,72,0.8)]">💀</div>
          <h1 className="text-4xl font-black text-rose-500 uppercase tracking-widest drop-shadow-lg mb-6">Игра окончена</h1>
          <div className="bg-slate-800 border-2 border-rose-900 p-6 rounded-3xl mb-8 max-w-sm w-full shadow-2xl"><p className="text-slate-200 text-sm whitespace-pre-line text-left font-medium leading-relaxed">{deathReason}</p></div>
          <div className="text-5xl font-black text-blue-400 mb-10 drop-shadow-lg">{day} <span className="text-xl">смен</span></div>
          <div className="stamp">УВОЛЕН</div>
          <button onClick={initGame} className="bg-slate-700 text-white font-black py-5 w-full max-w-xs rounded-full mb-4 border border-slate-500 shadow-lg tracking-widest uppercase">Заново</button>
        </div>
      );
    }

    const isCritical = stats.safety < 20 || stats.budget < 20 || stats.loyalty < 20;

    return (
      <div className={`flex flex-col h-screen overflow-hidden relative z-10 transition-all duration-1000 ${getTimeClass()} ${bgState === 'swipe-left' ? 'swipe-left' : bgState === 'swipe-right' ? 'swipe-right' : currentCard?.isUrgent && !currentCard.isBoss ? 'bg-siren' : ''}`}
           onMouseMove={handlePointerMove} onTouchMove={handlePointerMove} onMouseUp={handlePointerUp} onTouchEnd={handlePointerUp} onMouseLeave={handlePointerUp}>
        
        <div className="mesh-container"><div className="blob blob-1 w-[500px] h-[500px] top-[-20%] left-[-10%] animate-blob"></div><div className="blob blob-2 w-[450px] h-[450px] bottom-[-10%] right-[-10%] animate-blob" style={{animationDelay: '3s'}}></div></div>
        <div className="grid-overlay"></div><div className="noise"></div>
        <div className={`tunnel-vision ${isCritical ? 'critical' : ''}`}></div>

        <div className="call-btn-container">
            {showCallHint && <div className="call-hint animate-fade-in">Ситуация критическая!<br/>Звонок В.В. спасет?</div>}
            <button onClick={callVV} className={`call-btn ${callUsed ? 'disabled' : ''}`}>☎️</button>
        </div>

        {showCallOverlay && (
            <div className="absolute inset-0 z-50 bg-slate-900/95 flex flex-col items-center justify-center p-8 text-center animate-fade-in backdrop-blur-md">
                <div className="text-8xl mb-6 filter drop-shadow-lg">👔</div><h2 className="text-3xl font-black text-white mb-4">В.В. на связи</h2>
                <p className="text-slate-300 text-lg mb-8 leading-relaxed">В.В. уладил дела. Все показатели восстановлены до 60%.<br/><br/><strong className="text-rose-400">"Это в последний раз."</strong></p>
                <button onClick={() => setShowCallOverlay(false)} className="bg-blue-600 text-white font-black py-4 px-10 rounded-full shadow-[0_0_30px_rgba(37,99,235,0.6)] border-2 border-blue-400 tracking-wider">В РАБОТУ</button>
            </div>
        )}

        {/* МОДАЛКА КОММЕНТАРИЯ (3.5 сек) */}
        {feedback && (
            <div className="absolute inset-0 z-[60] flex items-center justify-center p-6 animate-fade-in bg-slate-900/80 backdrop-blur-md">
                <div className="bg-white p-8 rounded-[32px] shadow-[0_20px_50px_rgba(0,0,0,0.5)] text-center border-4 border-slate-200 flex flex-col items-center justify-center max-w-sm w-full">
                    <p className="text-slate-900 font-black text-xl mb-8 leading-relaxed">{feedback.text}</p>
                    <div className="flex gap-8 font-black text-2xl">
                        {feedback.safety !== 0 && <span className={feedback.safety > 0 ? 'text-emerald-500' : 'text-rose-500'}>🛡️ {feedback.safety > 0 ? '+' : ''}{feedback.safety}</span>}
                        {feedback.budget !== 0 && <span className={feedback.budget > 0 ? 'text-emerald-500' : 'text-rose-500'}>💰 {feedback.budget > 0 ? '+' : ''}{feedback.budget}</span>}
                        {feedback.loyalty !== 0 && <span className={feedback.loyalty > 0 ? 'text-emerald-500' : 'text-rose-500'}>🤝 {feedback.loyalty > 0 ? '+' : ''}{feedback.loyalty}</span>}
                    </div>
                </div>
            </div>
        )}

        <div className={`glass-panel p-5 pb-6 rounded-b-[40px] shadow-2xl z-20`}>
            <div className="flex justify-between items-center mb-6 px-2">
                <div className="font-black text-3xl text-white tracking-tighter drop-shadow-md">СМЕНА {day}</div>
                {currentCard?.isUrgent || currentCard?.isBoss ? 
                    <div className="text-xl font-black text-rose-500 bg-rose-950 px-5 py-1 rounded-full border-2 border-rose-500 animate-pulse shadow-[0_0_15px_rgba(225,29,72,0.5)]">⏱️ 0:0{timeLeft}</div> 
                    : <div className="text-[10px] font-bold text-slate-300 bg-slate-800/80 px-3 py-1.5 rounded-full uppercase tracking-widest border border-slate-600 shadow-inner">Отель</div>
                }
            </div>
            <div className="flex justify-between gap-6 px-2">
                {['safety', 'budget', 'loyalty'].map(s => (
                    <div key={s} className="flex-1 text-center">
                        <div className="text-3xl mb-1.5 filter drop-shadow-md">{s==='safety'?'🛡️':s==='budget'?'💰':'🤝'}</div>
                        <div className="flask-container"><div className={`flask-fill ${flash[s]?'flask-flash':''}`} style={{width: `${stats[s]}%`, backgroundColor: getFlaskGlow(stats[s]), boxShadow: `0 0 20px ${getFlaskGlow(stats[s])}`}}></div></div>
                    </div>
                ))}
            </div>
        </div>

        <div className="flex-1 relative flex items-center justify-center p-4">
            <div className="card-stack">
                {nextCard && <div className="next-card flex flex-center items-center justify-center"><div className="text-[6rem] opacity-20 grayscale">{nextCard.avatar}</div></div>}
                {currentCard && !feedback && (
                    <div ref={cardRef} className={`swipe-card cursor-grab active:cursor-grabbing ${currentCard.isUrgent?'urgent':''} ${currentCard.isBoss?'border-yellow-500 shadow-[0_0_50px_rgba(234,179,8,0.8)]':''}`}
                        style={{ transform: `translate(${dragPos}px, ${Math.abs(dragPos)*0.05}px) rotate(${dragPos*0.05}deg) rotateY(${dragPos*0.08}deg) rotateX(${Math.abs(dragPos)*0.03}deg)` }}
                        onMouseDown={handlePointerDown}
                        onTouchStart={handlePointerDown}
                    >
                        <div className="glare" style={{ opacity: Math.min(Math.abs(dragPos)/150, 0.4), background: `linear-gradient(${dragPos*0.5+180}deg, rgba(255,255,255,1) 0%, transparent 60%)` }}></div>
                        
                        <div className="choice-indicator choice-left" style={{opacity: dragPos < -30 ? 1 : 0}}>{currentCard.leftChoice}</div>
                        <div className="choice-indicator choice-right" style={{opacity: dragPos > 30 ? 1 : 0}}>{currentCard.rightChoice}</div>
                        
                        <div className={`bg-slate-50 rounded-t-[28px] p-8 flex flex-col items-center justify-center border-b h-[45%] ${currentCard.isUrgent?'bg-rose-50':''} ${currentCard.isBoss?'bg-yellow-100':''}`}>
                            <div className="text-[5.5rem] mb-2 filter drop-shadow-2xl">{currentCard.avatar}</div>
                            <h2 className="text-2xl font-black text-slate-800 tracking-tight text-center leading-tight">{currentCard.character}</h2>
                            <div className={`mt-3 px-4 py-1.5 rounded-full font-black text-[10px] uppercase shadow-lg tracking-widest ${currentCard.isBoss?'bg-yellow-500 text-yellow-950':'bg-blue-600 text-white'}`}>{currentCard.role}</div>
                        </div>
                        <div className="p-6 flex-1 flex items-center justify-center bg-white rounded-b-[28px]"><TypewriterText text={currentCard.text} /></div>
                    </div>
                )}
            </div>
        </div>

        <div className="p-6 pb-10 flex justify-between gap-4 z-20">
            <button onClick={()=>makeChoice('left')} className="flex-1 bg-rose-100/90 text-rose-700 border-b-4 border-rose-300 font-black py-5 px-2 rounded-3xl uppercase text-[11px] tracking-wider active:scale-95 transition-all flex items-center justify-center leading-tight shadow-lg backdrop-blur-md">{currentCard?.leftChoice || 'ОТКАЗАТЬ'}</button>
            <button onClick={()=>makeChoice('right')} className="flex-1 bg-emerald-100/90 text-emerald-700 border-b-4 border-emerald-300 font-black py-5 px-2 rounded-3xl uppercase text-[11px] tracking-wider active:scale-95 transition-all flex items-center justify-center leading-tight shadow-lg backdrop-blur-md">{currentCard?.rightChoice || 'РАЗРЕШИТЬ'}</button>
        </div>
      </div>
    );
  }
  createRoot(document.getElementById('game-root')).render(<Game />);
</script>

</body>
</html>
