<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>СМЕНА: Симулятор СОТ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { corePlugins: { preflight: false } }
  </script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* === БАЗОВЫЕ СТИЛИ ДЛЯ ИГРЫ === */
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
    body { 
        margin: 0; padding: 0; 
        background-color: #0f172a; 
        color: #f8fafc; 
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden; /* Запрещаем скролл страницы */
        touch-action: none; /* Запрещаем стандартные свайпы браузера */
    }

    .game-bg {
        position: fixed; inset: 0; z-index: -1;
        background: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 100%);
    }

    .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.1);
    }

    /* Анимации */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    
    @keyframes pulse-soft { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .animate-pulse-soft { animation: pulse-soft 2s infinite; }

    /* Прогресс-бары */
    .stat-bar-container { width: 100%; height: 8px; background: #334155; border-radius: 4px; overflow: hidden; margin-top: 4px;}
    .stat-bar-fill { height: 100%; transition: width 0.3s ease, background-color 0.3s ease; }

    /* Стили для карточки при свайпе */
    .swipe-card {
        transition: transform 0.1s;
        will-change: transform;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .swipe-card.resetting {
        transition: transform 0.3s ease-out;
    }
    
    /* Индикаторы выбора на карточке (Появляются при натяжении) */
    .choice-indicator {
        position: absolute; top: 20px; padding: 8px 16px; border-radius: 8px; font-weight: 900; font-size: 1.2rem;
        text-transform: uppercase; letter-spacing: 1px; opacity: 0; border: 4px solid; z-index: 10;
    }
    .choice-left { right: 20px; color: #ef4444; border-color: #ef4444; transform: rotate(15deg); }
    .choice-right { left: 20px; color: #10b981; border-color: #10b981; transform: rotate(-15deg); }
  </style>
</head>
<body>

<div class="game-bg"></div>
<div id="game-root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const { createRoot } = ReactDOM;

  // Аудио и вибрация
  const vibrate = (pattern) => {
    if (typeof window !== 'undefined' && 'navigator' in window && window.navigator.vibrate) {
      window.navigator.vibrate(pattern);
    }
  };

  // --- БАЗА СЦЕНАРИЕВ (Тестовая выборка) ---
  const INITIAL_SCENARIOS = [
    {
      character: "Мастер Петрович",
      role: "Начальник цеха",
      avatar: "👷‍♂️",
      text: "У нас горит план! Дай добро запустить пресс без защитного экрана, мы аккуратно. Я лично прослежу, иначе премии всех лишат!",
      leftChoice: "ЗАПРЕТИТЬ",
      rightChoice: "РАЗРЕШИТЬ",
      onLeft: { safety: 10, budget: -15, loyalty: -10, msg: "План сорван, но все живы." },
      onRight: { safety: -30, budget: 15, loyalty: 10, msg: "План выполнен, но рабочий чуть не лишился пальцев." }
    },
    {
      character: "Генеральный",
      role: "Директор",
      avatar: "👔",
      text: "Слушай, у нас кассовый разрыв. Давай в этом квартале закупим дешевые китайские каски и ботинки вместо сертифицированных?",
      leftChoice: "ВОЗРАЗИТЬ",
      rightChoice: "СОГЛАСИТЬСЯ",
      onLeft: { safety: 10, budget: -20, loyalty: 5, msg: "Директор недоволен, но защита надежная." },
      onRight: { safety: -25, budget: 20, loyalty: -15, msg: "Бюджет спасен. Рабочие жалуются на мозоли и трещины." }
    },
    {
      character: "Стажер Макс",
      role: "Разнорабочий",
      avatar: "🤕",
      text: "Жарко в этой каске, сил нет! Можно я сниму на часок? Тут всё равно сверху ничего не падает, я проверял.",
      leftChoice: "ОШТРАФОВАТЬ",
      rightChoice: "ЗАКРЫТЬ ГЛАЗА",
      onLeft: { safety: 5, budget: 5, loyalty: -20, msg: "Стажер обиделся, коллеги считают вас тираном." },
      onRight: { safety: -20, budget: 0, loyalty: 15, msg: "Стажер счастлив. До первого падающего болта." }
    },
    {
      character: "Иван Сергеевич",
      role: "Инспектор ГИТ",
      avatar: "🕵️‍♂️",
      text: "Добрый день. У вас тут в журнале инструктажей подписей не хватает за прошлый месяц. Будем оформлять предписание?",
      leftChoice: "ИДТИ В ОТКАЗ",
      rightChoice: "ДОГОВОРИТЬСЯ",
      onLeft: { safety: -10, budget: -25, loyalty: 0, msg: "Получили официальный штраф на компанию." },
      onRight: { safety: 0, budget: -15, loyalty: -10, msg: "Решили вопрос 'малой кровью', но осадок остался." }
    },
    {
      character: "Светлана",
      role: "Бухгалтер",
      avatar: "👩‍💼",
      text: "Мы забыли отправить трех водителей на медосмотр. Если отправим сейчас, придется снимать их с рейсов на два дня. Что делаем?",
      leftChoice: "ОТСТРАНИТЬ",
      rightChoice: "ПУСТЬ ЕДУТ",
      onLeft: { safety: 15, budget: -20, loyalty: -5, msg: "Рейсы сорваны, зато по закону всё чисто." },
      onRight: { safety: -35, budget: 10, loyalty: 5, msg: "Водитель уснул за рулем. Огромные проблемы." }
    },
    {
      character: "Бригада",
      role: "Монтажники",
      avatar: "👥",
      text: "Мы не пойдем чистить крышу без нормальных страховочных привязей! Эти старые пояса уже гнилые!",
      leftChoice: "УГРОЖАТЬ",
      rightChoice: "КУПИТЬ НОВЫЕ",
      onLeft: { safety: -20, budget: 0, loyalty: -30, msg: "Назревает забастовка и жалоба в прокуратуру." },
      onRight: { safety: 15, budget: -25, loyalty: 20, msg: "Рабочие довольны, но бюджет трещит по швам." }
    }
  ];

  function Game() {
    const [gameState, setGameState] = useState('start'); // start, playing, gameover
    const [day, setDay] = useState(1);
    const [stats, setStats] = useState({ safety: 50, budget: 50, loyalty: 50 });
    const [cards, setCards] = useState([]);
    const [currentCard, setCurrentCard] = useState(null);
    const [deathReason, setDeathReason] = useState("");

    // Состояния для физики свайпа
    const cardRef = useRef(null);
    const [dragPos, setDragPos] = useState(0);
    const [isDragging, setIsDragging] = useState(false);
    const [startX, setStartX] = useState(0);

    // Инициализация игры
    const initGame = () => {
      vibrate(50);
      setStats({ safety: 50, budget: 50, loyalty: 50 });
      setDay(1);
      // Перемешиваем колоду
      const shuffled = [...INITIAL_SCENARIOS].sort(() => Math.random() - 0.5);
      setCards(shuffled);
      setCurrentCard(shuffled[0]);
      setGameState('playing');
    };

    // Проверка на проигрыш после каждого хода
    useEffect(() => {
      if (gameState !== 'playing') return;

      if (stats.safety <= 0) {
        setDeathReason("Произошел тяжелый несчастный случай. В компанию пришла прокуратура. Вас уволили с волчьим билетом.");
        setGameState('gameover');
        vibrate([300, 100, 300]);
      } else if (stats.budget <= 0) {
        setDeathReason("Вы остановили производство и разорили компанию штрафами. Генеральный директор указал вам на дверь.");
        setGameState('gameover');
        vibrate([300, 100, 300]);
      } else if (stats.loyalty <= 0) {
        setDeathReason("Коллектив вас ненавидит. Рабочие устроили саботаж и массово написали заявления на увольнение. Вы не справились.");
        setGameState('gameover');
        vibrate([300, 100, 300]);
      }
    }, [stats, gameState]);

    // Обработка выбора (Влево или Вправо)
    const makeChoice = (direction) => {
      vibrate(30);
      const effects = direction === 'left' ? currentCard.onLeft : currentCard.onRight;
      
      setStats(prev => ({
        safety: Math.min(100, Math.max(0, prev.safety + effects.safety)),
        budget: Math.min(100, Math.max(0, prev.budget + effects.budget)),
        loyalty: Math.min(100, Math.max(0, prev.loyalty + effects.loyalty)),
      }));

      setDay(prev => prev + 1);

      // Берем следующую карту (если закончились - перемешиваем заново)
      let nextCards = cards.slice(1);
      if (nextCards.length === 0) {
         nextCards = [...INITIAL_SCENARIOS].sort(() => Math.random() - 0.5);
      }
      setCards(nextCards);
      setCurrentCard(nextCards[0]);
      setDragPos(0);
    };

    // --- ФИЗИКА СВАЙПА (Touch & Mouse) ---
    const handlePointerDown = (e) => {
      setIsDragging(true);
      setStartX(e.clientX || e.touches[0].clientX);
      if(cardRef.current) cardRef.current.classList.remove('resetting');
    };

    const handlePointerMove = (e) => {
      if (!isDragging) return;
      const currentX = e.clientX || (e.touches && e.touches[0].clientX);
      const deltaX = currentX - startX;
      // Ограничиваем сдвиг экрана
      if (deltaX > 200) setDragPos(200);
      else if (deltaX < -200) setDragPos(-200);
      else setDragPos(deltaX);
    };

    const handlePointerUp = () => {
      if (!isDragging) return;
      setIsDragging(false);
      if(cardRef.current) cardRef.current.classList.add('resetting');

      if (dragPos > 100) {
        makeChoice('right');
      } else if (dragPos < -100) {
        makeChoice('left');
      } else {
        // Возвращаем в центр, если свайп был слабый
        setDragPos(0);
      }
    };

    // Отрисовка цвета прогресс-бара
    const getBarColor = (val) => {
        if (val > 60) return '#10b981'; // Green
        if (val > 30) return '#f59e0b'; // Yellow
        return '#ef4444'; // Red
    };

    // === ЭКРАН СТАРТА ===
    if (gameState === 'start') {
      return (
        <div className="flex flex-col items-center justify-center h-screen px-6 text-center animate-fade-in">
          <div className="text-8xl mb-6">👷‍♂️</div>
          <h1 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-4 tracking-tight">СМЕНА</h1>
          <p className="text-xl font-bold text-slate-300 mb-2">Симулятор специалиста по ОТ</p>
          <p className="text-slate-400 mb-10 max-w-sm leading-relaxed">
            Принимайте решения, смахивая карточки <span className="text-rose-400 font-bold">ВЛЕВО</span> (Запретить) или <span className="text-emerald-400 font-bold">ВПРАВО</span> (Разрешить). Балансируйте между безопасностью, планом и людьми. Не дайте показателям упасть до нуля!
          </p>
          <button onClick={initGame} className="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-12 rounded-full text-lg shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-transform active:scale-95">
            НАЧАТЬ СМЕНУ
          </button>
        </div>
      );
    }

    // === ЭКРАН ПОРАЖЕНИЯ ===
    if (gameState === 'gameover') {
      return (
        <div className="flex flex-col items-center justify-center h-screen px-6 text-center animate-fade-in relative z-20">
          <div className="text-7xl mb-6 drop-shadow-[0_0_20px_rgba(239,68,68,0.8)]">💀</div>
          <h1 className="text-4xl font-black text-white mb-2 uppercase">Вы уволены</h1>
          <div className="bg-slate-800/80 border border-slate-700 p-6 rounded-2xl mb-8 max-w-sm backdrop-blur-md">
             <p className="text-rose-400 font-bold text-sm mb-2 uppercase tracking-widest">Причина:</p>
             <p className="text-slate-200 leading-relaxed">{deathReason}</p>
          </div>
          <div className="text-2xl font-bold text-slate-300 mb-8">
            Вы продержались: <span className="text-blue-400 text-4xl">{day}</span> дней
          </div>
          <button onClick={initGame} className="bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 px-10 rounded-full transition-transform active:scale-95 border border-slate-500">
            ПОПРОБОВАТЬ СНОВА
          </button>
        </div>
      );
    }

    // === ИГРОВОЙ ЭКРАН ===
    const rotation = dragPos * 0.05; // Наклон при перетаскивании
    const opacityLeft = dragPos < -20 ? Math.min(1, Math.abs(dragPos) / 100) : 0;
    const opacityRight = dragPos > 20 ? Math.min(1, dragPos / 100) : 0;

    return (
      <div className="flex flex-col h-screen overflow-hidden relative z-10"
           onMouseMove={handlePointerMove} onMouseUp={handlePointerUp} onMouseLeave={handlePointerUp}
           onTouchMove={handlePointerMove} onTouchEnd={handlePointerUp}>
        
        {/* --- ВЕРХНЯЯ ПАНЕЛЬ (Статистика) --- */}
        <div className="glass-panel p-4 pb-6 rounded-b-3xl shadow-lg z-20">
            <div className="flex justify-between items-center mb-4 px-2">
                <div className="font-black text-xl text-white tracking-widest">ДЕНЬ {day}</div>
                <div className="text-xs font-bold text-slate-400 bg-slate-800 px-3 py-1 rounded-full uppercase tracking-wider border border-slate-700">СМЕНА</div>
            </div>
            
            <div className="flex justify-between gap-4 px-1">
                {/* Шкала Безопасности */}
                <div className="flex-1 text-center">
                    <div className="text-2xl mb-1 drop-shadow-md">🛡️</div>
                    <div className="stat-bar-container">
                        <div className="stat-bar-fill" style={{width: `${stats.safety}%`, backgroundColor: getBarColor(stats.safety)}}></div>
                    </div>
                </div>
                {/* Шкала Бюджета/Плана */}
                <div className="flex-1 text-center">
                    <div className="text-2xl mb-1 drop-shadow-md">💰</div>
                    <div className="stat-bar-container">
                        <div className="stat-bar-fill" style={{width: `${stats.budget}%`, backgroundColor: getBarColor(stats.budget)}}></div>
                    </div>
                </div>
                {/* Шкала Лояльности */}
                <div className="flex-1 text-center">
                    <div className="text-2xl mb-1 drop-shadow-md">🤝</div>
                    <div className="stat-bar-container">
                        <div className="stat-bar-fill" style={{width: `${stats.loyalty}%`, backgroundColor: getBarColor(stats.loyalty)}}></div>
                    </div>
                </div>
            </div>
        </div>

        {/* --- ИГРОВОЕ ПОЛЕ С КАРТОЧКОЙ --- */}
        <div className="flex-1 relative flex items-center justify-center p-4 overflow-hidden">
            
            {/* Подсказки под карточкой (фон) */}
            <div className="absolute inset-0 flex items-center justify-between px-8 pointer-events-none opacity-20 z-0">
                <div className="text-6xl text-rose-500 font-black">←</div>
                <div className="text-6xl text-emerald-500 font-black">→</div>
            </div>

            {currentCard && (
                <div 
                    ref={cardRef}
                    className="swipe-card w-full max-w-[340px] aspect-[3/4] bg-white rounded-[32px] border-4 border-slate-200 flex flex-col relative z-10 cursor-grab active:cursor-grabbing"
                    style={{ transform: `translate(${dragPos}px, ${Math.abs(dragPos)*0.1}px) rotate(${rotation}deg)` }}
                    onMouseDown={handlePointerDown}
                    onTouchStart={handlePointerDown}
                >
                    {/* Индикаторы свайпа (Появляются только при натяжении) */}
                    <div className="choice-indicator choice-left" style={{opacity: opacityLeft}}>{currentCard.leftChoice}</div>
                    <div className="choice-indicator choice-right" style={{opacity: opacityRight}}>{currentCard.rightChoice}</div>

                    {/* Верхняя часть карточки: Аватар и Имя */}
                    <div className="bg-slate-100 rounded-t-[28px] p-6 flex flex-col items-center justify-center border-b border-slate-200 h-[45%]">
                        <div className="text-7xl mb-3 filter drop-shadow-md">{currentCard.avatar}</div>
                        <h2 className="text-2xl font-black text-slate-800 text-center leading-tight">{currentCard.character}</h2>
                        <p className="text-slate-500 font-bold text-xs uppercase tracking-widest mt-1">{currentCard.role}</p>
                    </div>

                    {/* Нижняя часть карточки: Текст ситуации */}
                    <div className="p-6 flex-1 flex items-center justify-center bg-white rounded-b-[28px]">
                        <p className="text-slate-700 text-lg font-medium text-center leading-relaxed">
                            "{currentCard.text}"
                        </p>
                    </div>
                </div>
            )}
        </div>

        {/* --- НИЖНЯЯ ПАНЕЛЬ (Кнопки для тех, кому неудобно свайпать) --- */}
        <div className="p-6 pb-10 flex justify-between gap-4 z-20">
            <button 
                onClick={() => makeChoice('left')}
                className="flex-1 bg-rose-100 hover:bg-rose-200 text-rose-700 border-2 border-rose-300 font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-sm">
                Отказать
            </button>
            <button 
                onClick={() => makeChoice('right')}
                className="flex-1 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 border-2 border-emerald-300 font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-sm">
                Разрешить
            </button>
        </div>
        
      </div>
    );
  }

  const rootElement = document.getElementById('game-root');
  if (rootElement) {
    const root = createRoot(rootElement);
    root.render(<Game />);
  }
</script>

</body>
</html>
