    const ACHIEVEMENTS_LIST = [
        { id: 'greed', icon: '🤑', title: 'Скупой платит дважды', desc: 'Уволен за травмы, хотя бюджет был полон.' },
        { id: 'tyrant', icon: '⚔️', title: 'Кровавый диктатор', desc: 'Уволен за бунт коллектива при высокой безопасности.' },
        { id: 'soft', icon: '🧸', title: 'Мамин добряк', desc: 'Разорил отель, пытаясь угодить всем сотрудникам.' },
        { id: 'slow', icon: '🐢', title: 'Тормоз', desc: 'Не успел принять решение в форс-мажоре.' },
        { id: 'blat', icon: '☎️', title: 'Блат не спас', desc: 'Звонил В.В., но всё равно провалил смену.' },
        { id: 'pro', icon: '🏆', title: 'Бог Охраны Труда', desc: 'Продержался более 20 смен.' }
    ];

    useEffect(() => {
        const saved = JSON.parse(localStorage.getItem('smena_achievements') || '[]');
        setAchievements(saved);
    }, []);

    const unlockAchievement = (id) => {
        setAchievements(prev => {
            if (prev.includes(id)) return prev;
            const newArr = [...prev, id];
            localStorage.setItem('smena_achievements', JSON.stringify(newArr));
            return newArr;
        });
    };

    const getRank = (days) => {
        if (days <= 5) return "Стажер с блокнотом 📝";
        if (days <= 10) return "Младший инспектор 🧐";
        if (days <= 15) return "Гроза нарушителей ⚡";
        if (days <= 20) return "Эксперт по ТБ 🛡️";
        return "Бог Охраны Труда 👑";
    };

    const initGame = () => {
      vibrate(50);
      setStats({ safety: 50, budget: 50, loyalty: 50 });
      setFlash({ safety: false, budget: false, loyalty: false });
      setDay(1);
      setCallUsed(false);
      const shuffled = [...ALL_SCENARIOS].sort(() => Math.random() - 0.5);
      setDeck(shuffled);
      setCurrentCard(shuffled[0]);
      setNextCard(shuffled[1]);
      setGameState('playing');
      setBgState("");
      if(shuffled[0].isUrgent) setTimeLeft(8);
    };

    // Таймер форс-мажора (8 секунд)
    useEffect(() => {
        if (gameState === 'playing' && currentCard?.isUrgent && !showCallOverlay) {
            timerRef.current = setInterval(() => {
                setTimeLeft(prev => {
                    if (prev <= 1) {
                        clearInterval(timerRef.current);
                        handleTimeout();
                        return 0;
                    }
                    return prev - 1;
                });
            }, 1000);
            return () => clearInterval(timerRef.current);
        }
    }, [gameState, currentCard, showCallOverlay]);

    const handleTimeout = () => {
        unlockAchievement('slow');
        setDeathReason("Вы растерялись в критической ситуации. Секунды промедления стоили слишком дорого. Вас отстранили от должности за халатность.");
        setGameState('gameover');
        vibrate([500, 200, 500]);
    };

    // Триггер вспышек урона и проверка проигрыша
    const prevStats = useRef(stats);
    useEffect(() => {
      if (gameState !== 'playing') return;

      // Проверка на урон для анимации колб
      const newFlash = {
          safety: stats.safety < prevStats.current.safety,
          budget: stats.budget < prevStats.current.budget,
          loyalty: stats.loyalty < prevStats.current.loyalty,
      };
      setFlash(newFlash);
      prevStats.current = stats;
      const t = setTimeout(() => setFlash({ safety:false, budget:false, loyalty:false }), 500);

      // Проверка на Game Over
      let gameOver = false;
      if (stats.safety <= 0) {
        setDeathReason("Вы закрывали глаза на нарушения ТБ. Произошел тяжелый несчастный случай. В отель пришла прокуратура. Вы под следствием.");
        if (stats.budget >= 70) unlockAchievement('greed');
        gameOver = true;
      } else if (stats.budget <= 0) {
        setDeathReason("Вы остановили все процессы и разорили отель штрафами и закупками. Инвесторы в бешенстве. Вас уволили.");
        if (stats.loyalty >= 70) unlockAchievement('soft');
        gameOver = true;
      } else if (stats.loyalty <= 0) {
        setDeathReason("Команда вас ненавидит. Рабочие устроили массовую забастовку и пожаловались в ГИТ на ваши методы. Вы не справились.");
        if (stats.safety >= 70) unlockAchievement('tyrant');
        gameOver = true;
      }

      if (gameOver) {
          if (callUsed) unlockAchievement('blat');
          if (day > 20) unlockAchievement('pro');
          setTimeout(() => {
              setGameState('gameover');
              vibrate([500, 100, 500]);
          }, 400);
      }
      
      return () => clearTimeout(t);
    }, [stats, gameState]);

    const makeChoice = (direction) => {
      if (showCallOverlay) return;
      clearInterval(timerRef.current);
      vibrate(40);
      burstParticles(direction); // Эффект искр
      
      const effects = direction === 'left' ? currentCard.onLeft : currentCard.onRight;
      
      setStats(prev => ({
        safety: Math.min(100, Math.max(0, prev.safety + effects.safety)),
        budget: Math.min(100, Math.max(0, prev.budget + effects.budget)),
        loyalty: Math.min(100, Math.max(0, prev.loyalty + effects.loyalty)),
      }));

      setDay(prev => prev + 1);

      let newDeck = deck.slice(1);
      if (newDeck.length < 2) {
         newDeck = [...ALL_SCENARIOS].sort(() => Math.random() - 0.5);
      }
      setDeck(newDeck);
      setCurrentCard(newDeck[0]);
      setNextCard(newDeck[1]);
      setDragPos(0);
      setBgState("");
      if(newDeck[0].isUrgent) setTimeLeft(8);
    };

    const callVV = () => {
        if (callUsed || showCallOverlay) return;
        vibrate([100, 50, 100]);
        clearInterval(timerRef.current);
        setCallUsed(true);
        setShowCallOverlay(true);
        setStats({ safety: 60, budget: 60, loyalty: 60 });
    };

    const handlePointerDown = (e) => {
      if(showCallOverlay) return;
      setIsDragging(true);
      setStartX(e.clientX || (e.touches && e.touches[0].clientX));
      if(cardRef.current) cardRef.current.classList.remove('resetting');
    };

    const handlePointerMove = (e) => {
      if (!isDragging) return;
      const currentX = e.clientX || (e.touches && e.touches[0].clientX);
      const deltaX = currentX - startX;
      
      if (deltaX > 200) setDragPos(200);
      else if (deltaX < -200) setDragPos(-200);
      else setDragPos(deltaX);

      if (deltaX > 30) setBgState("swipe-right");
      else if (deltaX < -30) setBgState("swipe-left");
      else setBgState("");
    };

    const handlePointerUp = () => {
      if (!isDragging) return;
      setIsDragging(false);
      setBgState("");
      if(cardRef.current) cardRef.current.classList.add('resetting');

      if (dragPos > 100) makeChoice('right');
      else if (dragPos < -100) makeChoice('left');
      else setDragPos(0);
    };

    // Отрисовка неона для колб
    const getFlaskGlow = (val) => {
        if (val > 60) return '#10b981'; // Emerald
        if (val > 30) return '#f59e0b'; // Amber
        return '#ef4444'; // Rose
    };

    const shareResult = async () => {
        const btn = document.getElementById('share-btn');
        btn.innerText = "ГЕНЕРАЦИЯ...";
        const badgeWrap = document.getElementById('share-badge-wrap');
        
        document.getElementById('badge-days-val').innerText = day;
        document.getElementById('badge-rank-val').innerText = getRank(day);

        try {
            const canvas = await html2canvas(badgeWrap, { backgroundColor: '#0f172a', scale: 2 });
            canvas.toBlob((blob) => {
                const file = new File([blob], "smena_result.png", { type: "image/png" });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({
                        title: 'Симулятор СОТ',
                        text: `Я продержался ${day} смен в "СМЕНЕ"! Сможешь лучше?`,
                        files: [file]
                    }).catch(e => console.log(e));
                } else {
                    const link = document.createElement('a');
                    link.download = 'smena_result.png';
                    link.href = canvas.toDataURL();
                    link.click();
                }
                btn.innerText = "ПОДЕЛИТЬСЯ";
            });
        } catch (error) {
            console.error(error);
            alert("Не удалось создать картинку. Просто скопируйте ссылку!");
            btn.innerText = "ПОДЕЛИТЬСЯ";
        }
    };

    // === ЭКРАН ГАЛЕРЕИ ===
    if (showGallery) {
        return (
            <div className="flex flex-col h-screen px-6 py-10 animate-fade-in overflow-y-auto z-50 bg-[#0f172a]">
                <button onClick={() => setShowGallery(false)} className="text-slate-400 text-left mb-6 text-xl">← Назад</button>
                <h2 className="text-3xl font-black text-white mb-8 drop-shadow-md">Галерея Провалов</h2>
                <div className="grid grid-cols-2 gap-4">
                    {ACHIEVEMENTS_LIST.map(ach => {
                        const isUnlocked = achievements.includes(ach.id);
                        return (
                            <div key={ach.id} className={`p-4 rounded-2xl border ${isUnlocked ? 'bg-slate-800 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.3)]' : 'bg-slate-900 border-slate-700 opacity-50'} flex flex-col items-center text-center transition-all`}>
                                <div className="text-4xl mb-2 filter drop-shadow-md">{isUnlocked ? ach.icon : '❓'}</div>
                                <div className="font-bold text-sm text-white mb-1">{isUnlocked ? ach.title : 'Скрыто'}</div>
                                {isUnlocked && <div className="text-[10px] text-slate-400">{ach.desc}</div>}
                            </div>
                        )
                    })}
                </div>
            </div>
        );
    }

    // === ЭКРАН СТАРТА ===
    if (gameState === 'start') {
      return (
        <div className="flex flex-col items-center justify-center h-screen px-6 text-center animate-fade-in relative z-10">
          <div className="text-8xl mb-4 drop-shadow-[0_0_30px_rgba(14,165,233,0.6)]">🛡️</div>
          <h1 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2 tracking-tight">СМЕНА</h1>
          <p className="text-xl font-bold text-slate-300 mb-2 uppercase tracking-widest">Симулятор СОТ</p>
          <p className="text-slate-400 mb-10 max-w-sm leading-relaxed text-sm bg-slate-800/60 p-5 rounded-2xl border border-slate-700/50 shadow-inner">
            Принимайте решения, смахивая карточки <span className="text-rose-400 font-bold">ВЛЕВО</span> (Запретить) или <span className="text-emerald-400 font-bold">ВПРАВО</span> (Разрешить). Балансируйте между Безопасностью, Бюджетом и Сервисом.
          </p>
          <button onClick={initGame} className="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 w-full max-w-xs rounded-full text-lg shadow-[0_0_30px_rgba(37,99,235,0.6)] transition-all active:scale-95 uppercase tracking-wider mb-4 border border-blue-400">
            Выйти на смену
          </button>
          <button onClick={() => setShowGallery(true)} className="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 w-full max-w-xs rounded-full transition-all active:scale-95 border border-slate-600 text-sm">
            🏆 Ачивки ({achievements.length}/6)
          </button>
        </div>
      );
    }

    // === ЭКРАН ПОРАЖЕНИЯ (GLITCH + STAMP) ===
    if (gameState === 'gameover') {
      return (
        <div className="flex flex-col items-center justify-center h-screen px-6 text-center relative z-20 bg-slate-900/95 backdrop-blur-md overflow-hidden">
          
          <div className="glitch-wrapper flex flex-col items-center">
              <div className="text-7xl mb-4 drop-shadow-[0_0_40px_rgba(225,29,72,0.9)]">💀</div>
              <h1 className="text-4xl font-black text-white mb-2 uppercase tracking-wider text-rose-500 drop-shadow-md">Игра окончена</h1>
              <div className="bg-slate-800 border border-rose-900/80 p-6 rounded-2xl mb-6 max-w-sm shadow-[0_20px_50px_rgba(0,0,0,0.8)] relative">
                 <p className="text-rose-400 font-bold text-xs mb-2 uppercase tracking-widest border-b border-rose-900/50 pb-2">Причина:</p>
                 <p className="text-slate-200 text-sm leading-relaxed font-medium">{deathReason}</p>
              </div>
              <div className="text-xl font-bold text-slate-300 mb-2">Вы продержались:</div>
              <div className="text-5xl font-black text-blue-400 mb-6 drop-shadow-[0_0_20px_rgba(56,189,248,0.6)]">{day} <span className="text-xl">смен</span></div>
              
              <div className="text-sm text-slate-400 mb-10 uppercase tracking-widest bg-slate-800/50 px-6 py-3 rounded-full border border-slate-700">
                Ваше звание:<br/>
                <span className="text-xl font-black text-amber-400 drop-shadow-md">{getRank(day)}</span>
              </div>
          </div>

          <div className="stamp">УВОЛЕН</div>

          <div className="flex gap-4 w-full max-w-sm z-50">
              <button onClick={initGame} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-xl transition-transform active:scale-95 border border-slate-500 shadow-lg text-sm">
                ЗАНОВО
              </button>
              <button id="share-btn" onClick={shareResult} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-transform active:scale-95 shadow-[0_0_20px_rgba(37,99,235,0.5)] text-sm border border-blue-400">
                ПОДЕЛИТЬСЯ
              </button>
          </div>

          {/* СКРЫТЫЙ БЛОК ДЛЯ ГЕНЕРАЦИИ КАРТИНКИ В WHATSAPP */}
          <div id="share-badge-wrap">
              <div className="badge-logo">🛡️</div>
              <h1 className="badge-title">СМЕНА: СОТ</h1>
              <p className="badge-sub">Симулятор Охраны Труда</p>
              <div className="badge-days" id="badge-days-val">10</div>
              <div className="badge-days-label">СМЕН ПРОЙДЕНО</div>
              <div className="badge-rank" id="badge-rank-val">Ранг</div>
          </div>
        </div>
      );
    }

    // === ИГРОВОЙ ЭКРАН ===
    const rotation = dragPos * 0.05; 
    const opacityLeft = dragPos < -20 ? Math.min(1, Math.abs(dragPos) / 100) : 0;
    const opacityRight = dragPos > 20 ? Math.min(1, dragPos / 100) : 0;
    
    // Вычисляем угол блика для голограммы
    const glareAngle = dragPos * 0.5 + 180;
    const glareOpacity = Math.min(Math.abs(dragPos)/150, 0.5);
    
    const isCritical = stats.safety < 20 || stats.budget < 20 || stats.loyalty < 20;

    return (
      <div className={`flex flex-col h-screen overflow-hidden relative z-10 transition-colors duration-300 ${bgState === 'swipe-left' ? 'bg-rose-950/40' : bgState === 'swipe-right' ? 'bg-emerald-950/40' : currentCard?.isUrgent ? 'bg-siren' : ''}`}
           onMouseMove={handlePointerMove} onMouseUp={handlePointerUp} onMouseLeave={handlePointerUp}
           onTouchMove={handlePointerMove} onTouchEnd={handlePointerUp}>
        
        {/* Туннельное зрение */}
        <div className={`tunnel-vision ${isCritical ? 'critical' : ''}`}></div>

        {/* Буст В.В. */}
        <button onClick={callVV} className={`call-btn ${callUsed ? 'disabled' : ''}`}>☎️</button>

        {showCallOverlay && (
            <div className="absolute inset-0 z-50 bg-slate-900/95 flex flex-col items-center justify-center p-8 text-center animate-fade-in backdrop-blur-md">
                <div className="text-8xl mb-6 filter drop-shadow-lg">👔</div>
                <h2 className="text-3xl font-black text-white mb-4">В.В. на связи</h2>
                <p className="text-slate-300 text-lg mb-8 leading-relaxed">
                    Директор поднял свои связи, перераспределил бюджет и успокоил коллектив. Все ваши показатели восстановлены до 60%.<br/><br/>Но он предупредил: <strong className="text-rose-400">"Это в первый и последний раз."</strong>
                </p>
                <button onClick={() => setShowCallOverlay(false)} className="bg-blue-600 border border-blue-400 text-white font-bold py-4 px-10 rounded-full text-lg shadow-[0_0_30px_rgba(37,99,235,0.6)]">ПРОДОЛЖИТЬ РАБОТУ</button>
            </div>
        )}

        {/* --- ВЕРХНЯЯ ПАНЕЛЬ (Статистика) --- */}
        <div className="glass-panel p-4 pb-5 rounded-b-[32px] shadow-[0_15px_40px_rgba(0,0,0,0.4)] z-20 pointer-events-none">
            <div className="flex justify-between items-center mb-4 px-2">
                <div className="font-black text-2xl text-white tracking-widest drop-shadow-md">СМЕНА {day}</div>
                {currentCard?.isUrgent && (
                    <div className="text-xl font-black text-rose-500 bg-rose-950 px-4 py-1 rounded-full animate-pulse border border-rose-500 shadow-[0_0_15px_rgba(225,29,72,0.5)]">
                        ⏱️ 00:0{timeLeft}
                    </div>
                )}
                {!currentCard?.isUrgent && (
                    <div className="text-[10px] font-bold text-slate-300 bg-slate-800/80 px-3 py-1.5 rounded-full uppercase tracking-widest border border-slate-600 shadow-inner">Охрана Труда</div>
                )}
            </div>
            
            <div className="flex justify-between gap-5 px-2">
                {/* Неоновая колба Безопасности */}
                <div className="flex-1 text-center">
                    <div className="text-2xl mb-1.5 filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">🛡️</div>
                    <div className="flask-container">
                        <div className={`flask-fill ${flash.safety ? 'flask-flash' : ''}`} style={{width: `${stats.safety}%`, backgroundColor: getFlaskGlow(stats.safety), boxShadow: `0 0 15px ${getFlaskGlow(stats.safety)}`}}></div>
                    </div>
                </div>
                {/* Неоновая колба Бюджета */}
                <div className="flex-1 text-center">
                    <div className="text-2xl mb-1.5 filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">💰</div>
                    <div className="flask-container">
                        <div className={`flask-fill ${flash.budget ? 'flask-flash' : ''}`} style={{width: `${stats.budget}%`, backgroundColor: getFlaskGlow(stats.budget), boxShadow: `0 0 15px ${getFlaskGlow(stats.budget)}`}}></div>
                    </div>
                </div>
                {/* Неоновая колба Команды */}
                <div className="flex-1 text-center">
                    <div className="text-2xl mb-1.5 filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">🤝</div>
                    <div className="flask-container">
                        <div className={`flask-fill ${flash.loyalty ? 'flask-flash' : ''}`} style={{width: `${stats.loyalty}%`, backgroundColor: getFlaskGlow(stats.loyalty), boxShadow: `0 0 15px ${getFlaskGlow(stats.loyalty)}`}}></div>
                    </div>
                </div>
            </div>
        </div>

        {/* --- ИГРОВОЕ ПОЛЕ С КАРТОЧКАМИ --- */}
        <div className="flex-1 relative flex items-center justify-center p-4 overflow-hidden">
            
            <div className="absolute inset-0 flex items-center justify-between px-6 pointer-events-none opacity-30 z-0">
                <div className={`text-6xl font-black transition-colors ${bgState === 'swipe-left' ? 'text-rose-500' : 'text-slate-500'}`}>←</div>
                <div className={`text-6xl font-black transition-colors ${bgState === 'swipe-right' ? 'text-emerald-500' : 'text-slate-500'}`}>→</div>
            </div>

            <div className="card-stack">
                {nextCard && (
                    <div className="next-card flex flex-col items-center justify-center">
                        <div className="text-7xl filter opacity-50 grayscale blur-[2px]">{nextCard.avatar}</div>
                    </div>
                )}

                {currentCard && (
                    <div 
                        ref={cardRef}
                        className={`swipe-card cursor-grab active:cursor-grabbing ${currentCard.isUrgent ? 'urgent' : ''}`}
                        style={{ transform: `translate(${dragPos}px, ${Math.abs(dragPos)*0.05}px) rotate(${rotation}deg) rotateY(${dragPos*0.05}deg) rotateX(${Math.abs(dragPos)*0.02}deg)` }}
                        onMouseDown={handlePointerDown}
                        onTouchStart={handlePointerDown}
                    >
                        {/* Голографический блик */}
                        <div className="glare" style={{background: `linear-gradient(${glareAngle}deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 60%)`, opacity: glareOpacity}}></div>

                        <div className="choice-indicator choice-left" style={{opacity: opacityLeft}}>{currentCard.leftChoice}</div>
                        <div className="choice-indicator choice-right" style={{opacity: opacityRight}}>{currentCard.rightChoice}</div>

                        <div className={`bg-slate-50 rounded-t-[28px] p-6 flex flex-col items-center justify-center border-b border-slate-200 h-[45%] shadow-[inset_0_-10px_20px_rgba(0,0,0,0.02)] ${currentCard.isUrgent ? 'bg-rose-50' : ''}`}>
                            <div className="text-[5rem] mb-2 filter drop-shadow-xl">{currentCard.avatar}</div>
                            <h2 className="text-2xl font-black text-slate-800 text-center leading-tight tracking-tight">{currentCard.character}</h2>
                            <div className="mt-2 bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold text-[10px] uppercase tracking-widest shadow-sm">{currentCard.role}</div>
                        </div>

                        <div className="p-6 flex-1 flex items-center justify-center bg-white rounded-b-[28px]">
                            <p className="text-slate-700 text-lg font-medium text-center leading-relaxed relative z-10">
                                "{currentCard.text}"
                            </p>
                        </div>
                    </div>
                )}
            </div>
        </div>

        {/* --- НИЖНЯЯ ПАНЕЛЬ --- */}
        <div className="p-6 pb-8 flex justify-between gap-4 z-20 pointer-events-none">
            <div className="flex-1 bg-rose-100/50 text-rose-700/50 border-2 border-rose-300/50 font-black py-4 rounded-2xl text-center uppercase tracking-wider text-sm shadow-sm backdrop-blur-md">Влево</div>
            <div className="flex-1 bg-emerald-100/50 text-emerald-700/50 border-2 border-emerald-300/50 font-black py-4 rounded-2xl text-center uppercase tracking-wider text-sm shadow-sm backdrop-blur-md">Вправо</div>
        </div>
        
      </div>
    );
  }

  const rootElement = document.getElementById('game-root');
  if (rootElement) {
    const root = createRoot(rootElement);
    root.render(<Game />);
  }
</script>

</body>
</html>
