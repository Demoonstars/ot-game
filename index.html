<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const { createRoot } = ReactDOM;

  const AudioEngine = (() => {
      let ctx = null; let enabled = false;
      const init = () => { if (!ctx) { ctx = new (window.AudioContext || window.webkitAudioContext)(); } if (ctx.state === 'suspended') ctx.resume(); enabled = true; };
      const playTone = (freq, type, duration, vol = 0.1, slideFreq = null) => {
          if (!enabled || !ctx) return;
          const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.type = type; osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, ctx.currentTime + duration);
          gain.gain.setValueAtTime(vol, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
          osc.start(); osc.stop(ctx.currentTime + duration);
      };
      return {
          init,
          swipe: () => playTone(300, 'sine', 0.2, 0.1, 100),
          stamp: () => playTone(100, 'square', 0.4, 0.3, 20),
          alarm: () => { playTone(600, 'square', 0.1, 0.05); setTimeout(() => playTone(800, 'square', 0.1, 0.05), 100); },
          ring: () => { for(let i=0; i<3; i++) { setTimeout(() => playTone(1000, 'sine', 0.1, 0.05), i*200); setTimeout(() => playTone(1300, 'sine', 0.1, 0.05), i*200 + 100); } },
          buy: () => { playTone(800, 'sine', 0.1, 0.1, 1200); setTimeout(() => playTone(1200, 'sine', 0.2, 0.1, 1600), 100); },
          msg: () => playTone(1500, 'sine', 0.1, 0.05, 2000)
      };
  })();

  const vibrate = (pattern) => { if (typeof window !== 'undefined' && 'navigator' in window && window.navigator.vibrate) window.navigator.vibrate(pattern); };
  const burstParticles = (direction) => {
      const color = direction === 'left' ? '#e11d48' : '#10b981';
      for (let i = 0; i < 30; i++) {
         const p = document.createElement('div'); p.className = 'particle'; const size = Math.random() * 10 + 5;
         p.style.width = p.style.height = `${size}px`; p.style.backgroundColor = color; p.style.boxShadow = `0 0 15px ${color}`;
         p.style.left = `${window.innerWidth/2}px`; p.style.top = `${window.innerHeight/2}px`;
         p.style.setProperty('--tx', `${(Math.random()-0.5)*500}px`); p.style.setProperty('--ty', `${(Math.random()-0.5)*500 - 100}px`);
         document.body.appendChild(p); setTimeout(() => p.remove(), 800);
      }
  };

  const TypewriterText = ({ text }) => {
      const [displayed, setDisplayed] = useState("");
      useEffect(() => {
          setDisplayed(""); let i = 0;
          const timer = setInterval(() => { setDisplayed(text.slice(0, i + 1)); i++; if (i >= text.length) clearInterval(timer); }, 15);
          return () => clearInterval(timer);
      }, [text]);

      const highlightWords = (str) => {
          const words = ["убью", "штраф", "срочно", "пожар", "вскрыть", "уволю", "быстро", "скорую", "кровь", "эвакуация", "травма", "смерть", "упал", "взрыв", "катастрофа"];
          let res = str;
          words.forEach(w => { const regex = new RegExp(`(${w})`, 'gi'); res = res.replace(regex, '<span class="text-rose-600 font-black animate-shake inline-block">$&</span>'); });
          return { __html: res };
      };
      return <p dangerouslySetInnerHTML={highlightWords(displayed)} className="text-slate-700 text-[1.15rem] font-semibold text-center leading-relaxed relative z-10" />;
  };

  // СПЕЦИАЛЬНЫЕ СЮЖЕТНЫЕ КАРТОЧКИ (Добавляются динамически)
  const BOSS_CARDS = {
      fire_show_consequence: { id: 'boss1', isUrgent: true, character: "МЧС", role: "Инспектор", avatar: "🚒", text: "На видео блогера видно, что вы разрешили заклеить датчики дыма. Это грубейшее нарушение ППБ! Штраф полмиллиона или суд?", leftChoice: "ПЛАТИТЬ ШТРАФ", rightChoice: "СУДИТЬСЯ", onLeft: { safety: 0, budget: -50, loyalty: -10, msg: "Бюджет уничтожен штрафом." }, onRight: { safety: -40, budget: 0, loyalty: -20, msg: "Суд проигран. Вас лишили должности." } }
  };

  const ACHIEVEMENTS_LIST = [
        { id: 'greed', icon: '🤑', title: 'Дракон', desc: 'Спас деньги, но потерял людей.' },
        { id: 'tyrant', icon: '⚔️', title: 'Душнила', desc: 'Идеальное ТБ, но вас ненавидят.' },
        { id: 'soft', icon: '🧸', title: 'Мать Тереза', desc: 'Угодил всем и разорил компанию.' },
        { id: 'slow', icon: '🐢', title: 'Тормоз', desc: 'Не успел в форс-мажоре.' },
        { id: 'pro', icon: '🏆', title: 'Мастер', desc: 'Продержался 20 смен.' }
  ];

  const OFFICE_ITEMS = [
      { id: 'chair', icon: '💺', name: 'Кресло Босса', desc: '+5 к стартовой Лояльности', cost: 5 },
      { id: 'safe', icon: '🏦', name: 'Мини-сейф', desc: '+5 к стартовому Бюджету', cost: 5 },
      { id: 'plant', icon: '🌿', name: 'Фикус', desc: '+5 к стартовой Безопасности', cost: 5 }
  ];

  function Game() {
    const [gameState, setGameState] = useState('start'); 
    const [day, setDay] = useState(1);
    const [stats, setStats] = useState({ safety: 50, budget: 50, loyalty: 50 });
    const [flash, setFlash] = useState({ safety: false, budget: false, loyalty: false }); 
    const [deck, setDeck] = useState(ALL_SCENARIOS);
    const [currentCard, setCurrentCard] = useState(null);
    const [nextCard, setNextCard] = useState(null);
    const [deathReason, setDeathReason] = useState("");
    const [feedback, setFeedback] = useState(null);
    const [timeLeft, setTimeLeft] = useState(8);
    
    // МЕТА-ИГРА И ПРОФИЛИРОВАНИЕ
    const [achievements, setAchievements] = useState([]);
    const [coins, setCoins] = useState(0);
    const [office, setOffice] = useState([]); // Купленные предметы мебели
    const [playstyle, setPlaystyle] = useState({ s: 0, b: 0, l: 0 }); // Сбор статистики для радара
    const [flags, setFlags] = useState({}); // Сюжетные флаги
    
    // ИНТЕРФЕЙС
    const [showGallery, setShowGallery] = useState(false);
    const [showOfficeUI, setShowOfficeUI] = useState(false);
    const [phoneState, setPhoneState] = useState({ open: false, tab: 'chats' });
    const [hasSave, setHasSave] = useState(false);

    // ПАСХАЛКА В ТЕЛЕФОНЕ (Используем данные из контекста)
    const [messages, setMessages] = useState([
        { id: 1, from: "Юлия Борисовна", text: "Антон, завтра выездная комиссия ГИТ в СОФРИНО-ПАРК. Проверь журналы инструктажей, чтобы без косяков! Штрафы платить не будем.", read: false }
    ]);
    const [contactsUsed, setContactsUsed] = useState({ vv: false, buh: false, prof: false });

    const [dragPos, setDragPos] = useState(0);
    const [bgState, setBgState] = useState(""); 
    const [swipingOut, setSwipingOut] = useState(false);
    const [isSharing, setIsSharing] = useState(false); 
    const [isBurning, setIsBurning] = useState(false);
    
    const timerRef = useRef(null);
    const cardRef = useRef(null);
    const [isDragging, setIsDragging] = useState(false);
    const [startX, setStartX] = useState(0);

    // ЗАГРУЗКА
    useEffect(() => {
        try { 
            setAchievements(JSON.parse(localStorage.getItem('smena_achievements') || '[]')); 
            setCoins(parseInt(localStorage.getItem('smena_coins')) || 0);
            setOffice(JSON.parse(localStorage.getItem('smena_office') || '[]'));
            if(localStorage.getItem('smena_save')) setHasSave(true);
        } catch(e) {}
    }, []);

    // АВТОСОХРАНЕНИЕ
    useEffect(() => {
        if (gameState === 'playing' && currentCard && !feedback && !swipingOut) {
            localStorage.setItem('smena_save', JSON.stringify({ day, stats, currentCard, nextCard, contactsUsed, timeLeft, flags, playstyle }));
        }
    }, [day, stats, currentCard, nextCard, contactsUsed, timeLeft, flags, playstyle, gameState, feedback, swipingOut]);

    // ДИНАМИКА CSS
    useEffect(() => {
        if (gameState === 'playing') {
            if (stats.budget < 30) document.body.classList.add('critical-budget'); else document.body.classList.remove('critical-budget');
            if (stats.safety < 30) document.body.classList.add('critical-safety'); else document.body.classList.remove('critical-safety');
            if (stats.loyalty < 30) document.body.classList.add('critical-loyalty'); else document.body.classList.remove('critical-loyalty');
        } else document.body.className = ''; 
    }, [stats, gameState]);

    // ТАЙМЕР ПУША ТЕЛЕФОНА
    useEffect(() => {
        let hintTimer;
        const needsHelp = stats.safety < 40 || stats.budget < 40 || stats.loyalty < 40;
        const canUseContact = !contactsUsed.vv || !contactsUsed.buh || !contactsUsed.prof;
        
        if (needsHelp && canUseContact && gameState === 'playing' && !phoneState.open) {
            AudioEngine.msg(); // Звук уведомления
            hintTimer = setTimeout(() => {}, 7000);
        }
        return () => clearTimeout(hintTimer);
    }, [stats, contactsUsed, gameState, phoneState.open]);

    const unlockAchievement = (id) => {
        setAchievements(prev => {
            if (prev.includes(id)) return prev;
            const newArr = [...prev, id];
            try { localStorage.setItem('smena_achievements', JSON.stringify(newArr)); } catch(e) {}
            return newArr;
        });
    };

    const addCoins = (amount) => {
        const newCoins = coins + amount; setCoins(newCoins); localStorage.setItem('smena_coins', newCoins);
    };

    const buyItem = (item) => {
        if (coins >= item.cost && !office.includes(item.id)) {
            AudioEngine.buy(); addCoins(-item.cost);
            const newOffice = [...office, item.id];
            setOffice(newOffice); localStorage.setItem('smena_office', JSON.stringify(newOffice));
        }
    };

    const getRank = (days) => {
        if (days <= 5) return "Стажер с блокнотом";
        if (days <= 10) return "Младший инспектор";
        if (days <= 15) return "Гроза нарушителей";
        if (days <= 20) return "Эксперт по ТБ";
        return "Бог Охраны Труда";
    };

    // ГЕНЕРАТОР РАДАРА (SVG Полигон)
    const renderRadarChart = () => {
        const total = (playstyle.s + playstyle.b + playstyle.l) || 1;
        const sNorm = (playstyle.s / total) * 40;
        const bNorm = (playstyle.b / total) * 40;
        const lNorm = (playstyle.l / total) * 40;
        
        // Центр 50,50. 
        const pS = `50,${50 - sNorm}`; // Верх
        const pB = `${50 + bNorm * 0.866},${50 + bNorm * 0.5}`; // Низ право
        const pL = `${50 - lNorm * 0.866},${50 + lNorm * 0.5}`; // Низ лево
        const points = `${pS} ${pB} ${pL}`;

        let typeText = "Универсал";
        if (sNorm > Math.max(bNorm, lNorm) * 1.5) typeText = "«Душнила по ТБ»";
        if (bNorm > Math.max(sNorm, lNorm) * 1.5) typeText = "«Корпоративный Дракон»";
        if (lNorm > Math.max(sNorm, bNorm) * 1.5) typeText = "«Мать Тереза»";

        return (
            <div className="w-full flex flex-col items-center justify-center mt-6">
                <div className="text-xl font-bold text-slate-300 mb-2 tracking-widest uppercase">Ваш психотип:</div>
                <div className="text-3xl font-black text-amber-400 mb-6 drop-shadow-md">{typeText}</div>
                <svg viewBox="0 0 100 100" className="w-48 h-48 drop-shadow-2xl">
                    <polygon points="50,10 84.6,70 15.4,70" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.5"/>
                    <polygon points="50,23.3 73.1,63.3 26.9,63.3" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.5"/>
                    <polygon points="50,36.6 61.5,56.6 38.5,56.6" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.5"/>
                    <line x1="50" y1="50" x2="50" y2="10" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
                    <line x1="50" y1="50" x2="84.6" y2="70" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
                    <line x1="50" y1="50" x2="15.4" y2="70" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
                    
                    <polygon points={points} fill="rgba(56, 189, 248, 0.6)" stroke="#38bdf8" strokeWidth="2" strokeLinejoin="round"/>
                    
                    <text x="50" y="5" fill="#f8fafc" fontSize="6" textAnchor="middle" fontWeight="bold">Правила</text>
                    <text x="90" y="75" fill="#f8fafc" fontSize="6" textAnchor="middle" fontWeight="bold">Бюджет</text>
                    <text x="10" y="75" fill="#f8fafc" fontSize="6" textAnchor="middle" fontWeight="bold">Люди</text>
                </svg>
            </div>
        );
    };

    const startGame = (loadSave = false) => {
        AudioEngine.init(); vibrate(50);
        setFeedback(null); setSwipingOut(false); setDragPos(0); setIsDragging(false); setBgState(""); setIsBurning(false);
        setPhoneState({ open: false, tab: 'chats' });

        if (loadSave && localStorage.getItem('smena_save')) {
            const saved = JSON.parse(localStorage.getItem('smena_save'));
            setDay(saved.day); setStats(saved.stats); setCurrentCard(saved.currentCard); setNextCard(saved.nextCard);
            setContactsUsed(saved.contactsUsed || { vv: false, buh: false, prof: false }); 
            setTimeLeft(saved.timeLeft || 8); setFlags(saved.flags || {}); setPlaystyle(saved.playstyle || { s: 0, b: 0, l: 0 });
        } else {
            localStorage.removeItem('smena_save'); setHasSave(false);
            setDay(1); setContactsUsed({ vv: false, buh: false, prof: false }); setTimeLeft(8); setFlags({}); setPlaystyle({ s: 0, b: 0, l: 0 });
            
            // ПРИМЕНЯЕМ ПЕРКИ КАБИНЕТА
            const startS = 50 + (office.includes('plant') ? 5 : 0);
            const startB = 50 + (office.includes('safe') ? 5 : 0);
            const startL = 50 + (office.includes('chair') ? 5 : 0);
            setStats({ safety: startS, budget: startB, loyalty: startL });

            const shuffled = [...ALL_SCENARIOS].sort(() => Math.random() - 0.5);
            setDeck(shuffled); setCurrentCard(shuffled[0]); setNextCard(shuffled[1]);
        }
        setGameState('playing');
    };

    const handleTimeout = () => {
        unlockAchievement('slow'); setDeathReason("ИТОГ:\nВы растерялись в критической ситуации.\n\nВЕРДИКТ:\nВас отстранили за халатность.");
        gameOverSequence();
    };

    const gameOverSequence = () => {
        setIsBurning(true);
        localStorage.removeItem('smena_save'); setHasSave(false);
        const earnedCoins = Math.floor(day / 10);
        if (earnedCoins > 0) addCoins(earnedCoins);

        setTimeout(() => {
            setGameState('gameover'); vibrate([500, 200, 500]); setTimeout(() => AudioEngine.stamp(), 1500); 
        }, 1000); 
    };

    useEffect(() => {
        if (gameState === 'playing' && currentCard?.isUrgent && !phoneState.open && !feedback && !swipingOut) {
            timerRef.current = setInterval(() => {
                setTimeLeft(prev => {
                    if (prev <= 3 && prev > 1) AudioEngine.alarm(); 
                    if (prev <= 1) { clearInterval(timerRef.current); handleTimeout(); return 0; }
                    return prev - 1;
                });
            }, 1000);
            return () => clearInterval(timerRef.current);
        }
    }, [gameState, currentCard, phoneState.open, feedback, swipingOut]);

    const makeChoice = (direction) => {
      if (phoneState.open || feedback || swipingOut || isBurning) return;
      clearInterval(timerRef.current);
      
      AudioEngine.swipe(); vibrate(40); burstParticles(direction); 
      setIsDragging(false); setSwipingOut(true); setDragPos(direction === 'left' ? -400 : 400);

      const effects = direction === 'left' ? currentCard.onLeft : currentCard.onRight;
      
      // СБОР СТАТИСТИКИ ДЛЯ РАДАРА
      setPlaystyle(prev => ({
          s: prev.s + (effects.safety > 0 ? effects.safety : 0),
          b: prev.b + (effects.budget > 0 ? effects.budget : 0),
          l: prev.l + (effects.loyalty > 0 ? effects.loyalty : 0)
      }));

      // СЮЖЕТНЫЕ ФЛАГИ
      const newFlags = { ...flags };
      if (currentCard.setFlag && direction === 'right') newFlags[currentCard.setFlag] = true;
      setFlags(newFlags);

      const newSafety = Math.min(100, Math.max(0, stats.safety + effects.safety));
      const newBudget = Math.min(100, Math.max(0, stats.budget + effects.budget));
      const newLoyalty = Math.min(100, Math.max(0, stats.loyalty + effects.loyalty));

      setFlash({ safety: newSafety < stats.safety, budget: newBudget < stats.budget, loyalty: newLoyalty < stats.loyalty });
      setStats({ safety: newSafety, budget: newBudget, loyalty: newLoyalty });
      
      setTimeout(() => {
          setFeedback({ text: effects.msg, safety: effects.safety, budget: effects.budget, loyalty: effects.loyalty });
          setBgState("");
          
          setTimeout(() => {
              setFeedback(null); setSwipingOut(false);

              if (newSafety <= 0 || newBudget <= 0 || newLoyalty <= 0) {
                  let res = newSafety <= 0 ? "Тяжелый НС всплыл в прокуратуре." : newBudget <= 0 ? "Вы разорили отель закупками." : "Рабочие устроили бунт.";
                  setDeathReason(`ПОСЛЕДНЕЕ РЕШЕНИЕ:\n${effects.msg}\n\nВЕРДИКТ:\n${res}`);
                  if (newSafety <= 0 && newBudget >= 70) unlockAchievement('greed');
                  if (newBudget <= 0 && newLoyalty >= 70) unlockAchievement('soft');
                  if (newLoyalty <= 0 && newSafety >= 70) unlockAchievement('tyrant');
                  if (day > 20) unlockAchievement('pro');
                  gameOverSequence();
                  return;
              }
              
              setDay(prev => prev + 1);
              let newDeck = deck.slice(1);
              
              // ИНЪЕКЦИЯ СЮЖЕТНЫХ КАРТОЧЕК
              if (newFlags.fire_show && !newFlags.fire_show_done && day > 5) {
                  newDeck.unshift(BOSS_CARDS.fire_show_consequence);
                  newFlags.fire_show_done = true; setFlags(newFlags);
              } else if (newDeck.length < 2) {
                  newDeck = [...ALL_SCENARIOS].sort(() => Math.random() - 0.5);
              }

              setDeck(newDeck); setCurrentCard(newDeck[0]); setNextCard(newDeck[1]); setDragPos(0); 
              if(newDeck[0].isUrgent) setTimeLeft(8);
          }, 2000); 
      }, 600);
    };

    // ФУНКЦИИ ТЕЛЕФОНА
    const useContact = (type) => {
        if (contactsUsed[type]) return;
        AudioEngine.ring(); vibrate([100, 50, 100]);
        const newUsed = { ...contactsUsed }; newUsed[type] = true; setContactsUsed(newUsed);
        
        let newStats = { ...stats };
        if (type === 'vv') { newStats = { safety: 60, budget: 60, loyalty: 60 }; }
        if (type === 'buh') { newStats.budget = Math.min(100, newStats.budget + 30); newStats.loyalty = Math.max(0, newStats.loyalty - 20); }
        if (type === 'prof') { newStats.loyalty = Math.min(100, newStats.loyalty + 30); newStats.budget = Math.max(0, newStats.budget - 20); }
        
        setStats(newStats); setPhoneState({ ...phoneState, open: false });
    };

    const markMessagesRead = () => {
        if(!phoneState.open) setMessages(messages.map(m => ({...m, read: true})));
        setPhoneState({ open: !phoneState.open, tab: 'chats' });
    };

    const handlePointerDown = (e) => {
      if(phoneState.open || feedback || swipingOut || isBurning) return;
      setIsDragging(true); setStartX(e.clientX || (e.touches && e.touches[0].clientX));
      if(cardRef.current) cardRef.current.classList.remove('resetting');
    };

    const handlePointerMove = (e) => {
      if (!isDragging || !cardRef.current || feedback || phoneState.open || swipingOut || isBurning) return;
      const clientX = e.clientX || (e.touches && e.touches[0].clientX); if (!clientX) return;
      const deltaX = clientX - startX; setDragPos(Math.min(200, Math.max(-200, deltaX)));
      if (deltaX > 30) setBgState("swipe-right"); else if (deltaX < -30) setBgState("swipe-left"); else setBgState("");
    };

    const handlePointerUp = () => {
      if (!isDragging) return;
      setIsDragging(false); setBgState(""); if(cardRef.current) cardRef.current.classList.add('resetting');
      if (dragPos > 100) makeChoice('right'); else if (dragPos < -100) makeChoice('left'); else setDragPos(0);
    };

    const shareResult = async () => {
        setIsSharing(true); await new Promise(r => setTimeout(r, 100)); 
        const badgeElem = document.getElementById('share-badge-wrap');
        try {
            const canvas = await html2canvas(badgeElem, { scale: 2, backgroundColor: '#0f172a' });
            const dataUrl = canvas.toDataURL('image/png'); const blob = await (await fetch(dataUrl)).blob();
            const file = new File([blob], 'smena-result.png', { type: 'image/png' });
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ title: 'Мой результат в СМЕНЕ', text: `Я продержался ${day} смен! Звание: ${getRank(day)}`, files: [file] });
            } else {
                const a = document.createElement('a'); a.href = dataUrl; a.download = `Smena_${day}.png`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
            }
        } catch (e) { alert("Не удалось создать изображение."); }
        setIsSharing(false);
    };

    const getFlaskGlow = (val) => val > 60 ? '#10b981' : val > 30 ? '#f59e0b' : '#ef4444';
    const getTimeClass = () => day <= 5 ? 'theme-morning' : day <= 10 ? 'theme-day' : day <= 15 ? 'theme-evening' : 'theme-night';
    const currentAvatar = currentCard ? ((stats.loyalty < 30 && !currentCard.isUrgent) ? "🤬" : currentCard.avatar) : "";
    const unreadCount = messages.filter(m => !m.read).length;

    // МЕНЮ КАБИНЕТА
    if (showOfficeUI) {
        return (
            <div className="absolute inset-0 z-50 bg-[#0f172a] p-6 overflow-y-auto flex flex-col animate-fade-in">
                <div className="flex justify-between items-center mb-6">
                    <button onClick={() => setShowOfficeUI(false)} className="flex items-center gap-2 bg-slate-800 text-white px-5 py-2 rounded-full font-bold border border-slate-600 shadow-lg active:scale-95 transition-transform">
                        <span className="text-xl leading-none">←</span> Назад
                    </button>
                    <div className="bg-amber-500/20 text-amber-400 px-4 py-2 rounded-full font-black border border-amber-500/50 whitespace-nowrap">💰 {coins}</div>
                </div>
                <h2 className="text-2xl font-black text-white mb-2">Мой Кабинет</h2>
                <p className="text-sm text-slate-400 mb-6">Покупай мебель за СОТ-монеты. Баффы работают на все следующие игры всегда!</p>
                
                {/* Визуализация кабинета */}
                <div className="w-full h-40 bg-slate-800 rounded-2xl border-4 border-slate-700 mb-8 relative flex items-end justify-center overflow-hidden shadow-inner">
                    <div className="absolute bottom-0 w-full h-1/2 bg-slate-900 border-t border-slate-700"></div>
                    <div className="text-6xl relative z-10 mx-2">{office.includes('chair') ? '💺' : '🪑'}</div>
                    <div className="text-4xl absolute bottom-4 left-4 z-10">{office.includes('safe') ? '🏦' : '📦'}</div>
                    <div className="text-4xl absolute bottom-4 right-4 z-10">{office.includes('plant') ? '🌿' : '🗑️'}</div>
                    {office.includes('plant') && <div className="absolute top-2 right-1/4 text-2xl">🖼️</div>}
                </div>

                <div className="flex flex-col gap-4 pb-10">
                    {OFFICE_ITEMS.map(item => {
                        const isOwned = office.includes(item.id);
                        const canBuy = coins >= item.cost && !isOwned;
                        return (
                            <div key={item.id} className={`p-4 rounded-xl border flex items-center justify-between transition-all ${isOwned ? 'bg-blue-900/50 border-blue-500/50' : 'bg-slate-800 border-slate-600'}`}>
                                <div className="flex items-center gap-4">
                                    <div className="text-4xl">{item.icon}</div>
                                    <div>
                                        <div className="font-bold text-white text-lg">{item.name}</div>
                                        <div className="text-[11px] text-emerald-400 font-bold">{item.desc}</div>
                                    </div>
                                </div>
                                <button onClick={() => buyItem(item)} disabled={!canBuy && !isOwned} className={`px-4 py-2 rounded-full font-black text-sm min-w-[80px] ${isOwned ? 'bg-transparent text-blue-400 border border-blue-400' : canBuy ? 'bg-amber-500 text-slate-900 hover:scale-105' : 'bg-slate-700 text-slate-500'}`}>
                                    {isOwned ? 'КУПЛЕНО' : `${item.cost} 🪙`}
                                </button>
                            </div>
                        )
                    })}
                </div>
            </div>
        );
    }

    if (showGallery) {
        return (
            <div className="absolute inset-0 z-50 bg-[#0f172a] p-6 overflow-y-auto flex flex-col animate-fade-in">
                <button onClick={() => setShowGallery(false)} className="flex items-center gap-2 bg-slate-800 text-white px-5 py-2 rounded-full font-bold border border-slate-600 shadow-lg mb-6 active:scale-95 transition-transform w-max">
                    <span className="text-xl leading-none">←</span> Назад
                </button>
                <h2 className="text-2xl font-black text-white mb-6 tracking-wide">🎖️ Ачивки ({achievements.length}/6)</h2>
                <div className="grid grid-cols-2 gap-4 pb-10">
                    {ACHIEVEMENTS_LIST.map(ach => {
                        const isUnlocked = achievements.includes(ach.id);
                        return (
                            <div key={ach.id} className={`p-4 rounded-xl border ${isUnlocked ? 'bg-slate-800 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.3)]' : 'bg-slate-900 border-slate-700 opacity-50'} flex flex-col items-center text-center transition-all`}>
                                <div className="text-4xl mb-3">{isUnlocked ? ach.icon : '❓'}</div>
                                <div className="font-bold text-[12px] text-white mb-1 uppercase tracking-wider leading-tight">{isUnlocked ? ach.title : 'Скрыто'}</div>
                                {isUnlocked && <div className="text-[10px] text-slate-400 leading-tight mt-1">{ach.desc}</div>}
                            </div>
                        )
                    })}
                </div>
            </div>
        );
    }

    if (gameState === 'gameover') {
      return (
        <>
            <div id="share-badge-wrap">
                <div className="badge-logo">🛡️ СМЕНА</div>
                <div className="badge-title">Удостоверение СОТ</div>
                <div className="badge-sub">Официальный результат</div>
                <div className="badge-days-label">Продержался:</div>
                <div className="badge-days">{day}</div>
                <div className="badge-days-label" style={{marginTop:'10px', marginBottom:'40px'}}>смен</div>
                <div className="badge-rank">{getRank(day)}</div>
                
                {/* SVG РАДАР ДЛЯ ШЕРИНГА */}
                <div className="radar-box">
                    <svg viewBox="0 0 100 100" width="300" height="300">
                        <polygon points="50,10 84.6,70 15.4,70" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.5"/>
                        <polygon points="50,23.3 73.1,63.3 26.9,63.3" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.5"/>
                        <polygon points="50,36.6 61.5,56.6 38.5,56.6" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.5"/>
                        <line x1="50" y1="50" x2="50" y2="10" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
                        <line x1="50" y1="50" x2="84.6" y2="70" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
                        <line x1="50" y1="50" x2="15.4" y2="70" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
                        
                        <polygon points={(function(){
                            const tot = (playstyle.s + playstyle.b + playstyle.l) || 1;
                            const ns = (playstyle.s/tot)*40, nb = (playstyle.b/tot)*40, nl = (playstyle.l/tot)*40;
                            return `50,${50-ns} ${50+nb*0.866},${50+nb*0.5} ${50-nl*0.866},${50+nl*0.5}`;
                        })()} fill="rgba(56, 189, 248, 0.6)" stroke="#38bdf8" strokeWidth="2" strokeLinejoin="round"/>
                        <text x="50" y="5" fill="#f8fafc" fontSize="6" textAnchor="middle" fontWeight="bold">Правила</text>
                        <text x="90" y="75" fill="#f8fafc" fontSize="6" textAnchor="middle" fontWeight="bold">Бюджет</text>
                        <text x="10" y="75" fill="#f8fafc" fontSize="6" textAnchor="middle" fontWeight="bold">Люди</text>
                    </svg>
                </div>
                <div className="badge-watermark">Психологический профиль руководителя СОТ</div>
            </div>

            <div className="flex flex-col items-center justify-center h-[100dvh] px-6 text-center relative z-20 bg-[#0f172a] overflow-y-auto">
              <div className="text-7xl mb-2 mt-10">💀</div>
              <h1 className="text-4xl font-black text-rose-500 uppercase tracking-widest drop-shadow-lg mb-4">Игра окончена</h1>
              <div className="bg-slate-800 border-2 border-rose-900 p-4 rounded-3xl mb-4 max-w-sm w-full shadow-2xl">
                  <p className="text-slate-200 text-sm whitespace-pre-line text-left font-medium leading-relaxed">{deathReason}</p>
              </div>
              <div className="text-5xl font-black text-blue-400 mb-2 drop-shadow-lg">{day} <span className="text-xl">смен</span></div>
              
              {renderRadarChart()}

              <div className="stamp">УВОЛЕН</div>
              
              <div className="flex flex-col w-full max-w-xs gap-3 relative z-50 mt-6 mb-10">
                 <button onClick={shareResult} disabled={isSharing} className={`bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black py-4 w-full rounded-full border border-blue-400 shadow-[0_0_20px_rgba(37,99,235,0.4)] tracking-widest uppercase flex items-center justify-center gap-2 ${isSharing ? 'opacity-70' : 'active:scale-95'}`}>
                     {isSharing ? '⌛ Генерируем...' : '📸 Поделиться'}
                 </button>
                 <button onClick={() => setGameState('start')} className="bg-slate-700 text-white font-black py-4 w-full rounded-full border border-slate-500 shadow-lg tracking-widest uppercase active:scale-95 transition-transform">В Главное меню</button>
              </div>
            </div>
        </>
      );
    }

    if (gameState === 'start') {
      return (
        <div className="flex flex-col items-center justify-center h-[100dvh] px-6 text-center animate-fade-in relative theme-morning">
          <div className="mesh-container"><div className="blob blob-1 w-[400px] h-[400px] top-[-10%] left-[-10%] animate-blob"></div><div className="blob blob-2 w-[350px] h-[350px] bottom-[-10%] right-[-10%] animate-blob" style={{animationDelay: '2s'}}></div></div>
          <div className="grid-overlay"></div><div className="noise"></div>
          
          {/* Стол в меню */}
          <div className="w-full flex justify-center items-end h-32 mb-4 relative">
             <div className="text-8xl relative z-10 drop-shadow-[0_0_30px_rgba(14,165,233,0.6)]">👷</div>
             {office.includes('chair') && <div className="absolute right-10 bottom-0 text-5xl">💺</div>}
             {office.includes('plant') && <div className="absolute left-10 bottom-0 text-5xl">🌿</div>}
          </div>

          <h1 className="text-6xl font-black text-white mb-2 tracking-tighter">СМЕНА</h1>
          <p className="text-xl font-bold text-blue-400 mb-8 uppercase tracking-widest">Симулятор СОТ</p>
          
          <div className="w-full max-w-xs flex flex-col gap-3 relative z-50">
              {hasSave && <button onClick={() => startGame(true)} className="bg-emerald-600 text-white font-black py-4 rounded-full text-lg shadow-[0_0_20px_rgba(16,185,129,0.4)] uppercase active:scale-95 transition-transform">Продолжить</button>}
              <button onClick={() => startGame(false)} className="bg-blue-600 text-white font-black py-4 rounded-full text-lg shadow-[0_0_20px_rgba(37,99,235,0.6)] uppercase border-2 border-blue-400 active:scale-95 transition-transform">Новая игра</button>
              <div className="flex gap-2">
                  <button onClick={() => setShowOfficeUI(true)} className="flex-1 bg-slate-800 text-amber-400 font-bold py-3 rounded-full border border-slate-600 text-sm flex justify-center gap-2 items-center active:scale-95 transition-transform">🚪 Кабинет</button>
                  <button onClick={() => setShowGallery(true)} className="flex-1 bg-slate-800 text-slate-300 font-bold py-3 rounded-full border border-slate-600 text-sm active:scale-95 transition-transform">🏆 Ачивки</button>
              </div>
          </div>
        </div>
      );
    }

    const isCritical = stats.safety < 20 || stats.budget < 20 || stats.loyalty < 20;

    return (
      <div className={`flex flex-col h-[100dvh] overflow-hidden relative z-10 transition-all duration-1000 ${getTimeClass()} ${bgState === 'swipe-left' ? 'swipe-left' : bgState === 'swipe-right' ? 'swipe-right' : currentCard?.isUrgent ? 'bg-siren' : ''}`}
           onMouseMove={handlePointerMove} onTouchMove={handlePointerMove} onMouseUp={handlePointerUp} onTouchEnd={handlePointerUp} onMouseLeave={handlePointerUp}>
        
        <div className="screen-crack"></div>
        <div className="vignette-anger"></div>

        <div className="mesh-container"><div className="blob blob-1 w-[500px] h-[500px] top-[-20%] left-[-10%] animate-blob"></div><div className="blob blob-2 w-[450px] h-[450px] bottom-[-10%] right-[-10%] animate-blob" style={{animationDelay: '3s'}}></div></div>
        <div className="grid-overlay"></div><div className="noise"></div>
        <div className={`tunnel-vision ${isCritical ? 'critical' : ''}`}></div>

        {/* КНОПКА СМАРТФОНА */}
        <button onClick={markMessagesRead} className="phone-btn">
            📱 {unreadCount > 0 && <div className="phone-badge">{unreadCount}</div>}
        </button>

        {/* ИНТЕРФЕЙС СМАРТФОНА */}
        {phoneState.open && (
            <div className="absolute inset-0 z-[55] bg-slate-900/90 backdrop-blur-md flex flex-col p-4 animate-slideUp">
                <div className="bg-slate-800 flex-1 rounded-3xl border-4 border-slate-700 shadow-2xl flex flex-col overflow-hidden relative">
                    <div className="bg-slate-900 p-4 flex justify-between items-center border-b border-slate-700">
                        <div className="font-black text-xl text-white">Смартфон СОТ</div>
                        <button onClick={() => setPhoneState({...phoneState, open: false})} className="text-slate-400 text-2xl hover:text-white">×</button>
                    </div>
                    
                    <div className="flex bg-slate-800 p-2 gap-2 border-b border-slate-700">
                        <button onClick={()=>setPhoneState({...phoneState, tab: 'chats'})} className={`flex-1 py-2 rounded-xl font-bold text-sm ${phoneState.tab === 'chats' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>💬 Чаты</button>
                        <button onClick={()=>setPhoneState({...phoneState, tab: 'contacts'})} className={`flex-1 py-2 rounded-xl font-bold text-sm ${phoneState.tab === 'contacts' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>📇 Контакты</button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
                        {phoneState.tab === 'chats' && messages.map(msg => (
                            <div key={msg.id} className="bg-slate-700 p-4 rounded-2xl rounded-tl-none self-start max-w-[85%] border border-slate-600 relative">
                                <div className="text-blue-400 font-bold text-[10px] uppercase mb-1">{msg.from}</div>
                                <div className="text-white text-sm">{msg.text}</div>
                            </div>
                        ))}
                        
                        {phoneState.tab === 'contacts' && (
                            <>
                                <div className="p-3 bg-slate-700 rounded-xl border border-slate-600 flex justify-between items-center">
                                    <div>
                                        <div className="text-white font-bold">В.В. (Директор)</div>
                                        <div className="text-emerald-400 text-[10px] uppercase">Восстановит всё до 60%</div>
                                    </div>
                                    <button onClick={()=>useContact('vv')} disabled={contactsUsed.vv} className={`px-4 py-2 rounded-lg font-black text-sm ${!contactsUsed.vv ? 'bg-emerald-500 text-slate-900' : 'bg-slate-600 text-slate-400'}`}>☎️</button>
                                </div>
                                <div className="p-3 bg-slate-700 rounded-xl border border-slate-600 flex justify-between items-center">
                                    <div>
                                        <div className="text-white font-bold">Бухгалтерия</div>
                                        <div className="text-emerald-400 text-[10px] uppercase">+30 Бюджет, -20 Лояльность</div>
                                    </div>
                                    <button onClick={()=>useContact('buh')} disabled={contactsUsed.buh} className={`px-4 py-2 rounded-lg font-black text-sm ${!contactsUsed.buh ? 'bg-blue-500 text-white' : 'bg-slate-600 text-slate-400'}`}>☎️</button>
                                </div>
                                <div className="p-3 bg-slate-700 rounded-xl border border-slate-600 flex justify-between items-center">
                                    <div>
                                        <div className="text-white font-bold">Глава Профсоюза</div>
                                        <div className="text-emerald-400 text-[10px] uppercase">+30 Лояльность, -20 Бюджет</div>
                                    </div>
                                    <button onClick={()=>useContact('prof')} disabled={contactsUsed.prof} className={`px-4 py-2 rounded-lg font-black text-sm ${!contactsUsed.prof ? 'bg-rose-500 text-white' : 'bg-slate-600 text-slate-400'}`}>☎️</button>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            </div>
        )}

        {feedback && (
            <div className="absolute inset-0 z-[60] flex items-center justify-center p-4 animate-fade-in bg-slate-900/80 backdrop-blur-md">
                <div className="bg-white p-8 rounded-[32px] shadow-[0_20px_50px_rgba(0,0,0,0.5)] text-center border-4 border-slate-200 flex flex-col items-center justify-center max-w-sm w-full">
                    <p className="text-slate-900 font-black text-xl mb-8 leading-relaxed whitespace-pre-line">{feedback.text}</p>
                    <div className="flex gap-8 font-black text-2xl">
                        {feedback.safety !== 0 && <span className={feedback.safety > 0 ? 'text-emerald-500' : 'text-rose-500'}>🛡️ {feedback.safety > 0 ? '+' : ''}{feedback.safety}</span>}
                        {feedback.budget !== 0 && <span className={feedback.budget > 0 ? 'text-emerald-500' : 'text-rose-500'}>💰 {feedback.budget > 0 ? '+' : ''}{feedback.budget}</span>}
                        {feedback.loyalty !== 0 && <span className={feedback.loyalty > 0 ? 'text-emerald-500' : 'text-rose-500'}>🤝 {feedback.loyalty > 0 ? '+' : ''}{feedback.loyalty}</span>}
                    </div>
                </div>
            </div>
        )}

        <div className={`glass-panel p-3 pb-4 rounded-b-[30px] shadow-2xl z-20`}>
            <div className="flex justify-between items-center mb-3 px-2">
                <div className="flex items-center gap-2">
                    <div className="font-black text-2xl text-white tracking-tighter drop-shadow-md">СМЕНА {day}</div>
                </div>
                {currentCard?.isUrgent && !feedback && <div className="text-lg font-black text-rose-500 bg-rose-950 px-4 py-1 rounded-full border-2 border-rose-500 animate-pulse shadow-[0_0_15px_rgba(225,29,72,0.5)]">⏱️ 0:0{timeLeft}</div>}
            </div>
            <div className="flex justify-between gap-6 px-2">
                {['safety', 'budget', 'loyalty'].map(s => (
                    <div key={s} className="flex-1 text-center">
                        <div className="text-2xl mb-1 filter drop-shadow-md">{s==='safety'?'🛡️':s==='budget'?'💰':'🤝'}</div>
                        <div className="flask-container"><div className={`flask-fill ${flash[s]?'flask-flash':''}`} style={{width: `${stats[s]}%`, backgroundColor: getFlaskGlow(stats[s]), boxShadow: `0 0 20px ${getFlaskGlow(stats[s])}`}}></div></div>
                    </div>
                ))}
            </div>
        </div>

        <div className="flex-1 relative flex items-center justify-center p-2">
            <div className="card-stack">
                {nextCard && <div className="next-card flex flex-center items-center justify-center"><div className="text-[5rem] opacity-20 grayscale">{nextCard.avatar}</div></div>}
                
                {currentCard && !feedback && (
                    <div ref={cardRef} className={`swipe-card cursor-grab active:cursor-grabbing ${currentCard.isUrgent?'urgent':''} ${swipingOut ? 'swiping-out' : ''} ${!isDragging && !swipingOut ? 'resetting' : ''} ${isBurning ? 'animate-burn' : ''}`}
                        style={{ transform: `translate(${dragPos}px, ${Math.abs(dragPos)*0.05}px) rotate(${dragPos*0.05}deg) rotateY(${dragPos*0.08}deg) rotateX(${Math.abs(dragPos)*0.03}deg)` }}
                        onMouseDown={handlePointerDown} onTouchStart={handlePointerDown}
                    >
                        <div className="glare" style={{ opacity: Math.min(Math.abs(dragPos)/150, 0.4), background: `linear-gradient(${dragPos*0.5+180}deg, rgba(255,255,255,1) 0%, transparent 60%)` }}></div>
                        <div className="choice-indicator choice-left" style={{opacity: dragPos < -30 ? 1 : 0}}>{currentCard.leftChoice}</div>
                        <div className="choice-indicator choice-right" style={{opacity: dragPos > 30 ? 1 : 0}}>{currentCard.rightChoice}</div>
                        
                        <div className={`relative z-10 bg-slate-50 rounded-t-[24px] p-4 flex flex-col items-center justify-center border-b h-[42%] ${currentCard.isUrgent?'bg-rose-50':''}`}>
                            <div className="text-[4.5rem] mb-1 filter drop-shadow-2xl">{currentAvatar}</div>
                            <h2 className="text-xl font-black text-slate-800 tracking-tight text-center leading-tight">{currentCard.character}</h2>
                            <div className="mt-2 px-3 py-1 rounded-full font-black text-[10px] uppercase shadow-lg tracking-widest bg-blue-600 text-white">{currentCard.role}</div>
                        </div>
                        <div className="p-4 flex-1 flex items-center justify-center bg-white rounded-b-[24px]"><TypewriterText text={currentCard.text} /></div>
                    </div>
                )}
            </div>
        </div>

        <div className="p-4 pb-6 w-full max-w-[400px] mx-auto flex justify-between gap-3 z-20">
            <button onClick={()=>makeChoice('left')} className="flex-1 bg-rose-100/90 text-rose-700 border-b-4 border-rose-300 font-black py-3 px-2 rounded-2xl uppercase text-[10px] sm:text-[11px] tracking-wider active:scale-95 transition-all flex items-center justify-center leading-tight shadow-lg backdrop-blur-md cursor-pointer min-h-[56px] text-center">{currentCard?.leftChoice || 'ОТКАЗАТЬ'}</button>
            <button onClick={()=>makeChoice('right')} className="flex-1 bg-emerald-100/90 text-emerald-700 border-b-4 border-emerald-300 font-black py-3 px-2 rounded-2xl uppercase text-[10px] sm:text-[11px] tracking-wider active:scale-95 transition-all flex items-center justify-center leading-tight shadow-lg backdrop-blur-md cursor-pointer min-h-[56px] text-center">{currentCard?.rightChoice || 'РАЗРЕШИТЬ'}</button>
        </div>
      </div>
    );
  }
  createRoot(document.getElementById('game-root')).render(<Game />);
</script>

</body>
</html>
